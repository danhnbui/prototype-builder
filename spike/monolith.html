<!-- ============================================================================
  spike/monolith.html — a REALISTIC populated slice of the v0.4.0 template.html
  for a "Sign in" prototype. This is the monolith representation that the
  build loop edits today. The :root block is copied VERBATIM from
  template.html lines 43-81. The renderCmp*/renderScreen* functions are what
  /build authors per the build.md contract (anchors, tokens, props). The
  PB_DATA entries use the exact organism/screen shape from build.md 122-158.

  measure.py slices named regions out of this file as the monolith READ
  context per tweak; the monolith WRITE per tweak is modeled as an Edit-tool
  diff (see measure.py), not a re-emit of the whole file.
============================================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
<style>
    /* ========================================================================
       DESIGN TOKENS  (verbatim from template.html:43-81)
       ======================================================================== */
    :root {
      /* Brand */
      --brand:                  #1c4ed8;   /* primary accent  — change me */
      --brand-soft:             #eef2ff;   /* soft accent bg  — change me */
      --brand-strong:           #1e3aa3;   /* hover / pressed — change me */

      /* Neutrals (HIVE-derived) */
      --pg-gray-0:              #ffffff;
      --pg-gray-5:              #f8f9fb;
      --pg-gray-10:             #eff1f5;
      --pg-gray-20:             #c1c9d2;
      --pg-gray-40:             #8a94a0;
      --pg-gray-60:             #5e6873;
      --pg-gray-80:             #2d343c;
      --pg-gray-90:             #1c1f22;

      /* Semantic */
      --bg-soft:                var(--pg-gray-5);
      --text-active-primary:    var(--pg-gray-90);
      --text-active-secondary:  var(--pg-gray-60);
      --text-tertiary:          var(--pg-gray-40);
      --border:                 var(--pg-gray-10);
      --border-strong:          var(--pg-gray-20);
      --fill-active-primary:    var(--brand);
      --fill-active-secondary:  var(--brand-soft);
      --fill-hover-secondary:   var(--pg-gray-10);

      /* Fonts */
      --font-heading: 'Poppins', system-ui, -apple-system, sans-serif;
      --font-body:    'Inter',   system-ui, -apple-system, sans-serif;

      /* Radii + shadows */
      --pg-radius-small:   8px;
      --pg-radius-medium:  16px;
      --pg-radius-large:   24px;
      --pg-radius-full:    9999px;
      --hive-shadow-soft-sm: 0 1px 3px rgba(28,31,34,0.08);
      --hive-shadow-soft-md: 0 4px 12px rgba(28,31,34,0.08);
    }
</style>
</head>
<body>
<div id="app"></div>
<script>
    /* ====== REGION: renderCmpTextInput ====== */
    // Global component render fn — returns a live-preview HTML string.
    // Anchors (.field__label/.field__input/.field__error) drive the handoff redlines.
    function renderCmpTextInput(props) {
      const { label='Label', type='text', value='', placeholder='', state='default', error='' } = props || {};
      const isError = state === 'error';
      return `
        <label class="field" style="display:flex;flex-direction:column;gap:6px;font-family:var(--font-body);">
          <span class="field__label" style="font-size:13px;font-weight:600;color:var(--text-active-secondary);">${label}</span>
          <input class="field__input" type="${type}" value="${value}" placeholder="${placeholder}"
                 style="height:44px;padding:0 14px;border-radius:var(--pg-radius-small);
                        border:1px solid ${isError ? '#d92d20' : 'var(--border-strong)'};
                        background:var(--pg-gray-0);font-size:15px;color:var(--text-active-primary);
                        outline:none;transition:border-color .12s,box-shadow .12s;" />
          ${isError ? `<span class="field__error" style="font-size:12px;color:#d92d20;">${error}</span>` : ``}
        </label>`;
    }

    /* ====== REGION: renderCmpButton ====== */
    function renderCmpButton(props) {
      const { label='Button', variant='primary', size='md', disabled=false, fullWidth=false } = props || {};
      const pad = size === 'lg' ? '0 24px' : size === 'sm' ? '0 14px' : '0 18px';
      const height = size === 'lg' ? '48px' : size === 'sm' ? '32px' : '40px';
      const bg = variant === 'primary' ? 'var(--fill-active-primary)' : 'transparent';
      const fg = variant === 'primary' ? 'var(--pg-gray-0)' : 'var(--text-active-primary)';
      const bd = variant === 'secondary' ? '1px solid var(--border-strong)' : 'none';
      return `
        <button class="btn btn--${variant}" ${disabled ? 'disabled' : ''}
                style="height:${height};padding:${pad};${fullWidth ? 'width:100%;' : ''}
                       display:inline-flex;align-items:center;justify-content:center;gap:8px;
                       border-radius:var(--pg-radius-small);border:${bd};background:${bg};color:${fg};
                       font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;
                       opacity:${disabled ? '0.5' : '1'};transition:background .12s,border-color .12s;">
          <span class="btn__label">${label}</span>
        </button>`;
    }

    /* ====== REGION: renderScreenSignIn ====== */
    // Composes the Sign in screen from the components above. Single column, gap 16.
    function renderScreenSignIn() {
      return `
        <section class="screen screen--signin"
                 style="max-width:380px;margin:0 auto;display:flex;flex-direction:column;gap:16px;
                        padding:32px;background:var(--pg-gray-0);border-radius:var(--pg-radius-medium);
                        box-shadow:var(--hive-shadow-soft-md);">
          <h1 class="screen__title" style="margin:0;font-family:var(--font-heading);font-size:24px;
                     font-weight:700;color:var(--text-active-primary);">Sign in</h1>
          <p class="screen__subtitle" style="margin:0;font-size:14px;color:var(--text-active-secondary);">
            Welcome back. Enter your details to continue.</p>
          ${renderCmpTextInput({ label:'Email', type:'email', placeholder:'you@company.com' })}
          ${renderCmpTextInput({ label:'Password', type:'password', placeholder:'••••••••' })}
          ${renderCmpButton({ label:'Sign in', variant:'primary', size:'md', fullWidth:true })}
          <a class="screen__link" href="#" style="align-self:center;font-size:13px;color:var(--brand);
             text-decoration:none;">Forgot password?</a>
        </section>`;
    }

    /* ====== REGION: renderCmpOtpInput ====== */
    function renderCmpOtpInput(props) {
      const { length=6, value='', state='default' } = props || {};
      const isError = state === 'error';
      let boxes = '';
      for (let i = 0; i < length; i++) {
        boxes += `<input class="otp__box" inputmode="numeric" maxlength="1" value="${value[i] || ''}"
                   style="width:44px;height:52px;text-align:center;font-size:20px;font-family:var(--font-body);
                          border-radius:var(--pg-radius-small);background:var(--pg-gray-0);
                          border:1px solid ${isError ? '#d92d20' : 'var(--border-strong)'};outline:none;" />`;
      }
      return `<div class="otp" style="display:flex;gap:8px;justify-content:center;">${boxes}</div>`;
    }

    /* ====== REGION: renderScreenRegister ====== */
    function renderScreenRegister() {
      return `
        <section class="screen screen--register"
                 style="max-width:380px;margin:0 auto;display:flex;flex-direction:column;gap:16px;
                        padding:32px;background:var(--pg-gray-0);border-radius:var(--pg-radius-medium);
                        box-shadow:var(--hive-shadow-soft-md);">
          <h1 class="screen__title" style="margin:0;font-family:var(--font-heading);font-size:24px;
                     font-weight:700;color:var(--text-active-primary);">Create account</h1>
          <p class="screen__subtitle" style="margin:0;font-size:14px;color:var(--text-active-secondary);">
            A few details and you're in.</p>
          ${renderCmpTextInput({ label:'Full name', type:'text', placeholder:'Jane Doe' })}
          ${renderCmpTextInput({ label:'Email', type:'email', placeholder:'you@company.com' })}
          ${renderCmpTextInput({ label:'Password', type:'password', placeholder:'••••••••' })}
          ${renderCmpButton({ label:'Create account', variant:'primary', size:'md', fullWidth:true })}
          <a class="screen__link" href="#" style="align-self:center;font-size:13px;color:var(--brand);
             text-decoration:none;">Already have an account?</a>
        </section>`;
    }

    /* ====== REGION: renderScreenOtp ====== */
    function renderScreenOtp() {
      return `
        <section class="screen screen--otp"
                 style="max-width:380px;margin:0 auto;display:flex;flex-direction:column;gap:16px;
                        padding:32px;background:var(--pg-gray-0);border-radius:var(--pg-radius-medium);
                        box-shadow:var(--hive-shadow-soft-md);">
          <h1 class="screen__title" style="margin:0;font-family:var(--font-heading);font-size:24px;
                     font-weight:700;color:var(--text-active-primary);">Verify your email</h1>
          <p class="screen__subtitle" style="margin:0;font-size:14px;color:var(--text-active-secondary);">
            Enter the 6-digit code we sent you.</p>
          ${renderCmpOtpInput({ length:6 })}
          ${renderCmpButton({ label:'Verify', variant:'primary', size:'md', fullWidth:true })}
          <a class="screen__link" href="#" style="align-self:center;font-size:13px;color:var(--brand);
             text-decoration:none;">Resend code</a>
        </section>`;
    }

    /* ====== REGION: PB_DATA.handoff.organisms ====== */
    PB_DATA.handoff.organisms = [
      {
        id:'text-input', name:'Text input', renderFn:'renderCmpTextInput',
        meta:'Email + password fields across Sign in, Register.',
        codeLayout:'stacked',
        properties:[ { id:'state', label:'State', default:'default',
          options:[ {value:'default',label:'Default'}, {value:'error',label:'Error'} ] } ],
        code:{ lang:'html', snippet:'<label class="field"><span class="field__label">Email</span><input class="field__input"/></label>' },
        anatomy:{ renderProps:{ state:'error' }, parts:[
          { n:1, name:'Label', anchor:'.field__label', required:true,
            token:{ name:'--text-active-secondary', value:'#5e6873', kind:'color' } },
          { n:2, name:'Input box', anchor:'.field__input', required:true,
            token:{ name:'--pg-radius-small', value:'8px', kind:'radius' } },
          { n:3, name:'Error text', anchor:'.field__error', required:false,
            token:{ name:'danger', value:'#d92d20', kind:'color' } } ] },
        spec:{ legend:[ {kind:'dimension',label:'Dimension',color:'#f97316'},
                        {kind:'gap',label:'Gap / padding',color:'#2563eb'},
                        {kind:'margin',label:'Margin',color:'#db2777'} ],
          renderProps:{ state:'error' }, marginX:0,
          stack:[ {anchor:'.field__label',name:'Label'}, {anchor:'.field__input',name:'Input box'} ] },
        uiLogic:[ { target:'Error text', rule:'Show only after blur or submit.' } ],
        usage:{ demoProps:{ state:'default' },
          topics:[ { topic:'Label clarity', do:'Use a noun.', dont:'Avoid a full sentence.' } ],
          placement:'One field per row inside the auth card.' }
      },
      {
        id:'primary-button', name:'Button', renderFn:'renderCmpButton',
        meta:'Primary CTA on Sign in and Register.',
        codeLayout:'side-by-side',
        properties:[ { id:'size', label:'Size', default:'md',
          options:[ {value:'sm',label:'Small'}, {value:'md',label:'Medium'}, {value:'lg',label:'Large'} ] },
          { id:'variant', label:'Variant', default:'primary',
          options:[ {value:'primary',label:'Primary'}, {value:'secondary',label:'Secondary'} ] } ],
        code:{ lang:'html', snippet:'<button class="btn btn--primary"><span class="btn__label">Sign in</span></button>' },
        anatomy:{ renderProps:{ variant:'primary' }, parts:[
          { n:1, name:'Container', anchor:'.btn', required:true,
            token:{ name:'--fill-active-primary', value:'#1c4ed8', kind:'color' } },
          { n:2, name:'Label', anchor:'.btn__label', required:true,
            token:{ name:'--pg-gray-0', value:'#ffffff', kind:'color' } } ] },
        spec:{ legend:[ {kind:'dimension',label:'Dimension',color:'#f97316'},
                        {kind:'gap',label:'Gap / padding',color:'#2563eb'} ],
          renderProps:{ variant:'primary', size:'md' }, marginX:0,
          stack:[ {anchor:'.btn',name:'Container'} ] },
        uiLogic:[ { target:'Button', rule:'Disable while the form is submitting.' } ],
        usage:{ demoProps:{ variant:'primary' },
          topics:[ { topic:'One primary', do:'One primary CTA per screen.', dont:'Avoid two primaries.' } ],
          placement:'Full-width at the foot of the auth card.' }
      },
      {
        id:'otp-input', name:'OTP input', renderFn:'renderCmpOtpInput',
        meta:'6-digit code entry on Verify email.',
        codeLayout:'stacked',
        properties:[ { id:'state', label:'State', default:'default',
          options:[ {value:'default',label:'Default'}, {value:'error',label:'Error'} ] } ],
        code:{ lang:'html', snippet:'<div class="otp"><input class="otp__box"/>…</div>' },
        anatomy:{ renderProps:{ state:'default' }, parts:[
          { n:1, name:'Code box', anchor:'.otp__box', required:true,
            token:{ name:'--pg-radius-small', value:'8px', kind:'radius' } } ] },
        spec:{ legend:[ {kind:'gap',label:'Gap',color:'#2563eb'} ],
          renderProps:{ state:'default' }, marginX:0,
          stack:[ {anchor:'.otp__box',name:'Code box'} ] },
        uiLogic:[ { target:'Boxes', rule:'Auto-advance on input; submit on last digit.' } ],
        usage:{ demoProps:{ state:'default' },
          topics:[ { topic:'Paste', do:'Accept a pasted 6-digit code.', dont:'Block paste.' } ],
          placement:'Centered under the Verify email title.' }
      },
    ];

    /* ====== REGION: PB_DATA.handoff.screens ====== */
    PB_DATA.handoff.screens = [
      {
        id:'sign-in', name:'Sign in', renderFn:'renderScreenSignIn',
        elements:[
          { id:'title', label:'Sign in', orgId:null, tokens:['--font-heading'],
            sizing:{ font:'24px', weight:700 }, state:'default', uiLogic:'' },
          { id:'subtitle', label:'Welcome back. Enter your details to continue.', orgId:null,
            tokens:['--text-active-secondary'], sizing:{ font:'14px' }, state:'default', uiLogic:'' },
          { id:'email', label:'Email', orgId:'text-input', tokens:['--pg-radius-small','--border-strong'],
            sizing:{ height:'44px' }, state:'default', uiLogic:'Required. Validate format on blur.' },
          { id:'password', label:'Password', orgId:'text-input', tokens:['--pg-radius-small','--border-strong'],
            sizing:{ height:'44px' }, state:'default', uiLogic:'Required. Min 8 chars.' },
          { id:'submit', label:'Sign in', orgId:'primary-button', tokens:['--fill-active-primary'],
            sizing:{ height:'40px', width:'100%' }, state:'default', uiLogic:'Disabled until both fields valid.' }
        ],
        logicNotes:[ 'On submit: POST /auth/sign-in.', 'On 401: show form-level error, keep email.' ]
      },
      {
        id:'register', name:'Create account', renderFn:'renderScreenRegister',
        elements:[
          { id:'title', label:'Create account', orgId:null, tokens:['--font-heading'],
            sizing:{ font:'24px', weight:700 }, state:'default', uiLogic:'' },
          { id:'subtitle', label:"A few details and you're in.", orgId:null,
            tokens:['--text-active-secondary'], sizing:{ font:'14px' }, state:'default', uiLogic:'' },
          { id:'name', label:'Full name', orgId:'text-input', tokens:['--pg-radius-small','--border-strong'],
            sizing:{ height:'44px' }, state:'default', uiLogic:'Required.' },
          { id:'email', label:'Email', orgId:'text-input', tokens:['--pg-radius-small','--border-strong'],
            sizing:{ height:'44px' }, state:'default', uiLogic:'Required. Validate format on blur.' },
          { id:'password', label:'Password', orgId:'text-input', tokens:['--pg-radius-small','--border-strong'],
            sizing:{ height:'44px' }, state:'default', uiLogic:'Required. Min 8 chars.' },
          { id:'submit', label:'Create account', orgId:'primary-button', tokens:['--fill-active-primary'],
            sizing:{ height:'40px', width:'100%' }, state:'default', uiLogic:'Disabled until valid.' }
        ],
        logicNotes:[ 'On submit: POST /auth/register.', 'On 409: email taken, inline error.' ]
      },
      {
        id:'otp-verify', name:'Verify email', renderFn:'renderScreenOtp',
        elements:[
          { id:'title', label:'Verify your email', orgId:null, tokens:['--font-heading'],
            sizing:{ font:'24px', weight:700 }, state:'default', uiLogic:'' },
          { id:'subtitle', label:'Enter the 6-digit code we sent you.', orgId:null,
            tokens:['--text-active-secondary'], sizing:{ font:'14px' }, state:'default', uiLogic:'' },
          { id:'code', label:'Code', orgId:'otp-input', tokens:['--pg-radius-small','--border-strong'],
            sizing:{ height:'52px' }, state:'default', uiLogic:'Auto-advance; submit on 6th digit.' },
          { id:'submit', label:'Verify', orgId:'primary-button', tokens:['--fill-active-primary'],
            sizing:{ height:'40px', width:'100%' }, state:'default', uiLogic:'Disabled until 6 digits.' }
        ],
        logicNotes:[ 'On submit: POST /auth/verify.', 'On 400: shake boxes, clear code.' ]
      },
    ];
</script>
</body>
</html>
