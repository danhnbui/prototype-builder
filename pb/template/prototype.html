    function pbRenderScreenSpec(el) {
      return `
        ${el.dsOverride ? `<div class="handoff-spec-warning">⚠ DS override logged</div>` : ''}
        <div class="handoff-spec-section">
          <div class="handoff-spec-section-title">Tokens</div>
          ${(el.tokens && el.tokens.length)
            ? el.tokens.map(t => `
                <div class="handoff-spec-row">
                  <span class="handoff-spec-key">${pbEscape(t.name)}</span>
                  <span class="handoff-spec-val">${pbEscape(t.value)}</span>
                </div>
              `).join('')
            : '<div class="handoff-spec-empty">No tokens recorded.</div>'}
        </div>
        <div class="handoff-spec-section">
          <div class="handoff-spec-section-title">Sizing</div>
          ${el.sizing
            ? Object.entries(el.sizing).map(([k, v]) => `
                <div class="handoff-spec-row">
                  <span class="handoff-spec-key">${pbEscape(k)}</span>

            : '<div class="handoff-spec-empty">No sizing recorded.</div>'}
        </div>
        ${el.state ? `
          <div class="handoff-spec-section">

    function pbRenderScreenUiLogic(el, org) {
      const notes = el.uiLogic || (org && org.uiLogic) || null;
      if (!notes || (Array.isArray(notes) && !notes.length)) {
        return '<div class="handoff-spec-empty" style="padding:20px 0">No UI logic notes for this element yet.</div>';

    function pbRenderScreenDemo(el, org) {
      if (!org) {
        return `<div class="handoff-spec-empty" style="padding:20px 0">No component linked — add <code>orgId</code> to this screen element to enable the live demo.</div>`;

          <select style="font-size: var(--font-size-xs);padding:4px 8px;border:1px solid var(--border);border-radius:6px;flex:1;background:white"
                  onchange="setHandoffProp('${pbEscape(org.id)}', '${pbEscape(p.id)}', this.value)">
            ${(p.options || []).map(opt => {
              const v = typeof opt === 'string' ? opt : (opt.value || opt.label || opt);
              const l = typeof opt === 'string' ? opt : (opt.label || opt.value || opt);

    /* =========================================================================
       TAB 5 — ERD (Entity Relationship Diagram)
       Mermaid `erDiagram` rendered inside the same zoomable canvas.
       Edit the Mermaid source below to model your domain.
       ========================================================================= */
    function renderMetaERD() {
      const populated = !!(PB_DATA.erd && PB_DATA.erd.populated);
      const cta = populated
        ? `<button class="sync-button" onclick="openCopyPopover('/pb:data', this)">Sync</button>` : '';
      const header = pbPageHeader({ title: 'Data', infoKey: 'erd', cta });

      if (!populated) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.erd,
                title: 'No data model yet',
                body: 'Build the entity-relationship diagram from your spec. Claude generates a Mermaid `erDiagram` with PK/FK/cardinality guardrails — for a future production implementation.',
                ctaLabel: 'Generate ERD', command: '/pb:data', label: 'Sync ERD command copied',
              })}
            </div>
          </div>`;
        return;
      }

      const e = (PB_DATA && PB_DATA.erd) || {};
      const rows = e.table || [];
      const byEntity = {};
      rows.forEach(r => { (byEntity[r.entity] = byEntity[r.entity] || []).push(r); });
      if (!state.erdView) state.erdView = 'diagram';

      // v1.5 — Data is single-column now (4.2): the table view carries the variants (4.4),
      // the diagram view carries the relationship legend (4.5). No right aside.
      $('#app').innerHTML = `
        <div class="pb-page">
          ${header}
          <div class="pb-content">
            <div class="pb-main">${pbErdMain(e, byEntity)}</div>
          </div>
        </div>`;

      if (state.erdView !== 'table' && e.mermaid && window.mermaid) {
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
        mermaid.run({ querySelector: '#erd-diagram' }).then(function () {
          var stage = document.getElementById('erd-stage');
          if (!stage) return;
          var svg = stage.querySelector('svg');
          if (!svg) return;
          svg.style.maxWidth = 'none';
          svg.removeAttribute('width'); svg.removeAttribute('height');
          // erDiagram SVGs carry only a viewBox (no pixel width), so a bare bounding-box read
          // collapses the height. Pin a concrete target width first, measure the aspect-correct
          // height, size the stage to that, then release the SVG to fill the stage. initCanvas
          // re-fits the result into the viewport.
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              var vp = document.getElementById('erd-viewport');
              var targetW = Math.min(Math.max(((vp && vp.clientWidth) || 900) - 48, 320), 1100);
              svg.style.width = targetW + 'px';
              svg.style.height = 'auto';
              var bbox = svg.getBoundingClientRect();
              var W = Math.ceil(bbox.width)  || targetW;
              var H = Math.ceil(bbox.height) || 600;
              svg.style.width = ''; svg.style.height = '';
              stage.style.width = W + 'px';
              stage.style.height = H + 'px';
              stage.style.marginLeft = -(W/2) + 'px';
              stage.style.marginTop  = -(H/2) + 'px';
              initCanvas('erd', W, H);
            });
          });
        }).catch(function(){ /* silent */ });
      }
    }

    /* Data-tab (v1.5, single column): Diagram | Table toggle + relationship-legend button
       (diagram) / data-set variant chips (table). */
    function pbErdMain(e, byEntity) {
      const subtabs = [['diagram', 'Diagram'], ['table', 'Table']].map(([id, label]) =>
        `<button class="meta-subtab ${state.erdView === id ? 'active' : ''}" onclick="setErdView('${id}')">${label}</button>`).join('');
      const toolbar = `<div class="erd-toolbar">
          <div class="meta-subtabs">${subtabs}</div>
          ${state.erdView === 'table' ? '' : erdLegendButton()}
        </div>`;

      if (state.erdView === 'table') {
        const ents = Object.keys(byEntity);
        if (!ents.length) return toolbar + `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">No table data.</p>`;
        // 4.4 — **per-entity** data-set variants: each table that has multiple data treatments
        // (erd.mock sets for that entity) gets its own switcher — "Schema" (the field/type/example
        // definition) + one chip per label. Selecting one swaps just that table's Example column.
        if (!state.erdVariant || typeof state.erdVariant !== 'object') state.erdVariant = {};
        // 4.3 — fixed column widths (.erd-fixed) so every entity table lines up.
        const tables = `<div class="erd-tables">` + ents.map(ent => {
          const sets = ((e && e.mock) || []).filter(m => m.entity === ent);
          const variants = [{ key: 'schema', label: 'Schema' }].concat(sets.map(m => ({ key: m.label, label: m.label })));
          let v = state.erdVariant[ent] || 'schema';
          if (!variants.some(x => x.key === v)) v = 'schema';
          const switcher = sets.length ? `<div class="erd-entity-variants">`
            + variants.map(opt => `<button class="pb-mock-chip ${v === opt.key ? 'is-active' : ''}" onclick="setErdVariant('${pbEscape(ent)}','${pbEscape(opt.key)}')">${pbEscape(opt.label)}</button>`).join('')
            + `</div>` : '';
          const exHead = v === 'schema' ? 'Example' : v;
          return `<div class="erd-entity">
              <div class="erd-entity-head"><h3 class="erd-entity-title">${pbEscape(ent)}</h3>${switcher}</div>
              <table class="erd-entity-table erd-fixed">
                <thead><tr><th>Field</th><th>Type</th><th>${pbEscape(exHead)}</th><th>Notes</th></tr></thead>
                <tbody>${byEntity[ent].map(r => {
                  const ex = v === 'schema' ? (r.example || '') : pbErdExampleFor(e, ent, r.field, v);
                  return `<tr><td>${pbEscape(r.field||'')}</td><td><code class="erd-type-chip">${pbEscape(r.type||'')}</code></td><td>${pbEscape(ex || '—')}</td><td>${pbEscape(r.notes||'')}</td></tr>`;
                }).join('')}</tbody>
              </table>
            </div>`;
        }).join('') + `</div>`;
        return toolbar + tables;
      }

      const diagramView = `
        <div class="flow-canvas" id="erd-canvas">
          <div class="flow-viewport" id="erd-viewport">
            <div class="flow-stage flow-stage-erd" id="erd-stage">
              <div class="mermaid" id="erd-diagram">${e.mermaid || ''}</div>
            </div>
          </div>
          <div class="flow-zoom-controls">
            <button class="flow-zoom-btn" id="erd-zoom-in"  title="Zoom in">+</button>
            <button class="flow-zoom-btn" id="erd-zoom-out" title="Zoom out">−</button>
            <button class="flow-zoom-btn" id="erd-zoom-fit" title="Fit / reset">⊙</button>
          </div>
          <div class="flow-zoom-readout" id="erd-zoom-readout">100%</div>
          <div class="flow-hint">Scroll to zoom · drag to pan</div>
        </div>`;
      return toolbar + diagramView;
    }

    /* The ordered data-set list for the Table view — "Schema" first, then each distinct
       erd.mock label in first-seen order. */
    function pbErdVariants(e) {
      const labels = [];
      ((e && e.mock) || []).forEach(m => { if (m.label && labels.indexOf(m.label) < 0) labels.push(m.label); });
      return [{ key: 'schema', label: 'Schema' }].concat(labels.map(l => ({ key: l, label: l })));
    }
    /* The example value for a field under a given data-set variant (rows[0] is representative;
       an absent/empty set → '' so the column reads as the no-data state). */
    function pbErdExampleFor(e, entity, field, variantKey) {
      const set = ((e && e.mock) || []).find(m => m.entity === entity && m.label === variantKey);
      if (!set || !(set.rows || []).length) return '';
      const row = set.rows[0];
      return (row && row[field] != null) ? String(row[field]) : '';
    }

    /* 4.5 — relationship legend in the diagram canvas (mirrors the UX-flow legend button). */
    function erdLegendButton() {
      return `<button class="flow-doc-legend-btn" type="button" aria-label="Show relationship legend" onclick="openErdLegendPopover(this)">
          <span class="erd-legend-mini">${erdRelSvg('one-many')}</span>
          <span class="flow-doc-legend-label">Legend</span>
          <span class="flow-doc-legend-q" aria-hidden="true">?</span>
        </button>`;
    }
    function openErdLegendPopover(anchorBtn) {
      document.querySelectorAll('.copy-popover, .copy-popover-backdrop').forEach(el => el.remove());
      window.removeEventListener('keydown', copyPopoverKeyHandler);
      window.removeEventListener('resize', repositionCopyPopover);
      const backdrop = document.createElement('div');
      backdrop.className = 'copy-popover-backdrop';
      backdrop.addEventListener('click', closeCopyPopover);
      const pop = document.createElement('div');
      pop.className = 'copy-popover';
      pop.setAttribute('role', 'dialog');
      pop.setAttribute('aria-label', 'Relationship legend');
      pop.style.width = '300px';
      const rel = (kind, lbl, desc) => `
        <div class="legend-popover-row">
          <span class="erd-legend-svgwrap">${erdRelSvg(kind)}</span>
          <div class="legend-popover-text">
            <div class="legend-popover-name">${lbl}</div>
            <div class="legend-popover-desc">${desc}</div>
          </div>
        </div>`;
      pop.innerHTML = `
        <button class="copy-popover-close" type="button" aria-label="Close" onclick="closeCopyPopover()">${COPY_POPOVER_ICONS.close}</button>
        <div class="copy-popover-cmd-label" style="margin-bottom:8px"><span>Relationship legend</span></div>
        <div class="legend-popover-body">
          ${rel('one-one', '1 : 1', 'One-to-one')}
          ${rel('one-many', '1 : N', 'One-to-many')}
          ${rel('many-many', 'N : N', 'Many-to-many')}
        </div>
        <div class="legend-popover-footer">Crow's-foot notation: bars = exactly one · split foot = many · circle = optional (zero).</div>`;
      document.body.appendChild(backdrop);
      document.body.appendChild(pop);
      positionCopyPopover(pop, anchorBtn);
      setTimeout(() => { pop.classList.add('is-visible'); positionCopyPopover(pop, anchorBtn); }, 10);
      window.addEventListener('keydown', copyPopoverKeyHandler);
      window.addEventListener('resize', repositionCopyPopover);
    }

    /* ERD legend cardinality symbols (Crow's-foot notation) */
    function erdRelSvg(kind) {
      var line = '<line x1="14" y1="7" x2="46" y2="7" stroke="#374151" stroke-width="1.5"/>';
      function bars(x, dx) {
        return '<line x1="'+x+'" y1="2" x2="'+x+'" y2="12" stroke="#374151" stroke-width="1.5"/>'
             + '<line x1="'+(x+dx)+'" y1="2" x2="'+(x+dx)+'" y2="12" stroke="#374151" stroke-width="1.5"/>';
      }
      function foot(x, dir) {
        var dx = 6 * dir;
        return '<line x1="'+x+'" y1="7" x2="'+(x+dx)+'" y2="2"  stroke="#374151" stroke-width="1.5"/>'
             + '<line x1="'+x+'" y1="7" x2="'+(x+dx)+'" y2="12" stroke="#374151" stroke-width="1.5"/>'
             + '<line x1="'+x+'" y1="7" x2="'+(x+dx)+'" y2="7"  stroke="#374151" stroke-width="1.5"/>';
      }
      function circle(x) {
        return '<circle cx="'+x+'" cy="7" r="2.5" fill="white" stroke="#374151" stroke-width="1.5"/>';
      }
      var lEnd = '', rEnd = '';
      if (kind === 'one-one')      { lEnd = bars(8, 4);                       rEnd = bars(48, 4); }
      else if (kind === 'one-many'){ lEnd = bars(8, 4);                       rEnd = circle(50) + foot(46, +1); }
      else                          { lEnd = foot(14, -1) + circle(10);        rEnd = circle(50) + foot(46, +1); }
      return '<svg viewBox="0 0 60 14" xmlns="http://www.w3.org/2000/svg">'
        + line + lEnd + rEnd + '</svg>';
    }

    /* =========================================================================
       SHARED CANVAS — generalised pan/zoom for the User Flow + ERD tabs
       ========================================================================= */
    function initCanvas(prefix, contentW, contentH) {
      var viewport = document.getElementById(prefix + '-viewport');
      var stage    = document.getElementById(prefix + '-stage');
      var readout  = document.getElementById(prefix + '-zoom-readout');
      if (!viewport || !stage) return;

      var minS = 0.4, maxS = 3;
      var scale = 1, tx = 0, ty = 0;
      var dragging = false, lastX = 0, lastY = 0;

      function apply() {
        stage.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
        if (readout) readout.textContent = Math.round(scale * 100) + '%';
      }
      function fitToViewport() {
        var vw = viewport.clientWidth, vh = viewport.clientHeight;
        var pad = 32;
        var s = Math.min((vw - pad * 2) / contentW, (vh - pad * 2) / contentH);
        if (s < minS) minS = Math.max(0.1, s * 0.9);
        scale = Math.max(minS, Math.min(maxS, s));
        tx = 0; ty = 0;
        stage.style.transition = 'transform 0.25s ease-out';
        apply();
      }
      function zoomBy(delta, cx, cy) {
        var prev = scale;
        var next = Math.max(minS, Math.min(maxS, scale * (1 + delta)));
        if (next === prev) return;
        if (cx !== undefined && cy !== undefined) {
          var rect = viewport.getBoundingClientRect();
          var px = cx - rect.left - rect.width / 2;
          var py = cy - rect.top  - rect.height / 2;
          tx = px - (px - tx) * (next / prev);
          ty = py - (py - ty) * (next / prev);
        }
        scale = next;
        stage.style.transition = 'none';
        apply();
      }

      viewport.addEventListener('wheel', function (e) {
        e.preventDefault();
        zoomBy(-e.deltaY * 0.0015, e.clientX, e.clientY);
      }, { passive: false });
      viewport.addEventListener('mousedown', function (e) {
        dragging = true;
        lastX = e.clientX; lastY = e.clientY;
        viewport.style.cursor = 'grabbing';
        stage.style.transition = 'none';
        e.preventDefault();
      });
      window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        tx += e.clientX - lastX;
        ty += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        apply();
      });
      window.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        viewport.style.cursor = '';
      });

      document.getElementById(prefix + '-zoom-in').onclick  = function () { zoomBy(0.18); };
      document.getElementById(prefix + '-zoom-out').onclick = function () { zoomBy(-0.18); };
      document.getElementById(prefix + '-zoom-fit').onclick = function () { fitToViewport(); };

      requestAnimationFrame(function () { requestAnimationFrame(fitToViewport); });
    }

    /* Boot */
    applyRegistryTokens(PB_REGISTRY);
    if (VIEW_ONLY) {
      document.body.classList.add('view-only');
      const _c = (PB_REGISTRY.config && PB_REGISTRY.config.cover) || null;
      if (_c) {
        const _cov = document.createElement('div');
        _cov.className = 'pb-cover';
        _cov.innerHTML = `<strong>${_c.title || ''}</strong><span>${_c.summary || ''}</span>`
          + (_c.by || _c.date ? `<em>${[_c.by, _c.date].filter(Boolean).join(' · ')}</em>` : '');
        document.body.insertBefore(_cov, document.body.firstChild);
      }
    }
    render();
  </script>
</body>
</html>
