      display:flex; flex-direction:column; z-index:1401;
      opacity:0; transition:opacity .18s, transform .18s;
    }
    .fp-panel.is-visible { opacity:1; transform:translate(-50%,-50%) scale(1); }
    .fp-panel-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .fp-panel-title { font: var(--font-weight-bold) var(--font-size-base)/var(--line-height-base) var(--font-heading); color:var(--text-active-primary); }
    .fp-panel-close {
      width:28px; height:28px; border:none; background:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; border-radius:6px;
      color:var(--text-active-secondary); font-size: var(--font-size-l); line-height: var(--line-height-l);
    }
    .fp-panel-close:hover { background:var(--neutral-10); }
    .fp-panel-body { overflow-y:auto; padding:16px 20px; flex:1; }
    .fp-section-head {
      display:flex; align-items:center; justify-content:space-between;
      margin:0 0 8px;
    }
    .fp-section-label { font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body); text-transform:uppercase; letter-spacing:0.05em; color:var(--text-tertiary); }
    .fp-select-all { font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-xs) var(--font-body); color:var(--pg-brand-primary,#1c4ed8); background:none; border:none; cursor:pointer; padding:2px 0; }
    .fp-select-all:hover { text-decoration:underline; }
    .fp-list { list-style:none; padding:0; margin:0 0 18px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .fp-item {
      display:flex; align-items:center; gap:10px; padding:9px 12px;
      border-bottom:1px solid var(--border); cursor:pointer;
      transition:background .1s;
    }
    .fp-item:last-child { border-bottom:none; }
    .fp-item:hover { background:var(--neutral-10,#f8f8f8); }
    .fp-item input[type=checkbox] { flex-shrink:0; width:15px; height:15px; accent-color:var(--pg-brand-primary,#1c4ed8); cursor:pointer; }
    .fp-item-name { font: var(--font-weight-medium) var(--font-size-s)/var(--line-height-s) var(--font-body); color:var(--text-active-primary); flex:1; }
    .fp-item-meta { font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-xs) var(--font-body); color:var(--text-active-secondary); white-space:nowrap; }
    .fp-badge { display:inline-block; padding:2px 6px; border-radius:4px; font: var(--font-weight-bold) var(--font-size-xxs)/var(--line-height-xxs) var(--font-body); margin-left:6px; }
    .fp-badge-new    { background:#eff6ff; color:#1c4ed8; }
    .fp-badge-update { background:#fff7ed; color:#c2410c; }
    .fp-badge-lib    { background:#faf5ff; color:#7e22ce; }
    .fp-badge-reuse  { background:#faf5ff; color:#7e22ce; }
    /* v1.2 — stacked push item with affected-screen line */
    .fp-item--stacked { flex-direction:column; align-items:stretch; gap:6px; }
    .fp-item-row { display:flex; align-items:center; gap:10px; }
    .fp-item-affected { font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-p-xs) var(--font-body); color:var(--text-active-secondary); padding-left:25px; }
    .fp-item-affected--muted { color:var(--text-tertiary); font-style:italic; }
    .fp-item-affected.is-warn { color:#c2410c; }
    .fp-progress-hint { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-p-xs) var(--font-body); color:var(--text-tertiary); }
    .fp-progress-hint code { font-family:'SF Mono',Menlo,monospace; font-size: var(--font-size-xxs); }
    .fp-panel-foot {
      padding:14px 20px 16px; border-top:1px solid var(--border); flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .fp-summary { font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-xs) var(--font-body); color:var(--text-active-secondary); }
    .fp-summary strong { color:var(--text-active-primary); }
    .fp-push-btn {
      padding:0 18px; height:36px; background:var(--pg-brand-primary,#1c4ed8);
      color:#fff; border:none; border-radius:8px; font: var(--font-weight-bold) var(--font-size-s)/var(--line-height-s) var(--font-body);
      cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background .15s;
    }
    .fp-push-btn:hover { background:#1e40af; }
    .fp-push-btn:disabled { opacity:.45; cursor:not-allowed; }

    /* ── Figma Push Progress bar (fixed bottom-right) ──────────────────── */
    .fp-progress {
      position:fixed; bottom:20px; right:20px; width:320px;
      background:#fff; border:1px solid var(--border); border-radius:12px;
      box-shadow:0 8px 28px rgba(0,0,0,.15); z-index:1500; padding:14px 16px;
      opacity:0; transform:translateY(8px); transition:opacity .2s, transform .2s;
      pointer-events:none;
    }
    .fp-progress.is-visible { opacity:1; transform:translateY(0); pointer-events:auto; }
    .fp-progress-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .fp-progress-title { font: var(--font-weight-bold) var(--font-size-s)/var(--line-height-s) var(--font-body); color:var(--text-active-primary); }
    .fp-progress-close { background:none; border:none; cursor:pointer; font-size: var(--font-size-base); color:var(--text-active-secondary); padding:0; line-height: var(--line-height-base); }
    .fp-progress-row { margin-bottom:10px; }
    .fp-progress-row:last-child { margin-bottom:0; }
    .fp-progress-rowlabel { display:flex; justify-content:space-between; margin-bottom:4px; }
    .fp-progress-rowname { font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-xs) var(--font-body); color:var(--text-active-secondary); }
    .fp-progress-rowcount { font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body); color:var(--text-active-primary); }
    .fp-progress-rowcurrent { font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-xs) var(--font-body); color:var(--text-tertiary); margin-top:3px; }
    .fp-bar-track { height:6px; background:var(--neutral-10,#f4f4f4); border-radius:3px; overflow:hidden; }
    .fp-bar-fill { height:100%; background:var(--pg-brand-primary,#1c4ed8); border-radius:3px; transition:width .4s ease; }
    .fp-bar-fill.done { background:#22c55e; }

    @media (max-width: 980px) {
      .flow-doc-grid { grid-template-columns: 1fr; }
      .flow-doc-side { max-height: none; }
    }

    /* ========================================================================
       FLOW CANVAS — zoomable / pannable diagram surface (legacy SVG canvas)
       Used by User Flow + ERD tabs
       ======================================================================== */
    .flow-layout {
      display: flex;
      gap: 20px;
      align-items: stretch;
      margin-bottom: 16px;
    }
    .flow-canvas {
      position: relative;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-medium);
      flex: 1; min-width: 0;
      height: 620px;
      overflow: hidden;
    }
    .flow-viewport {
      position: absolute; inset: 0;
      overflow: hidden;
      cursor: grab;
      background:
        radial-gradient(circle, #e5e7eb 1px, transparent 1px) 0 0 / 24px 24px,
        #fafbfc;
    }
    .flow-viewport:active { cursor: grabbing; }
    .flow-stage {
      position: absolute;
      top: 50%; left: 50%;
      width: 1200px; height: 380px;
      margin-top: -190px; margin-left: -600px;
      transform-origin: center center;
      transition: transform 0.18s ease-out;
      pointer-events: none;
      user-select: none;
    }
    .flow-stage svg { width: 100%; height: 100%; display: block; }
    .flow-stage-erd {
      /* width/height/margin set inline after Mermaid renders */
      width: 0; height: 0; margin: 0;
    }
    .flow-stage-erd .mermaid { background: transparent; display: block; }
    .flow-stage-erd svg { display: block; }
    /* v0.3.9+ Multi-flow stage: SVGs render at natural size (not stretched). */
    .flow-stage-flow { padding: 28px 24px; }
    .flow-stage-flow svg { width: auto !important; height: auto !important; max-width: 100%; display: block; margin: 0 auto; }
    /* v0.3.14 — Wireflow: clickable screen-name nodes + numbered note badges. */
    .flow-zoom-controls {
      position: absolute; bottom: 48px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 2px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-small);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .flow-zoom-btn {
      width: 36px; height: 36px;
      background: white; border: 0;
      cursor: pointer;
      font-family: var(--font-heading);
      font-size: var(--font-size-l); font-weight: var(--font-weight-bold);
      color: var(--text-active-primary);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .flow-zoom-btn:hover { background: var(--fill-hover-secondary); }
    .flow-zoom-btn:not(:last-child) { border-bottom: 1px solid var(--border); }
    .flow-zoom-readout {
      position: absolute; bottom: 16px; right: 16px; z-index: 10;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 4px 12px;
      font-family: var(--font-heading); font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      color: var(--text-active-secondary);
      box-shadow: var(--shadow-sm);
      pointer-events: none;
    }
    .flow-hint {
      position: absolute; bottom: 16px; left: 16px; z-index: 10;
      background: rgba(28,31,34,0.85);
      color: white;
      border-radius: var(--radius-full);
      padding: 5px 12px;
      font-family: var(--font-body); font-size: var(--font-size-xs);
      pointer-events: none;
      opacity: 0; transition: opacity 0.2s;
    }
    .flow-canvas:hover .flow-hint { opacity: 1; }

    /* Flow legend (used by both User Flow and ERD tabs) */
    .flow-legend {
      flex: 0 0 280px;
      background: white;
      border: 1.5px dashed var(--neutral-20);
      border-radius: 18px;
      padding: 38px 22px 22px;
      position: relative;
      display: flex; flex-direction: column; gap: 14px;
      font-family: var(--font-body);
    }
    .flow-legend-tag {
      position: absolute; top: 12px; left: 16px;
      background: var(--neutral-10);
      padding: 4px 10px;
      border-radius: var(--radius-small);
      font-family: var(--font-heading);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      color: var(--text-active-secondary);
    }
    .flow-legend-title {
      font-family: var(--font-heading);
      font-size: var(--font-size-xxxl); font-weight: var(--font-weight-bold);
      color: var(--text-active-primary);
      margin: 8px 0 4px;
      line-height: var(--line-height-xxxl);
    }
    .flow-legend-shapes {
      display: flex; gap: 12px;
      align-items: center; justify-content: center;
      padding: 8px 0 4px;
    }
    .flow-legend-circle, .flow-legend-diamond {
      width: 96px; height: 96px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      text-align: center; line-height: var(--line-height-p-xs);
      flex-shrink: 0;
    }
    .flow-legend-circle { background: #1c1f22; color: white; border-radius: 50%; }
    .flow-legend-diamond {
      background: #F6C000; color: #1c1f22;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }
    .flow-legend-pill {
      border-radius: 14px;
      padding: 12px 16px;
      text-align: center;
    }
    .flow-legend-pill .en {
      font-family: var(--font-heading);
      font-size: var(--font-size-s); font-weight: var(--font-weight-bold);
      line-height: var(--line-height-p-s);
    }
    .flow-legend-pill .vn {
      font-family: var(--font-body);
      font-size: var(--font-size-xs); margin-top: 2px; opacity: 0.9;
    }
    .flow-legend-pill-blue { background: #4A90D9; color: white; }
    .flow-legend-pill-gray { background: #E5E7EB; color: #1c1f22; }

    /* ERD legend pieces */
    .erd-legend-entity {
      background: white;
      border: 1.5px solid var(--neutral-20);
      border-radius: 10px;
      overflow: hidden;
      font-family: var(--font-body);
      font-size: var(--font-size-xs);
    }
    .erd-legend-entity-head {
      background: #1c1f22; color: white;
      padding: 6px 12px;
      font-family: var(--font-heading); font-weight: var(--font-weight-bold);
      letter-spacing: 0.05em; font-size: var(--font-size-xs);
    }
    .erd-legend-entity-row {
      display: flex; justify-content: space-between;
      padding: 6px 12px;
      border-top: 1px solid var(--neutral-10);
      color: var(--text-active-secondary);
    }
    .erd-legend-entity-row span:last-child {
      color: var(--text-active-primary);
      font-family: var(--font-heading); font-weight: var(--font-weight-bold);
    }
    .erd-legend-rels {
      display: flex; flex-direction: column; gap: 10px;
      background: white;
      border-radius: 10px;
      padding: 12px;
    }
    .erd-legend-rels-title {
      font-family: var(--font-heading);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }
    .erd-legend-rel {
      display: grid;
      grid-template-columns: 36px 60px 1fr;
      align-items: center; gap: 10px;
      font-size: var(--font-size-xs); font-family: var(--font-body);
    }
    .erd-legend-rel .lbl {
      font-family: var(--font-heading); font-weight: var(--font-weight-bold);
      color: var(--text-active-primary);
    }
    .erd-legend-rel svg { width: 60px; height: 14px; display: block; }
    .erd-legend-rel .desc { color: var(--text-active-secondary); }

    @media (max-width: 1080px) {
      .flow-layout { flex-direction: column; }
      .flow-legend { flex: 0 0 auto; }
    }

    /* ========================================================================
       VARIANTS TAB — component playground
       ======================================================================== */
    .variant-section { margin-bottom: 52px; }
    .variant-meta {
      font-family: var(--font-body);
      font-size: var(--font-size-s);
      color: var(--text-active-secondary);
      margin: 4px 0 14px;
    }
    .variant-ctrls {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .variant-ctrl {
      height: 32px; padding: 0 14px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-family: var(--font-heading);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      color: var(--text-active-secondary);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .variant-ctrl:hover {
      border-color: var(--text-active-secondary);
      color: var(--text-active-primary);
    }
    .variant-ctrl.active {
      background: var(--neutral-90);
      border-color: var(--neutral-90);
      color: white;
    }
    .variant-preview {
      border: 1px solid var(--border);
      border-radius: var(--radius-medium);
      padding: 24px;
      background: var(--bg-soft);
      overflow: auto;
    }

    /* ========================================================================
       PLACEHOLDER (used by empty Prototype tab)
       ======================================================================== */
    .placeholder-card {
      max-width: 560px;
      margin: 80px auto;
      background: white;
      border: 1px dashed var(--border);
      border-radius: var(--radius-large);
      padding: 40px;
      text-align: center;
    }
    .placeholder-card h2 {
      font-family: var(--font-heading);
      font-size: var(--font-size-xxl);
      margin: 0 0 12px;
    }
    .placeholder-card p {
      color: var(--text-active-secondary);
      font-size: var(--font-size-s);
      line-height: var(--line-height-p-s);
      margin: 0 0 8px;
    }
    .placeholder-card code {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: var(--font-size-s);
      background: var(--neutral-10);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ===== Prototype tab — device preview + browser/app chrome (v1.5) =====
       Toolbar (shell toggle + device switcher) now lives in the page-header CTA slot.
       4 fixed device sizes; the frame scales to fit the column via fitProtoFrame(). */
    .proto-header-tools { display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:flex-end; }
    .proto-shell-toggle { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
    .proto-shell-btn { height:32px; display:inline-flex; align-items:center; border:0; background:transparent;
      padding:0 14px; font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body);
      color:var(--text-active-secondary); cursor:pointer; transition:background .12s, color .12s; }
    .proto-shell-btn + .proto-shell-btn { border-left:1px solid var(--border); }
    .proto-shell-btn.active { background:var(--brand); color:#fff; }
    /* Device switcher as a connected segmented tab group (matches the Browser | App toggle). */
    .proto-toolbar { display:inline-flex; align-items:center; border:1px solid var(--border);
      border-radius:8px; overflow:hidden; background:#fff; }
    /* Standalone structure toggle — sits after the device group with a visual separator. */
    .proto-struct-btn {
      display:inline-flex; align-items:center; justify-content:center; width:36px; height:32px;
      border:1px solid var(--border); border-radius:8px; background:#fff;
      color:var(--text-active-secondary); cursor:pointer; transition:background .12s, color .12s, border-color .12s;
      flex-shrink:0;
    }
    .proto-struct-btn:hover { color:var(--text-active-primary); border-color:var(--brand); }
    .proto-struct-btn.is-active { background:var(--brand); color:#fff; border-color:var(--brand); }
    .proto-header-divider { width:1px; height:20px; background:var(--border); flex-shrink:0; }
    /* Role switcher + sandbox Reset (v1.5) — sit in the header tools, styled like the sibling controls. */
    .proto-role-select {
      height:2rem; max-width:12rem; padding:0 1.75rem 0 0.75rem;
      border:1px solid var(--border); border-radius:var(--radius-small); background:var(--neutral-0);
      color:var(--text-active-primary); cursor:pointer; flex-shrink:0;
      font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body);
      transition:border-color .12s, color .12s;
    }
    .proto-role-select:hover { border-color:var(--brand); color:var(--brand); }
    .proto-reset-btn {
      height:2rem; display:inline-flex; align-items:center; padding:0 0.85rem; flex-shrink:0;
      border:1px solid var(--border); border-radius:var(--radius-small); background:var(--neutral-0);
      color:var(--text-active-secondary); cursor:pointer;
      font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body);
      transition:background .12s, color .12s, border-color .12s;
    }
    .proto-reset-btn:hover { color:var(--text-active-primary); border-color:var(--brand); }
    /* v1.5 — ⋯ sandbox menu button (styled like the structure toggle) + its popover contents. */
    .proto-menu-btn {
      display:inline-flex; align-items:center; justify-content:center; width:36px; height:32px;
      border:1px solid var(--border); border-radius:8px; background:#fff;
      color:var(--text-active-secondary); cursor:pointer; transition:background .12s, color .12s, border-color .12s;
      flex-shrink:0;
    }
    .proto-menu-btn:hover { color:var(--text-active-primary); border-color:var(--brand); }
    .proto-menu-overline { font: var(--font-weight-bold) var(--font-size-xs)/1.4 var(--font-body);
      text-transform:uppercase; letter-spacing:.06em; color:var(--text-tertiary); margin:0.75rem 0 0.25rem; }
    .proto-menu-overline:first-of-type { margin-top:0; }
    .proto-menu-row .proto-role-select { width:100%; max-width:100%; }
    /* Reset = a flat list row (like the role rows / the reference menu items), not a button */
    .proto-menu-item {
      display:flex; width:100%; align-items:center; padding:0.55rem 0.6rem; margin:0;
      border:0; border-radius:var(--radius-small); background:transparent;
      color:var(--text-active-primary); cursor:pointer; text-align:left;
      font: var(--font-weight-medium) var(--font-size-s)/1.2 var(--font-body);
      transition:background .12s, color .12s;
    }
    .proto-menu-item:hover { background:var(--neutral-10); }
    /* full-width divider — bleeds past the 18px popover padding */
    .proto-menu-hr { height:1px; background:var(--border); margin:0.6rem -18px; }
    /* role LIST (not a dropdown/buttons): each row = name + JTBD description; active row checked */
    .proto-role-list { display:flex; flex-direction:column; gap:0.125rem; }
    .proto-role-item {
      display:flex; flex-direction:row; align-items:center; gap:0.55rem; width:100%; text-align:left;
      padding:0.55rem 0.6rem; border:0; border-radius:var(--radius-small); background:transparent; cursor:pointer;
      transition:background .12s;
    }
    .proto-role-item:hover { background:var(--neutral-10); }
    .proto-role-item.is-active { background:transparent; }   /* selection reads from the radio, not a fill */
    /* leading radio — replaces the check glyph; filled dot when the role is active */
    .proto-role-radio {
      flex:0 0 auto; margin-left:auto; width:1rem; height:1rem; border-radius:50%;
      border:1.5px solid var(--border); background:transparent; position:relative; transition:border-color .12s;
    }
    .proto-role-item:hover .proto-role-radio { border-color:var(--text-tertiary); }
    .proto-role-radio.is-on { border-color:var(--brand); }
    .proto-role-radio.is-on::after { content:''; position:absolute; inset:0.22rem; border-radius:50%; background:var(--brand); }
    .proto-role-item-body { display:flex; flex-direction:column; gap:0.15rem; min-width:0; flex:1 1 auto; }
    .proto-role-item-head { display:flex; align-items:center; gap:0.4rem; }
    .proto-role-item-name { font: var(--font-weight-bold) var(--font-size-s)/1.2 var(--font-body); color:var(--text-active-primary); }
    .proto-role-item.is-active .proto-role-item-name { color:var(--brand); }
    .proto-role-badge { font: var(--font-weight-bold) var(--font-size-xxs)/1 var(--font-body);
      text-transform:uppercase; letter-spacing:.04em; color:var(--brand); background:var(--brand-soft);
      border-radius:999px; padding:0.15rem 0.4rem; }
    .proto-role-item-desc { font: var(--font-weight-medium) var(--font-size-xs)/1.4 var(--font-body); color:var(--text-tertiary); }
    /* v1.5 — inspect overlay (⌥-hover): highlight box + name-path label, both fixed & click-through */
    .pb-inspect-box { position:fixed; z-index:1400; pointer-events:none; display:none;
      border:2px solid var(--brand); border-radius:4px; background:var(--brand-soft); }
    .pb-inspect-label { position:fixed; z-index:1401; pointer-events:none; display:none; flex-direction:column; gap:0.1rem;
      max-width:60vw; background:#0f172a; color:#fff; border-radius:6px; padding:0.35rem 0.5rem;
      font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:var(--font-size-xs); line-height:1.35;
      box-shadow:0 6px 20px rgba(0,0,0,.28); }
    .pb-inspect-label .pb-inspect-path { white-space:nowrap; }
    .pb-inspect-label .pb-inspect-hint { color:#9aa4b2; white-space:normal; font-size:0.6875rem; }
    .proto-device-btn { display:inline-flex; align-items:center; justify-content:center; width:44px; height:32px;
      border:0; border-radius:0; background:transparent; color:var(--text-active-secondary);
      cursor:pointer; transition:background .12s, color .12s; }
    .proto-device-btn + .proto-device-btn { border-left:1px solid var(--border); }
    .proto-device-btn:hover:not(:disabled):not(.is-disabled) { color:var(--text-active-primary); background:var(--neutral-5, #f6f7f9); }
    .proto-device-btn.active { background:var(--brand); color:#fff; }
    .proto-device-btn:disabled, .proto-device-btn.is-disabled { opacity:.38; cursor:not-allowed; }
    .proto-main { display:flex; min-height:0; flex:1 1 auto; min-width:0; height:100%; }
    .proto-stage { flex:1 1 auto; min-width:0; min-height:0; overflow:auto; }
    .proto-fit { height:100%; display:flex; justify-content:center; align-items:flex-start; }
    .proto-frame { background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden;
      box-shadow:0 10px 34px rgba(15,23,42,.12); transform-origin:top center; flex:0 0 auto;
      display:flex; flex-direction:column; }
    .proto-frame--tablet { border:10px solid #1c1f22; border-radius:26px; }
    .proto-frame--mobile { border:12px solid #1c1f22; border-radius:38px; }
    .proto-screen { overflow:auto; background:#fff; }
    /* Browser chrome — tab strip + nav bar */
    .proto-tabbar { display:flex; align-items:flex-end; gap:6px; height:40px; padding:8px 10px 0; background:var(--neutral-10); border-bottom:1px solid var(--border); }
    .proto-tab { display:inline-flex; align-items:center; gap:8px; max-width:260px; height:32px; padding:0 13px;
      background:#fff; border:1px solid var(--border); border-bottom:0; border-radius:9px 9px 0 0;
      font: var(--font-weight-medium) var(--font-size-xs)/32px var(--font-body); color:var(--text-active-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .proto-tab.active { color:var(--text-active-primary); font-weight: var(--font-weight-bold); }
    .proto-tab-x { cursor:pointer; color:var(--text-tertiary); font-size: var(--font-size-base); line-height: var(--line-height-base); flex-shrink:0; }
    .proto-tab-x:hover { color:var(--danger); }
    .proto-newtab { width:28px; height:28px; border-radius:6px; border:0; background:transparent; color:var(--text-tertiary);
      font-size: var(--font-size-l); line-height: var(--line-height-l); cursor:pointer; flex-shrink:0; }
    .proto-newtab:hover { background:rgba(0,0,0,.06); color:var(--text-active-primary); }
    .proto-navbar { display:flex; align-items:center; gap:8px; height:42px; padding:0 12px; background:var(--neutral-10); border-bottom:1px solid var(--border); }
    .proto-navbtn { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:#fff;
      color:var(--text-active-secondary); cursor:pointer; font-size: var(--font-size-base); line-height: var(--line-height-base); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .proto-navbtn:hover:not(:disabled) { border-color:var(--text-tertiary); color:var(--text-active-primary); }
    .proto-navbtn:disabled { opacity:.4; cursor:not-allowed; }
    .proto-urlbar { flex:1; height:27px; background:#fff; border-radius:7px; border:1px solid var(--border);
      font:var(--font-size-xs)/27px var(--font-body); color:var(--text-tertiary); padding:0 12px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    /* App chrome — slim titlebar (desktop-class) or bezel notch (tablet/mobile) */
    .proto-appbar { height:38px; display:flex; align-items:center; padding:0 16px; background:var(--neutral-10); border-bottom:1px solid var(--border); }
    .proto-appbar-title { font: var(--font-weight-bold) var(--font-size-s)/var(--line-height-s) var(--font-body); color:var(--text-active-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    /* Device status bar — clock + signal/wifi/battery, contrast color picked from the screen bg */
    .proto-statusbar { position:relative; height:40px; display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; background:#fff; }
    .proto-sb-time { font: var(--font-weight-bold) var(--font-size-s)/var(--line-height-s) var(--font-body); min-width:60px; letter-spacing:.2px; }
    .proto-sb-icons { display:inline-flex; align-items:center; gap:6px; }
    .proto-sb-icons svg { display:block; }
    .proto-sb-island { position:absolute; left:50%; top:9px; transform:translateX(-50%);
      width:30%; max-width:118px; height:22px; background:#000; border-radius:14px; }
    .proto-statusbar--dark  { color:#1c1f22; }
    .proto-statusbar--light { color:#ffffff; }
    .proto-toast-wrap { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:9999;
      display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }
    .proto-toast { background:#0f172a; color:#fff; font-family:var(--font-body); font-size: var(--font-size-s);
      padding:10px 16px; border-radius:8px; box-shadow:0 8px 24px rgba(15,23,42,.28); max-width:90vw;
      opacity:0; transform:translateY(8px); transition:opacity .2s ease, transform .2s ease; }
    .proto-toast.in { opacity:1; transform:translateY(0); }
    /* UI Design — component state-variant demos + sub-tab count */
    .handoff-variants { display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start; }
    .handoff-variant { display:flex; flex-direction:column; gap:6px; flex:1 1 220px; min-width:200px; }
    .handoff-variant-label { font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body); letter-spacing:0.05em; text-transform:uppercase; color:var(--text-tertiary); }
    .handoff-variant-demo { padding:14px; border:1px dashed var(--border); border-radius:8px; background:var(--neutral-0, #fff); }
    .meta-subtab-count { font-size: var(--font-size-xs); opacity:.55; margin-left:2px; }
    /* UX Design — sidebar scrolls internally (1 viewport); story/test lists */
    .flow-doc-side { overflow-y:auto; max-height:calc(100vh - 210px); }
    .flow-doc-path { margin-top:4px; font-size: var(--font-size-xs); color:var(--text-tertiary); }
    .flow-doc-checks { margin:6px 0 0; padding-left:2px; list-style:none; display:flex; flex-direction:column; gap:4px; }
    .flow-doc-checks li { font-size: var(--font-size-xs); color:var(--text-active-secondary); }
    /* Data — one styled table per entity (Table view) */
    .erd-tables { display:flex; flex-direction:column; gap:22px; }
    .erd-entity-title { margin:0 0 8px; font-family: var(--font-heading); font-size: var(--font-size-base); font-weight: var(--font-weight-bold); color:var(--text-active-primary); }
    .erd-entity-table { width:100%; border-collapse:collapse; font-size: var(--font-size-s); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .erd-entity-table th { text-align:left; font: var(--font-weight-bold) var(--font-size-xs)/var(--line-height-xs) var(--font-body); text-transform:uppercase; letter-spacing:0.05em; color:var(--text-tertiary); background:var(--neutral-10, #f8fafc); padding:9px 12px; }
    .erd-entity-table td { border-top:1px solid var(--border); padding:9px 12px; color:var(--text-active-primary); vertical-align:top; }
    .erd-entity-table tbody tr:nth-child(even) td { background: var(--neutral-5, #f6f7f9); }
    .erd-type-chip { font-size: var(--font-size-xs); font-family: 'SF Mono', Menlo, monospace;
      background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius-small);
      padding: 1px 5px; color: var(--text-active-secondary); }
    /* v1.5 — Data single-column toolbar, data-set variants, fixed column alignment, legend */
    .erd-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .erd-entity-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
    .erd-entity-head .erd-entity-title { margin:0; }
    .erd-entity-variants { display:flex; align-items:center; flex-wrap:wrap; gap:6px; }
    .erd-fixed { table-layout:fixed; }
    .erd-fixed th:nth-child(1), .erd-fixed td:nth-child(1) { width:24%; }
    .erd-fixed th:nth-child(2), .erd-fixed td:nth-child(2) { width:20%; }
    .erd-fixed th:nth-child(3), .erd-fixed td:nth-child(3) { width:28%; }
    .erd-fixed th:nth-child(4), .erd-fixed td:nth-child(4) { width:28%; }
    .erd-fixed td { word-break:break-word; }
    .erd-legend-mini svg { width:38px; height:12px; display:block; }
    .erd-legend-svgwrap { display:inline-flex; width:56px; flex-shrink:0; }
    .erd-legend-svgwrap svg { width:56px; height:14px; }
  </style>

  <!-- Mermaid CDN — used by the ERD tab. Keep this even if you don't ship ERD;
       it's a small script and lets agents toggle it on at any time. -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>

<body>
  <div id="meta-nav"></div>
  <div id="app"></div>

  <script>
    /* =========================================================================
       STATE LOADER (v1.1.1) — state lives in registry.json, NOT here.
       /pb:build --render inlines registry.json into PB_REGISTRY below (replacing
       the null between the markers). adaptRegistryToPBData() maps the registry
       schema onto the PB_DATA shape every render function already reads, so the
       render machinery is unchanged. A null registry → the empty default,
       identical to a blank template. Runtime UI mutations (view / selection) land
       on the in-memory PB_DATA only and never write back to registry.json.
       ========================================================================= */
    const PB_REGISTRY = /*__PB_REGISTRY_START__*/ null /*__PB_REGISTRY_END__*/;
    const PB_SHELL_VERSION = "{{PB_SHELL_VERSION}}";   /* filled by render.build_html; 'unknown' if unfilled */

    function pbEmptyData() {
      return {
        overview: { objectives: null, principles: [] },
        userInsights: { quantitative: null, researchSummary: null, executiveSummary: null },
        uiLogicTradeoffs: [],
        others: null,
        handoff: { view: 'component', organisms: [], screens: [], selectedScreenId: null, selectedElementId: null },
        staleness: {
          flow: { lastSyncedPromptCount: 0, currentPromptCount: 0 },
          handoffScreen: { lastSyncedPromptCount: 0, currentPromptCount: 0 },
          erd: { lastSyncedPromptCount: 0, currentPromptCount: 0 },
        },
        flow: { populated: false },
        erd: { populated: false },
      };
    }

    // registry.json schema → PB_DATA shape. `components` are the handoff organisms
    // (same object shape); `meta.*` carries the Project Summary content.
    function adaptRegistryToPBData(reg) {
      if (!reg) return pbEmptyData();
      const d = pbEmptyData();
      const m = reg.meta || {};
      if (m.overview)     d.overview     = m.overview;
      if (m.userInsights) d.userInsights = m.userInsights;
      if (m.tradeoffs)    d.uiLogicTradeoffs = m.tradeoffs;
      if (m.others !== undefined && m.others !== null) d.others = m.others;
      d.handoff.organisms = reg.components || [];
      d.handoff.screens   = reg.screens || [];
      if (reg.staleness) d.staleness = reg.staleness;
      if (reg.flow) d.flow = reg.flow;
      if (reg.erd)  d.erd  = reg.erd;
      return d;
    }

    // Apply registry design tokens onto :root (overrides the static fallbacks in <style>).
    function applyRegistryTokens(reg) {
      if (!reg || !reg.tokens) return;
      const root = document.documentElement;
      Object.keys(reg.tokens).forEach(function (name) {
        const t = reg.tokens[name];
        if (t && t.value != null) root.style.setProperty('--' + name, t.value);
      });
    }

    const PB_DATA = adaptRegistryToPBData(PB_REGISTRY);

    /* =========================================================================
       STATE — minimal app state
       Add your prototype's state fields below the metaView line.
       ========================================================================= */
    const state = {
      metaView: 'prototype',          // 'prototype' | 'summary' | 'flow' | 'handoff' | 'erd'
      summarySubTab: 'overview',      // 'overview' | 'insights' | 'tradeoffs' | 'others' (v0.3.0)
      handoffDrawerOpenFor: null,     // null | <organism.id> — opens right-side drawer (v0.3.0)
      handoffDrawerSegment: 'anatomy', // 'anatomy' | 'spec' | 'uiLogic' | 'usage' (v0.3.17)
      screenDrawerOpenFor: null,      // null | element.id — screen-view element drawer (v0.3.18)
      screenDrawerSegment: 'spec',    // 'spec' | 'uiLogic' | 'demo' (v0.3.18)
      protoDevice: null,              // 'monitor' | 'laptop' | 'tablet' | 'mobile' — defaults from meta.device
      protoShell: null,               // 'browser' | 'app' — display chrome; defaults from meta.shell
      protoHistory: [],               // screen-id stack for the browser back button
      protoTabs: [],                  // cosmetic extra browser tabs (the "+" new-tab affordance)
      handoffScope: null,            // 'global' | 'local' — UI Design component sub-tab
      erdView: null,                 // 'diagram' | 'table' — Data tab view mode
      erdVariant: {},                // { <entity>: 'schema' | <mock label> } — per-table data set (4.4)
      flowIndex: 0,                  // index into flow.flows[] (multi-flow dropdown)
      activeRole: null,              // resolved meta.defaultRole — the role the sandbox previews as (v1.5)
      /* TODO: add your app state here, e.g.:
         user: null,
         currentScreen: 'home',
         items: [],
      */
    };

    const $  = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

    /* Icon helper (DS-agnostic) — set the icon source via registry config.iconCdn (e.g. your
       design system's SVG CDN). Leave it unset to fall back to an inline SVG placeholder. */
    const ICON_CDN = (PB_REGISTRY && PB_REGISTRY.config && PB_REGISTRY.config.iconCdn) || '';
    /* View-only mode (set by /pb:handoff-close --people): hides every authoring CTA. */
    const VIEW_ONLY = !!(PB_REGISTRY && PB_REGISTRY.config && PB_REGISTRY.config.viewOnly);
    function safeIcon(name, size = 16) {
      if (ICON_CDN) {
        return `<img src="${ICON_CDN}${name}.svg" width="${size}" height="${size}" alt=""
          style="display:inline-block;vertical-align:middle;flex-shrink:0">`;
      }
      return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" aria-hidden="true"
        style="display:inline-block;vertical-align:middle;flex-shrink:0">
        <rect x="2" y="2" width="12" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>`;
    }

    /* =========================================================================
       RENDER — top-level dispatcher
       ========================================================================= */
    function render() {
      renderMetaNav();
      if (state.metaView === 'prototype') renderPrototype();
      else renderMetaPanel();
    }

    /* =========================================================================
       META-NAV — 5-tab bar at the top
       ========================================================================= */
    function renderMetaNav() {
      const tabs = [
        ['prototype', 'Prototype'],
        ['summary',   'Project Summary'],
        ['flow',      'UX Design',    'flow'],
        ['handoff',   'UI Design',    'handoffScreen'],
        ['erd',       'Data',         'erd'],
      ];
      const el = document.getElementById('meta-nav');
      if (!el) return;
      el.className = 'meta-nav';
      el.innerHTML = tabs.map(([id, label, staleKey]) => {
        const stale = staleKey && pbStalenessGap(staleKey);
        const badge = stale > 0
          ? `<span class="meta-tab-stale" title="Stale: ${stale} prompts since last sync">${stale}</span>`
          : '';
        return `<button class="meta-tab ${state.metaView === id ? 'active' : ''}"
                 onclick="setMetaView('${id}')">${label}${badge}</button>`;
      }).join('') +
        `<button class="meta-sandbox" onclick="openSandboxMenu(this)" aria-haspopup="dialog" aria-label="Sandbox tools">
           <span class="meta-sandbox-dot" aria-hidden="true"></span><span>Sandbox</span>
           <svg class="meta-sandbox-car" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
         </button>`;
    }

    /* Returns the # of prompts elapsed since this tab's last sync, or 0 if fresh. */
    function pbStalenessGap(key) {
      const s = (PB_DATA && PB_DATA.staleness && PB_DATA.staleness[key]) || null;
      if (!s) return 0;
      const gap = (s.currentPromptCount || 0) - (s.lastSyncedPromptCount || 0);
      return gap > 0 ? gap : 0;
    }
    function setMetaView(v) { state.metaView = v; render(); window.scrollTo({top: 0}); }
    function setSummarySubTab(v) { state.summarySubTab = v; renderMetaSummary(); }
    function setHandoffScope(v) { state.handoffScope = v; renderHandoff(); }
    function setErdView(v) { state.erdView = v; renderMetaERD(); }
    function setErdVariant(entity, key) { state.erdVariant = state.erdVariant || {}; state.erdVariant[entity] = key; renderMetaERD(); }
    function setFlowIndex(i) { state.flowIndex = parseInt(i, 10) || 0; renderMetaFlow(); }
    function openHandoffDrawer(id) { state.handoffDrawerOpenFor = id; state.handoffDrawerSegment = 'anatomy'; renderHandoff(); }
    function closeHandoffDrawer() { state.handoffDrawerOpenFor = null; renderHandoff(); }
    function setHandoffDrawerSegment(s) { state.handoffDrawerSegment = s; renderHandoff(); }
    function openScreenDrawer(id) { state.screenDrawerOpenFor = id; state.screenDrawerSegment = 'spec'; renderHandoff(); }
    function closeScreenDrawer() { state.screenDrawerOpenFor = null; renderHandoff(); }
    function setScreenDrawerSegment(s) { state.screenDrawerSegment = s; renderHandoff(); }
    function openComponentTab(orgId) { state.screenDrawerOpenFor = null; setHandoffView('component'); setTimeout(function(){ openHandoffDrawer(orgId); }, 60); }

    /* Copy a command to clipboard + show a toast + flash the source button.
       `btn` is optional — pass the clicked button element for inline ✓ Copied feedback.
       `dest` is optional — 'claude' | 'terminal' | 'auto' (default). Auto-detect by
       command prefix: starts with '/' → Claude Code; else → Terminal. (v0.3.3) */
    function copyAndToast(command, label, btn, dest) {
      const destination = (function () {
        const d = (dest || 'auto').toLowerCase();
        if (d === 'claude') return 'Claude Code';
        if (d === 'terminal') return 'Terminal';
        return command.trim().startsWith('/') ? 'Claude Code' : 'Terminal';
      })();
      const fallback = () => {
        const ta = document.createElement('textarea');
        ta.value = command;
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) { /* silent */ }
        document.body.removeChild(ta);
      };
      const flashBtn = () => {
        if (!btn || btn._syncFlashing) return;
        btn._syncFlashing = true;
        const original = btn.innerHTML;
        btn.innerHTML = '✓ Copied';
        btn.classList.add('is-copied');
        btn.disabled = true;
        setTimeout(() => {
          btn.innerHTML = original;
          btn.classList.remove('is-copied');
          btn.disabled = false;
          btn._syncFlashing = false;
        }, 1500);
      };
      const showToast = (ok) => {
        document.querySelectorAll('.sync-toast').forEach(prev => prev.remove());
        const t = document.createElement('div');
        t.className = 'sync-toast';
        t.textContent = ok
          ? `Copied — paste with ⌘V to run "${command}"`
          : `Copy failed. Command: ${command}`;
        document.body.appendChild(t);
        setTimeout(() => t.classList.add('is-visible'), 10);
        setTimeout(() => {
          t.classList.remove('is-visible');
          setTimeout(() => t.remove(), 220);
        }, 5000);
      };
      flashBtn();
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(command).then(() => showToast(true), () => { fallback(); showToast(true); });
      } else {
        fallback(); showToast(true);
      }
    }

    /* Esc closes the handoff drawer. */
    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        if (state.handoffDrawerOpenFor) closeHandoffDrawer();
        else if (state.screenDrawerOpenFor) closeScreenDrawer();
      }
    });

    /* ===========================================================================
       v0.3.5 — Copy popover. Replaces the old fire-and-forget toast for sync /
       generate CTAs. Opens an anchored card with the command, a copy icon,
       a "✓ Copied" status line, and clear destination guidance (Claude Code
       conversation vs Terminal). Auto-copies on open; users can re-copy via
       the icon button. Close: × / click outside / Esc.
       =========================================================================== */
    const COPY_POPOVER_ICONS = {
      copy:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
      claude:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
      terminal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="6 9 9 12 6 15"/><line x1="12" y1="15" x2="16" y2="15"/></svg>',
      close:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>',
    };

    /* v0.3.7 — One command, two representations.
       Terminal gets the slash form. Chat input gets a short natural-language
       prompt that mentions the command name as a keyword — Claude follows
       the routing rule in CLAUDE.md to find and execute the actual body. */

    const COMMAND_HINTS = {
      '/pb:init':        'Scaffold the project — PRD intake, stack + DS locks, seeds registry.json.',
      '/pb:specify':     'Write the spec — prototype-shaped user stories with JTBD and tab mapping.',
      '/pb:clarify':     'Capture user insights and UI-logic trade-offs into the Project Summary.',
      '/pb:plan':        'Generate the implementation plan and per-tab task breakdown.',
      '/pb:build':       'Patch registry.json (trio-gated). Add --render to regenerate prototype.html.',
      '/pb:preview':     'Start the live dev server — watches registry.json and live-reloads the browser.',
      '/pb:flow':   'Generate the UX Design tab — Mermaid wireflow + QA test checklist.',
      '/pb:data':    'Generate the Data tab — field/type table + Mermaid ERD with PK/FK guardrails.',
      '/pb:check-drift': 'Audit the trio against the constitution. Read-only — no writes.',
      '/pb:handoff-close':    '--people for a view-only prototype, --context for a portable bundle.',
      '/pb:validate':    'Wrap prototype.html in a runnable Vite/Next reference build.',
      '/pb:update-version': 'Run versioned schema updates. Dry-run by default; use --apply to execute.',
    };

    const CHAT_PROMPTS = {
      '/pb:init':        'Run /pb:init to scaffold this project — PRD intake, set the Stack + DS locks, seed registry.json + memory/.',
      '/pb:specify':     'Run /pb:specify to produce the spec/PRD — prototype-shaped user stories with JTBD and the tabs each affects.',
      '/pb:clarify':     'Run /pb:clarify to capture user insights + UI-logic trade-offs into the Project Summary and decisions.md.',
      '/pb:plan':        'Run /pb:plan to produce the implementation plan + a per-tab task breakdown (each task: acceptance + skill).',
      '/pb:build':       'Run /pb:build to apply a targeted registry.json patch (trio-gated); add --render to regenerate prototype.html.',
      '/pb:preview':     'Run /pb:preview to start the live dev server — it watches registry.json + render/*.js and reloads the browser.',
      '/pb:flow':   'Run /pb:flow to (re)generate the UX Design tab — a Mermaid wireflow plus a QA test checklist.',
      '/pb:data':    'Run /pb:data to (re)generate the Data tab — a field/type/example table plus a Mermaid erDiagram (PK/FK/cardinality guardrails).',
      '/pb:check-drift': 'Run /pb:check-drift to audit the trio (screens, components, logic) against the constitution (report-only, no writes).',
      '/pb:handoff-close':    'Run /pb:handoff-close --people for a view-only self-documenting prototype.html, or --context for a portable bundle.',
      '/pb:validate':    'Run /pb:validate to scaffold a runnable reference build from prototype.html.',
      '/pb:update-version': 'Run /pb:update-version to apply a versioned registry schema update (dry-run by default; --apply to execute).',
    };
    function chatPromptFor(slashCommand) {
      if (CHAT_PROMPTS[slashCommand]) return CHAT_PROMPTS[slashCommand];
      const bare = slashCommand.replace(/^\//, '');
      return `Run ${bare} in this Claude Code session.`;
    }

    function copyCommandToClipboard(command) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(command).catch(() => copyCommandFallback(command));
      }
      copyCommandFallback(command);
      return Promise.resolve();
    }
    function copyCommandFallback(command) {
      const ta = document.createElement('textarea');
      ta.value = command;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) { /* silent */ }
      document.body.removeChild(ta);
    }
    function escapeHtmlAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function openCopyPopover(command, anchorBtn, dest) {
      const hint = COMMAND_HINTS[command.trim()];
      copyAndToast(command, hint || null, anchorBtn, dest);
    }

    function closeCopyPopover() {
      const pop = document.querySelector('.copy-popover');
      const bd  = document.querySelector('.copy-popover-backdrop');
      if (pop) {
        pop.classList.remove('is-visible');
        setTimeout(() => { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 180);
      }
      if (bd && bd.parentNode) bd.parentNode.removeChild(bd);
      window.removeEventListener('keydown', copyPopoverKeyHandler);
      window.removeEventListener('resize', repositionCopyPopover);
      copyPopoverAnchor = null;
    }
    function copyPopoverKeyHandler(e) {
      if (e.key === 'Escape') closeCopyPopover();
    }

    let copyPopoverAnchor = null;
    function positionCopyPopover(pop, anchorBtn) {
      copyPopoverAnchor = anchorBtn;
      if (!anchorBtn) {
        pop.style.top  = '90px';
        pop.style.left = (window.innerWidth / 2 - pop.offsetWidth / 2) + 'px';
        return;
      }
      const aRect = anchorBtn.getBoundingClientRect();
      const pW = pop.offsetWidth  || 360;
      const pH = pop.offsetHeight || 220;
      const gap = 10;
      const margin = 12;

      let top  = aRect.bottom + gap;
      if (top + pH > window.innerHeight - margin) {
        top = Math.max(margin, aRect.top - pH - gap);
      }
      let left = aRect.left + aRect.width / 2 - pW / 2;
      left = Math.max(margin, Math.min(left, window.innerWidth - pW - margin));

      pop.style.top  = top + 'px';
      pop.style.left = left + 'px';
    }
    function repositionCopyPopover() {
      const pop = document.querySelector('.copy-popover');
      if (pop && copyPopoverAnchor) positionCopyPopover(pop, copyPopoverAnchor);
    }

    function recopyFromPopover(btn) {
      const pop = btn.closest('.copy-popover');
      if (!pop) return;
      const command = btn.dataset.cmd || pop.dataset.command || '';
      copyCommandToClipboard(command);
      const status = pop.querySelector('[data-popover-status]');
      if (status) {
        status.textContent = 'Copied to clipboard';
        status.classList.remove('is-flash');
        void status.offsetWidth;
        status.classList.add('is-flash');
      }
    }

    /* v0.3.8 — Legend popover for the User Flow canvas. Reuses the .copy-popover
       shell for anchored positioning + dismiss behavior. */
    const FLOW_LEGEND_SHAPES = [
      { cls: 'shape-start',      glyph: '( )',   name: 'Start',           desc: 'Stadium — the entry point of the flow' },
      { cls: 'shape-end',        glyph: '( )',   name: 'End',             desc: 'Stadium — a terminal state (success or hard fail)' },
      { cls: 'shape-action',     glyph: '[ ]',   name: 'Action',          desc: 'Rectangle — a screen or user action' },
      { cls: 'shape-decision',   glyph: '?',     name: 'Decision',        desc: 'Diamond — a branching question, ends with ?' },
      { cls: 'shape-input',      glyph: '/ /',   name: 'Input / Output',  desc: 'Parallelogram — data entering or leaving' },
      { cls: 'shape-subprocess', glyph: '[[ ]]', name: 'Subprocess',      desc: 'Reusable sub-flow — detail lives in the test checklist' },
      { cls: 'shape-cylinder',   glyph: '( )',   name: 'External system', desc: 'Cylinder — database, API, third party' },
    ];
    function setFlowSideTab(tab) {
      document.querySelectorAll('.flow-side-panel').forEach(p => {
        p.hidden = (p.dataset.tab !== tab);
      });
      document.querySelectorAll('[data-tab].proto-shell-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
    }

    function openFigmaPushPanel(anchorBtn) {
      closeFigmaPushPanel();
      const organisms = (PB_DATA.handoff && PB_DATA.handoff.organisms) || [];
      const screens   = (PB_DATA.handoff && PB_DATA.handoff.screens)   || [];

      function statusBadge(org) {
        if (org.dsMatch) return '<span class="fp-badge fp-badge-reuse" title="Matched in the design system — pushed as an instance, not rebuilt">reuse</span>';
        if (!org.figmaId && !org.figmaComponentSetId) return '<span class="fp-badge fp-badge-new">new</span>';
        return '<span class="fp-badge fp-badge-update" title="Already in Figma — this push updates it">update</span>';
      }
      function screenStatus(s) {
        return s.figmaFrameId ? `<span class="fp-item-meta">frame ${s.figmaFrameId}</span>` : '<span class="fp-badge fp-badge-new">new</span>';
      }
      // Which screens reference this component (via elements[].orgId) — what an update affects.
      function screensUsing(orgId) {
        return screens.filter(s => (s.elements || []).some(e => e.orgId === orgId)).map(s => s.name);
      }

      const orgRows = organisms.map((o, i) => {
        const used = screensUsing(o.id);
        const isUpdate = !!(o.figmaId || o.figmaComponentSetId);
        const affected = used.length
          ? `<div class="fp-item-affected ${isUpdate ? 'is-warn' : ''}">${isUpdate ? '⚠ affects ' : 'Used in '}${used.length} screen${used.length !== 1 ? 's' : ''}: ${used.map(pbEscape).join(', ')}</div>`
          : `<div class="fp-item-affected fp-item-affected--muted">Not placed on any screen yet</div>`;
        return `
        <li class="fp-item fp-item--stacked" onclick="this.querySelector('input').click()">
          <div class="fp-item-row">
            <input type="checkbox" id="fp-org-${i}" data-fp-org="${pbEscape(o.id)}" checked onclick="event.stopPropagation();fpUpdateSummary()">
            <span class="fp-item-name">${pbEscape(o.name)}${statusBadge(o)}</span>
            <span class="fp-item-meta">${pbEscape(o.id)}</span>
          </div>
          ${affected}
        </li>`;
      }).join('');

      const scrRows = screens.map((s, i) => `
        <li class="fp-item" onclick="this.querySelector('input').click()">
          <input type="checkbox" id="fp-scr-${i}" data-fp-scr="${pbEscape(s.id)}" checked onclick="event.stopPropagation();fpUpdateSummary()">
          <span class="fp-item-name">${pbEscape(s.name)}</span>
          ${screenStatus(s)}
        </li>`).join('');

      const backdrop = document.createElement('div');
      backdrop.className = 'fp-backdrop';
      backdrop.onclick = closeFigmaPushPanel;

      const panel = document.createElement('div');
      panel.className = 'fp-panel';
      panel.id = 'fp-panel';
      panel.innerHTML = `
        <div class="fp-panel-head">
          <span class="fp-panel-title">Push to Figma</span>
          <button class="fp-panel-close" onclick="closeFigmaPushPanel()" aria-label="Close">×</button>
        </div>
        <div class="fp-panel-body">
          ${organisms.length ? `
            <div class="fp-section-head">
              <span class="fp-section-label">Components (${organisms.length})</span>
              <button class="fp-select-all" onclick="fpToggleAll('org')">Deselect all</button>
            </div>
            <ul class="fp-list">${orgRows}</ul>
          ` : ''}
          ${screens.length ? `
            <div class="fp-section-head">
              <span class="fp-section-label">Screens (${screens.length})</span>
              <button class="fp-select-all" onclick="fpToggleAll('scr')">Deselect all</button>
            </div>
            <ul class="fp-list">${scrRows}</ul>
          ` : ''}
        </div>
        <div class="fp-panel-foot">
          <span class="fp-summary" id="fp-summary"></span>
          <button class="fp-push-btn" id="fp-push-btn" onclick="fpConfirmPush(this)">Push selected →</button>
        </div>`;

      document.body.appendChild(backdrop);
      document.body.appendChild(panel);
      setTimeout(() => { panel.classList.add('is-visible'); fpUpdateSummary(); }, 10);
    }

    function closeFigmaPushPanel() {
      const p = document.getElementById('fp-panel');
      const b = document.querySelector('.fp-backdrop');
      if (p) { p.classList.remove('is-visible'); setTimeout(() => p.remove(), 200); }
      if (b) b.remove();
    }

    function fpToggleAll(type) {
      const boxes = document.querySelectorAll(`[data-fp-${type}]`);
      const anyChecked = Array.from(boxes).some(b => b.checked);
      boxes.forEach(b => { b.checked = !anyChecked; });
      // update button label
      const head = type === 'org'
        ? document.querySelector('.fp-section-label:first-of-type + button')
        : null;
      document.querySelectorAll('.fp-select-all').forEach(btn => {
        const t = btn.getAttribute('onclick').includes("'org'") ? 'org' : 'scr';
        const bs = document.querySelectorAll(`[data-fp-${t}]`);
        const ac = Array.from(bs).some(b => b.checked);
        btn.textContent = ac ? 'Deselect all' : 'Select all';
      });
      fpUpdateSummary();
    }

    function fpUpdateSummary() {
      const orgBoxes = Array.from(document.querySelectorAll('[data-fp-org]'));
      const scrBoxes = Array.from(document.querySelectorAll('[data-fp-scr]'));
      const selOrg = orgBoxes.filter(b => b.checked).length;
      const selScr = scrBoxes.filter(b => b.checked).length;
      const sumEl = document.getElementById('fp-summary');
      const btnEl = document.getElementById('fp-push-btn');
      if (sumEl) sumEl.innerHTML = `<strong>${selOrg}</strong> component${selOrg!==1?'s':''} · <strong>${selScr}</strong> screen${selScr!==1?'s':''}`;
      if (btnEl) btnEl.disabled = (selOrg + selScr === 0);
      // update select-all btn labels
      document.querySelectorAll('.fp-select-all').forEach(btn => {
        const t = btn.getAttribute('onclick').includes("'org'") ? 'org' : 'scr';
        const bs = document.querySelectorAll(`[data-fp-${t}]`);
        const ac = Array.from(bs).some(b => b.checked);
        btn.textContent = ac ? 'Deselect all' : 'Select all';
      });
    }

    function fpConfirmPush(btn) {
      const orgIds = Array.from(document.querySelectorAll('[data-fp-org]:checked')).map(b => b.dataset.fpOrg);
      const scrIds = Array.from(document.querySelectorAll('[data-fp-scr]:checked')).map(b => b.dataset.fpScr);
      const allOrg = document.querySelectorAll('[data-fp-org]').length;
      const allScr = document.querySelectorAll('[data-fp-scr]').length;

      let scope = 'both';
      if (orgIds.length === 0) scope = 'screens';
      if (scrIds.length === 0) scope = 'components';

      let cmd = `/pb:build-figma-handoff --scope=${scope} --batch`;
      if (orgIds.length > 0 && orgIds.length < allOrg) cmd += ` --organism=${orgIds.join(',')}`;
      if (scrIds.length > 0 && scrIds.length < allScr) cmd += ` --screen=${scrIds.join(',')}`;

      closeFigmaPushPanel();
      openCopyPopover(cmd, btn);

      // Show progress panel immediately after confirming
      pbShowProgress({ components: { done:0, total: orgIds.length }, screens: { done:0, total: scrIds.length } });
    }

    /* ── Push progress panel ─────────────────────────────────────────────── */
    let _fpProgress = null;

    function pbShowProgress(data) {
      pbHideProgress();
      _fpProgress = data || { components:{ done:0, total:0 }, screens:{ done:0, total:0 } };
      const el = document.createElement('div');
      el.className = 'fp-progress';
      el.id = 'fp-progress';
      el.innerHTML = `
        <div class="fp-progress-head">
          <span class="fp-progress-title">Figma push progress</span>
          <button class="fp-progress-close" onclick="pbHideProgress()" aria-label="Dismiss">×</button>
        </div>
        <div id="fp-progress-body"></div>
        <div class="fp-progress-hint">Run the copied command — <code>/pb:build-figma-handoff</code> reports progress here as it pushes.</div>`;
      document.body.appendChild(el);
      setTimeout(() => el.classList.add('is-visible'), 10);
      _fpRenderProgress();
    }

    function pbSetPushProgress(data) {
      if (!document.getElementById('fp-progress')) pbShowProgress(data);
      _fpProgress = data;
      _fpRenderProgress();
    }
    window.pbSetPushProgress = pbSetPushProgress;

    function _fpRenderProgress() {
      const body = document.getElementById('fp-progress-body');
      if (!body || !_fpProgress) return;
      const rows = [];
      const types = [['components','Components'],['screens','Screens']];
      for (const [key, label] of types) {
        const d = _fpProgress[key];
        if (!d || d.total === 0) continue;
        const pct = d.total > 0 ? Math.round((d.done / d.total) * 100) : 0;
        const isDone = d.done >= d.total;
        rows.push(`
          <div class="fp-progress-row">
            <div class="fp-progress-rowlabel">
              <span class="fp-progress-rowname">${label}</span>
              <span class="fp-progress-rowcount">${d.done} / ${d.total}</span>
            </div>
            <div class="fp-bar-track"><div class="fp-bar-fill${isDone?' done':''}" style="width:${pct}%"></div></div>
            ${d.current ? `<div class="fp-progress-rowcurrent">${pbEscape(d.current)}</div>` : ''}
          </div>`);
      }
      body.innerHTML = rows.join('') || '<div style="font: var(--font-weight-medium) var(--font-size-xs)/var(--line-height-xs) var(--font-body);color:var(--text-tertiary);padding:4px 0">No active push.</div>';
    }

    function pbHideProgress() {
      const el = document.getElementById('fp-progress');
      if (!el) return;
      el.classList.remove('is-visible');
      setTimeout(() => el.remove(), 220);
      _fpProgress = null;
    }

      backdrop.className = 'copy-popover-backdrop';

    /* v1.5 — the Prototype sandbox tools (Preview-as-role + Reset) behind a single ⋯ menu.
       Reuses the copy-popover infra (positioning / backdrop / Esc). An overline labels each group. */
    var _sbxAnchor = null;
    function openSandboxMenu(anchorBtn) {
      document.querySelectorAll('.copy-popover, .copy-popover-backdrop').forEach(el => el.remove());
      window.removeEventListener('keydown', copyPopoverKeyHandler);
      window.removeEventListener('resize', repositionCopyPopover);

      const backdrop = document.createElement('div');
      backdrop.className = 'copy-popover-backdrop';

    function pbSandboxRerender() {

    function pbTestScenarioTitles() {

    function pbSandboxMenuHTML() {
      const onProto = state.metaView === 'prototype';

      const close = `<button class="copy-popover-close" type="button" aria-label="Close" onclick="closeCopyPopover()">${COPY_POPOVER_ICONS.close}</button>`;

        : `<select class="sbx-select" disabled aria-label="Roles (none defined)"><option>None</option></select>`;

    /* =========================================================================
       TAB 1 — PROTOTYPE
       This is the live, interactive app users will test. Replace the

       ========================================================================= */
    function renderPrototype() {
      // The live app = the registry's screens, rendered via their generated renderFn.
      const screens = (PB_DATA.handoff && PB_DATA.handoff.screens) || [];
      const header = pbPageHeader({ title: 'Prototype', infoKey: 'prototype' });

      if (!screens.length) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.prototype,
                title: 'Your prototype goes here',
                body: 'Run /pb:build to add screens — this tab renders them as the live app users interact with, with a real navigation and form-validation runtime. The other four tabs are the documentation layer.',
                ctaLabel: 'Generate prototype screens', command: '/pb:build', label: 'Build command copied',

      }

      if (!state.protoScreenId || !screens.some(s => s.id === state.protoScreenId)) state.protoScreenId = screens[0].id;
      const meta = (PB_REGISTRY && PB_REGISTRY.meta) || {};

      // expands to monitor+laptop). The current device must be supported.
      const supported = pbNormalizeDeviceList(meta.devices);
      if (!state.protoDevice) state.protoDevice = pbNormalizeDevice(meta.device || 'laptop');
      if (supported.indexOf(state.protoDevice) === -1) state.protoDevice = supported[0] || 'laptop';
      if (!state.protoShell) state.protoShell = (meta.shell === 'app' ? 'app' : 'browser');
      // v1.5 — resolve the active role (absent meta.roles ⇒ null, switcher hidden, nothing gated).
      const roles = (meta.roles && meta.roles.length) ? meta.roles : [];
      if (roles.length) {
        if (state.activeRole == null || !roles.some(r => r.id === state.activeRole)) state.activeRole = pbResolveDefaultRole();
      } else {
        state.activeRole = null;
      }

      if (roles.length && sel && !pbScreenAllowsRole(sel, state.activeRole)) {

      const shellToggle = `<div class="proto-shell-toggle" role="group" aria-label="Display type">

      const structIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></svg>`;

               title="${d.label} · ${d.w}×${d.h}${ok ? '' : ' — not supported by this project'}" ${ok ? '' : 'disabled'}

          }).join('')
        + `</div>`;

      // v1.5 — the sandbox tools (Preview-as-role + Reset) live behind ONE ⋯ menu (openSandboxMenu).
      const sandboxIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12M6 21h12M8 3v3.6a4 4 0 0 0 1.5 3.1L12 12l2.5-2.3A4 4 0 0 0 16 6.6V3M8 21v-3.6a4 4 0 0 1 1.5-3.1L12 12l2.5 2.3A4 4 0 0 1 16 17.4V21"/></svg>`;

      // v1.5 — in a view-only (--people) artifact the ⋯ menu (role switcher + Reset) stays as a VIEWER aid

      const viewerTools = `<div class="proto-header-tools">${menuBtn}</div>`;

      void toolsFull; void viewerTools;  // legacy header-tool builders above are unused now

      const body = (typeof window[sel.renderFn] === 'function')

        <div class="pb-page pb-page--viewport pb-page--proto">

                    ${chrome}

    }

    // The 4 fixed device sizes (logical CSS px). Gated per project by meta.devices.
    const PROTO_DEVICES = [
      { id: 'monitor', label: 'Large monitor', w: 1920, h: 1080 },
      { id: 'laptop',  label: 'Laptop',        w: 1280, h: 832  },
      { id: 'tablet',  label: 'Tablet',        w: 834,  h: 1112 },
      { id: 'mobile',  label: 'Mobile',        w: 429,  h: 926  },
    ];
    // Normalize a meta.devices list to the 4-key model — legacy 'desktop' → monitor + laptop.
    function pbNormalizeDeviceList(list) {
      const order = ['monitor', 'laptop', 'tablet', 'mobile'];
      const set = {};
      (list || []).forEach(d => {
        if (d === 'desktop') { set.monitor = 1; set.laptop = 1; }

      const slug = (meta.name || 'app').toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/)[0];
      const path = (sel.id || '').replace(/-/g, '/');

    }
    // Device status bar (replaces the notch) — clock + signal/wifi/battery. The foreground color is
    // chosen for high contrast against the screen's background (see pbSetStatusBarContrast).
    function protoStatusBar() {
      const sig = '<svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor" aria-hidden="true"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>';
      const wifi = '<svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><path d="M1 3.6a10 10 0 0 1 14 0"/><path d="M3.4 6.3a6.4 6.4 0 0 1 9.2 0"/><path d="M5.8 9a3 3 0 0 1 4.4 0"/><circle cx="8" cy="11" r="0.6" fill="currentColor" stroke="none"/></svg>';
      const batt = '<svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-hidden="true"><rect x="0.6" y="0.6" width="21" height="10.8" rx="2.6" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/><rect x="2.2" y="2.2" width="14" height="7.6" rx="1.3" fill="currentColor"/><path d="M23 4v4a2 2 0 0 0 1.2-1.84V5.84A2 2 0 0 0 23 4z" fill="currentColor" fill-opacity="0.5"/></svg>';
      return `<div class="proto-statusbar" id="proto-statusbar">
          <span class="proto-sb-time">9:41</span>
          <span class="proto-sb-island"></span>
          <span class="proto-sb-icons">${sig}${wifi}${batt}</span>
        </div>`;
    }
    // Pick black/white foreground for the status bar based on the screen's effective background.
    function pbSetStatusBarContrast() {
      const sb = document.getElementById('proto-statusbar');
      const screen = document.getElementById('proto-frame');
      if (!sb || !screen) return;
      const bg = pbEffectiveBg(screen);
      sb.style.background = bg;
      const lum = pbColorLuminance(bg);
      const dark = lum >= 0.5; // light background → dark text
      sb.classList.toggle('proto-statusbar--dark', dark);
      sb.classList.toggle('proto-statusbar--light', !dark);
    }
    function pbEffectiveBg(screen) {
      // Sample the background directly under the status bar — the top strip of the screen content,
      // not a centered card — then walk up to the first opaque background.
      const r = screen.getBoundingClientRect();
      let el = document.elementFromPoint(r.left + r.width / 2, r.top + 6);
      let guard = 0;
      while (el && guard++ < 12) {
        const bg = getComputedStyle(el).backgroundColor;
        if (bg && !/^rgba?\(0,\s*0,\s*0,\s*0\)$|transparent/.test(bg)) return bg;
        if (el === screen) break;
        el = el.parentElement;
      }
      const sbg = getComputedStyle(screen).backgroundColor;
      return (sbg && !/^rgba?\(0,\s*0,\s*0,\s*0\)$|transparent/.test(sbg)) ? sbg : 'rgb(255,255,255)';
    }
    function pbColorLuminance(color) {
      const m = (color || '').match(/(\d+(?:\.\d+)?)/g);
      if (!m || m.length < 3) return 1;
      const r = +m[0], g = +m[1], b = +m[2];
      return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
