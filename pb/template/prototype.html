    function pbEscape(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')   // safe inside double-quoted attributes (title="…")
        .replace(/'/g, '&#39;');   // safe inside single-quoted onclick handlers (…('${pbEscape(id)}'))
    }

    /* =========================================================================
       TAB 3 — USER FLOW
       Zoomable canvas with a custom SVG diagram. Edit `buildFlowSvg()` below
       to add your prototype's screens, decisions, and transitions.
       ========================================================================= */
    /* QA test-case lenses — categories a scenario / coverage-gap can be tagged with. */
    const QA_CAT_LABEL = { ux: 'UX', ui: 'UI', function: 'Function', business: 'Business', 'system-edge': 'System edge' };

    function renderMetaFlow() {
      const populated = !!(PB_DATA.flow && PB_DATA.flow.populated);
      const cta = populated
        ? `<button class="sync-button" onclick="openCopyPopover('/pb:flow', this)">Sync</button>` : '';
      const header = pbPageHeader({ title: 'UX Design', infoKey: 'flow', cta });

      if (!populated) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.flow,
                title: 'No user flow yet',
                body: 'Build your user flow from the project spec. Claude generates one combined left-to-right Mermaid flowchart that covers every story (including edge cases), with a per-story test checklist that maps each story to a path on the canvas.',
                ctaLabel: 'Generate user flow', command: '/pb:flow', label: 'Sync flow command copied',
              })}
            </div>
          </div>`;
        return;
      }

      $('#app').innerHTML = `
        <div class="pb-page pb-page--viewport">
          ${header}
          <div class="pb-content pb-content--split pb-content--fill">
            ${renderFlowPopulated()}
          </div>
        </div>
      `;
      // v0.3.9 — once /pb:flow rewrites renderFlowPopulated
      // to stack multiple Mermaid flows inside #flow-stage, this init renders them all,
      // strips intrinsic widths, measures the natural content size of the stage, and
      // hands off to initCanvas('flow', W, H) so the user gets pan + zoom over every
      // flow at once. Falls back to the legacy buildFlowSvg() init for pre-v0.3.9 templates.
      if (populated && window.mermaid && document.querySelector('#flow-stage .mermaid')) {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          flowchart: { curve: 'linear', htmlLabels: true, padding: 18, useMaxWidth: false, nodeSpacing: 50, rankSpacing: 90 },
          themeVariables: {
            fontFamily: 'var(--font-body, system-ui, sans-serif)',
            fontSize: '14px',
            primaryColor: '#F3E8FF',
            primaryTextColor: '#1f2937',
            primaryBorderColor: '#C084FC',
            lineColor: '#1f2937',
            tertiaryColor: '#ffffff',
          },
        });
        mermaid.run({ querySelector: '#flow-stage .mermaid' }).then(function () {
          var stage = document.getElementById('flow-stage');
          if (!stage) return;
          stage.classList.add('flow-stage-flow');
          Array.from(stage.querySelectorAll('svg')).forEach(function(svg){
            svg.style.maxWidth = 'none';
            svg.removeAttribute('width');
            svg.removeAttribute('height');
            svg.style.width = '';
            svg.style.height = '';
          });
          // v0.3.12 — apply 24px corner radius to rectangle shapes (Action, Subprocess).
          // Mermaid's classDef rx/ry isn't honored on rectangles in current versions —
          // set the SVG attribute directly post-render. Stadiums (Start/End) keep
          // their fully-rounded ends; polygons (Decision/Input) can't be rounded.
          stage.querySelectorAll('.node.cAction > rect, .node.cSubprocess > rect').forEach(function(rect){
            rect.setAttribute('rx', '24');
            rect.setAttribute('ry', '24');
          });
          // Recolor nodes by detected shape to the wireflow legend palette (start/end black ·
          // decision yellow · input purple · action blue · subprocess grey).
          pbStyleFlowNodes(stage);
          // Re-route connectors as straight orthogonal lines anchored at node side-centers.
          pbOrthogonalizeFlowEdges(stage);
          // v0.3.14 — Wireflow decorations: click-to-preview + numbered note badges.
          stage.style.width = 'auto';
          stage.style.height = 'auto';
          stage.style.marginLeft = '0';
          stage.style.marginTop = '0';
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              var bbox = stage.getBoundingClientRect();
              var W = Math.max(1024, Math.ceil(bbox.width));
              var H = Math.max(720,  Math.ceil(bbox.height));
              stage.style.width = W + 'px';
              stage.style.height = H + 'px';
              stage.style.marginLeft = -(W/2) + 'px';
              stage.style.marginTop  = -(H/2) + 'px';
              initCanvas('flow', W, H);
            });
          });
        }).catch(function(){ /* silent */ });
      } else if (populated && document.getElementById('flow-canvas')) {
        initCanvas('flow', 1200, 380);
      }
    }

    function renderFlowPopulated() {
      const f = (PB_DATA && PB_DATA.flow) || {};
      const fStories = f.stories || [];
      if (!f.mermaid && !(f.flows && f.flows.length) && f.html) {
        return `<div class="pb-main">${f.html}</div><aside class="pb-aside"><p class="pb-aside-empty">Legacy flow.</p></aside>`;
      }
      // Multi-flow: prefer f.flows[]; fall back to the single f.mermaid.
      const flows = (f.flows && f.flows.length) ? f.flows
                  : (f.mermaid ? [{ name: 'Main flow', mermaid: f.mermaid }] : []);
      const idx = Math.min(state.flowIndex || 0, Math.max(0, flows.length - 1));
      const current = flows[idx];
      const dropdown = flows.length > 1
        ? `<select class="pb-flow-select" onchange="setFlowIndex(this.value)">`
          + flows.map((fl, i) => `<option value="${i}" ${i === idx ? 'selected' : ''}>${pbEscape(fl.name || ('Flow ' + (i + 1)))}</option>`).join('')
          + `</select>`
        : `<span class="pb-flow-name">${pbEscape((current && current.name) || 'User flow')}</span>`;
      const stage = current ? `<div class="mermaid">${current.mermaid}</div>` : buildFlowSvg();

      // 2.2 — hovering a story highlights the flow path that satisfies it (and dims the rest).
      const storiesList = fStories.length
        ? '<ol class="flow-doc-stories flow-doc-stories--interactive">' + fStories.map((s, i) =>
            `<li data-story-idx="${i}" onmouseenter="pbFlowHighlight(${i}, true)" onmouseleave="pbFlowHighlight(${i}, false)">`
            + `<strong>${pbEscape(s.title||'')}${s.priority?' ('+pbEscape(s.priority)+')':''}</strong>`
            + (s.jtbd ? ` — ${pbEscape(s.jtbd)}` : '')
            + (s.path ? `<div class="flow-doc-path"><em>Path:</em> ${pbEscape(s.path)}</div>` : '') + '</li>').join('') + '</ol>'
        : '<p class="flow-doc-side-sub">No user stories yet.</p>';
      // QA test cases: scenarios may be plain strings or { text, category } across the QA lenses
      // (UX · UI · Function · Business · System edge). f.coverageWarnings flags edges the UI misses.
      // v1.5 — a scenario carrying a .test block shows its last-run status glyph
      // (✓ pass · ✗ fail · ○ untested); a scenario without .test stays a manual ☐.
      const scenarioLi = (sc) => {
        const text = (typeof sc === 'string') ? sc : (sc && sc.text) || '';
        const cat = (sc && typeof sc === 'object') ? sc.category : null;
        const chip = cat ? `<span class="pb-qa-cat pb-qa-cat--${pbEscape(cat)}">${pbEscape(QA_CAT_LABEL[cat] || cat)}</span> ` : '';
        if (!(sc && typeof sc === 'object' && sc.test)) return `<li>☐ ${chip}${pbEscape(text)}</li>`;
        const lr = sc.lastResult || {};
        const st = lr.status === 'pass' ? 'pass' : lr.status === 'fail' ? 'fail' : 'untested';
        const glyphChar = st === 'pass' ? '✓' : st === 'fail' ? '✗' : '○';
        const titleTxt = (st === 'pass' ? 'Passed' : st === 'fail' ? 'Failed' : 'Not run yet') + (lr.detail ? ' — ' + lr.detail : '') + (lr.ranAt ? ' (' + lr.ranAt + ')' : '');
        const glyph = `<span class="pb-test-glyph pb-test-glyph--${st}" title="${escapeHtmlAttr(titleTxt)}">${glyphChar}</span>`;
        return `<li>${glyph} ${chip}${pbEscape(text)}</li>`;
      };
      // Tests-panel summary: N/M functional passing · K manual (☐) scenarios.
      let testTotal = 0, testPass = 0, manualCount = 0;
      fStories.forEach(s => (s.scenarios || []).forEach(sc => {
        if (sc && typeof sc === 'object' && sc.test) { testTotal++; if (sc.lastResult && sc.lastResult.status === 'pass') testPass++; }
        else manualCount++;
      }));
      const runTestsBtn = VIEW_ONLY ? '' :
        `<button class="pb-test-run-btn" type="button" onclick="openCopyPopover('/pb:test', this)" title="Copy the /pb:test command">Run tests</button>`;
      const testsHeader = fStories.length
        ? `<div class="pb-test-head"><span class="pb-test-summary">${testPass}/${testTotal} passing · ${manualCount} manual</span>${runTestsBtn}</div>`
        : '';
      const testsList = fStories.length
        ? '<ol class="flow-doc-stories">' + fStories.map(s =>
            `<li><strong>${pbEscape(s.title||'')}</strong><ul class="flow-doc-checks">`
            + (s.scenarios||[]).map(scenarioLi).join('') + '</ul></li>').join('') + '</ol>'
        : '<p class="flow-doc-side-sub">No test cases yet.</p>';
      const warns = f.coverageWarnings || [];
      const warnBlock = warns.length ? `
        <div class="pb-qa-warn">
          <div class="pb-qa-warn-head">⚠ Coverage gaps (${warns.length})</div>
          <ul class="pb-qa-warn-list">${warns.map(w => {
            const note = (typeof w === 'string') ? w : (w && w.note) || '';
            const cat = (w && typeof w === 'object') ? w.category : null;
            const chip = cat ? `<span class="pb-qa-cat pb-qa-cat--${pbEscape(cat)}">${pbEscape(QA_CAT_LABEL[cat] || cat)}</span> ` : '';
            return `<li>${chip}${pbEscape(note)}</li>`;
          }).join('')}</ul>
        </div>` : '';

      const legendBtn = `
        <button class="flow-doc-legend-btn" type="button" aria-label="Show legend" onclick="openLegendPopover(this)">
          <span class="flow-doc-legend-swatch flow-doc-swatch-start"></span>
          <span class="flow-doc-legend-swatch flow-doc-swatch-decision"></span>
          <span class="flow-doc-legend-swatch flow-doc-swatch-action"></span>
          <span class="flow-doc-legend-swatch flow-doc-swatch-subprocess"></span>
          <span class="flow-doc-legend-label">Legend</span>
          <span class="flow-doc-legend-q" aria-hidden="true">?</span>
        </button>`;

      const main = `
        <div class="pb-main flow-main-col">
          <div class="flow-canvas flow-canvas--fill" id="flow-canvas">
            <div class="flow-main-bar">
              <div class="flow-main-bar-left">${dropdown}</div>
              ${legendBtn}
            </div>
            <div class="flow-viewport" id="flow-viewport">
              <div class="flow-stage" id="flow-stage">${stage}</div>
            </div>
            <div class="flow-zoom-controls">
              <button class="flow-zoom-btn" id="flow-zoom-in"  title="Zoom in">+</button>
              <button class="flow-zoom-btn" id="flow-zoom-out" title="Zoom out">−</button>
              <button class="flow-zoom-btn" id="flow-zoom-fit" title="Fit / reset">⊙</button>
            </div>
            <div class="flow-zoom-readout" id="flow-zoom-readout">100%</div>
            <div class="flow-hint">Scroll to zoom · drag to pan</div>
          </div>
        </div>`;

      const aside = `
        <aside class="pb-aside">
          <div class="proto-shell-toggle" role="group" aria-label="Flow view" style="margin-bottom:14px;width:100%">
            <button class="proto-shell-btn active" data-tab="stories" onclick="setFlowSideTab('stories')" style="flex:1;justify-content:center">User stories</button>
            <button class="proto-shell-btn"        data-tab="tests"   onclick="setFlowSideTab('tests')"   style="flex:1;justify-content:center">Test cases</button>
          </div>
          <div class="flow-side-panel" data-tab="stories">
            ${storiesList}
          </div>
          <div class="flow-side-panel" data-tab="tests" hidden>
            ${testsHeader}
            ${warnBlock}
            ${testsList}
          </div>
        </aside>`;

      return main + aside;
    }

    /* 2.2 — story → flow-path highlight. Resolve the story's node ids (explicit story.nodes,
       else parse story.path tokens) and match them against the rendered Mermaid node labels,
       then emphasise those nodes + the edges between them and dim everything else. */
    function pbFlowStoryTokens(story) {
      if (story.nodes && story.nodes.length) return story.nodes.map(String);
      return (story.path || '').split(/\s*(?:→|->|,|·|>|\/)\s*/).map(s => s.trim()).filter(Boolean);
    }
    function pbFlowHighlight(idx, on) {
      const stage = document.getElementById('flow-stage');
      if (!stage) return;
      if (!on) {
        stage.classList.remove('flow-dim');
        stage.querySelectorAll('.flow-hl').forEach(e => e.classList.remove('flow-hl'));
        return;
      }
      const stories = (PB_DATA.flow && PB_DATA.flow.stories) || [];
      const story = stories[idx];
      if (!story) return;
      const tokens = pbFlowStoryTokens(story).map(t => t.toLowerCase());
      if (!tokens.length) return;
      const matchedIds = {};
      let any = false;
      stage.querySelectorAll('g.node').forEach(n => {
        const txt = (n.textContent || '').trim().toLowerCase();
        if (!txt) return;
        const hit = tokens.some(t => t === txt || t.indexOf(txt) >= 0 || txt.indexOf(t) >= 0);
        if (hit) {
          n.classList.add('flow-hl'); any = true;
          const id = (n.id || '').replace(/^flowchart-/, '').replace(/-\d+$/, '');
          if (id) matchedIds[id] = 1;
        }
      });
      if (!any) return;
      stage.classList.add('flow-dim');
      // Highlight edges connecting two matched nodes (Mermaid tags edge paths LS-<from> LE-<to>).
      stage.querySelectorAll('path.flowchart-link, .edgePaths path, .edgePath path').forEach(p => {
        const cl = p.getAttribute('class') || '';
        const from = (cl.match(/LS-([^\s]+)/) || [])[1];
        const to   = (cl.match(/LE-([^\s]+)/) || [])[1];
        if (from && to && matchedIds[from] && matchedIds[to]) p.classList.add('flow-hl');
      });
    }

    /* Wireflow node palette — recolor each Mermaid node by its detected shape so the flow
       matches the legend regardless of whether classDefs were authored. */
    const FLOW_NODE_PALETTE = {
      startEnd: { fill: '#1c1f22', stroke: '#1c1f22', text: '#ffffff' }, // stadium / circle
      decision: { fill: '#F6C000', stroke: '#D99E00', text: '#1f2937' }, // diamond
      input:    { fill: '#7C3AED', stroke: '#6D28D9', text: '#ffffff' }, // parallelogram
      action:   { fill: '#2196F3', stroke: '#1565C0', text: '#ffffff' }, // rectangle / screen
      sub:      { fill: '#E5E7EB', stroke: '#9CA3AF', text: '#1f2937' }, // subprocess / external / data
    };
    function pbIsDiamond(poly) {
      const pts = (poly.getAttribute('points') || '').trim().split(/\s+/).map(p => {
        const xy = p.split(','); return { x: parseFloat(xy[0]), y: parseFloat(xy[1]) };
      }).filter(p => !isNaN(p.x) && !isNaN(p.y));
      if (pts.length < 3) return false;
      const minY = Math.min.apply(null, pts.map(p => p.y));
      // A diamond has a single vertex at the top edge; a parallelogram has two.
      return pts.filter(p => Math.abs(p.y - minY) < 1).length === 1;
    }
    function pbStyleFlowNodes(stage) {
      if (!stage) return;
      stage.querySelectorAll('g.node').forEach(node => {
        const circle = node.querySelector('circle, ellipse');
        const poly   = node.querySelector('polygon');
        const rect   = node.querySelector('rect');
        const path   = node.querySelector('path');
        const lines  = node.querySelectorAll('line').length;
        let key = null;
        if (poly) {
          key = pbIsDiamond(poly) ? 'decision' : 'input';
          // Subprocess [[...]] renders as a 10-point double-rectangle polygon — strip the outer bracket
          // points so only the clean inner rect remains (removes the vertical "lines" on both sides).
          if (key === 'input') {
            const pts = (poly.getAttribute('points') || '').trim().split(/\s+/);
            if (pts.length >= 8) poly.setAttribute('points', pts.slice(0, 4).join(' '));
          }
        }
        else if (circle) key = 'startEnd';
        else if (rect) {
          if (lines >= 2) key = 'sub'; // subroutine [[ ]]
          else {
            const h  = parseFloat(rect.getAttribute('height')) || 0;
            const rx = parseFloat(rect.getAttribute('rx')) || 0;
            if (rx > 0 && rx >= h / 2 - 2) key = 'startEnd';       // stadium ([ ])
            else { key = 'action'; rect.setAttribute('rx', '16'); rect.setAttribute('ry', '16'); }
          }
        } else if (path) key = 'sub'; // cylinder / other
        if (!key) return;
        const c = FLOW_NODE_PALETTE[key];
        node.querySelectorAll('rect, polygon, circle, ellipse, path').forEach(el => {
          el.style.fill = c.fill; el.style.stroke = c.stroke;
        });
        node.querySelectorAll('line').forEach(el => { el.style.display = 'none'; });
        node.querySelectorAll('.nodeLabel, .nodeLabel *, foreignObject div, text, text tspan').forEach(t => {
          t.style.color = c.text; t.style.fill = c.text;
        });
      });
    }

    /* Blueprint-style edges: re-route every connector as straight orthogonal segments anchored at
       the 4 side-centers (left/right/top/bottom) of each node — like a Figma/FigJam board. Forward
       edges run straight (or a right-angle Z when ranks differ); back-edges route under both nodes. */
    function pbFlowNodeGeom(stage) {
      const geom = {};
      stage.querySelectorAll('g.node').forEach(node => {
        const id = (node.id || '').replace(/^flowchart-/, '').replace(/-\d+$/, '');
        if (!id) return;
        const tr = (node.getAttribute('transform') || '').match(/translate\(\s*([-\d.]+)[ ,]+([-\d.]+)/);
        const shape = node.querySelector('rect, polygon, circle, ellipse, path');
        if (!tr || !shape) return;
        let bb; try { bb = shape.getBBox(); } catch (e) { return; }
        geom[id] = { cx: parseFloat(tr[1]), cy: parseFloat(tr[2]), hw: bb.width / 2, hh: bb.height / 2 };
      });
      return geom;
    }
    function pbOrthoRoute(S, T) {
      const gap = 28;
      const dx = T.cx - S.cx;
      if (dx >= 0) {
        // forward — exit source right-center, enter target left-center
        const sx = S.cx + S.hw, sy = S.cy, tx = T.cx - T.hw, ty = T.cy;
        if (Math.abs(sy - ty) < 2) return { d: `M${sx},${sy} L${tx},${ty}`, lx: (sx + tx) / 2, ly: sy - 12 };
        const mx = (sx + tx) / 2;
        return { d: `M${sx},${sy} L${mx},${sy} L${mx},${ty} L${tx},${ty}`, lx: mx, ly: (sy + ty) / 2 - 10 };
      }
      // back-edge — exit source bottom-center, run under both, enter target bottom-center
      const sx = S.cx, sy = S.cy + S.hh, tx = T.cx, ty = T.cy + T.hh;
      const ry = Math.max(sy, ty) + gap;
      return { d: `M${sx},${sy} L${sx},${ry} L${tx},${ry} L${tx},${ty}`, lx: (sx + tx) / 2, ly: ry - 10 };
    }
    // Decision-branch edge colors: Yes → green, No → red, everything else → dark. Solid lines.
    const PB_FLOW_EDGE_COLORS = { yes: '#16a34a', no: '#dc2626', def: '#1f2937' };
    function pbFlowMarker(svg, id, color) {
      const NS = 'http://www.w3.org/2000/svg';
      if (svg.querySelector('#' + id)) return 'url(#' + id + ')';
      let defs = svg.querySelector('defs');
      if (!defs) { defs = document.createElementNS(NS, 'defs'); svg.insertBefore(defs, svg.firstChild); }
      const m = document.createElementNS(NS, 'marker');
      m.setAttribute('id', id); m.setAttribute('viewBox', '0 0 10 10');
      m.setAttribute('refX', '8'); m.setAttribute('refY', '5');
      m.setAttribute('markerWidth', '7'); m.setAttribute('markerHeight', '7'); m.setAttribute('orient', 'auto');
      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', 'M0,1 L9,5 L0,9 z'); path.setAttribute('fill', color);
      m.appendChild(path); defs.appendChild(m);
      return 'url(#' + id + ')';
    }
    function pbOrthogonalizeFlowEdges(stage) {
      if (!stage) return;
      const svg = stage.querySelector('svg'); if (!svg) return;
      const geom = pbFlowNodeGeom(stage);
      const paths = Array.prototype.slice.call(stage.querySelectorAll('.edgePaths path'));
      const labels = Array.prototype.slice.call(stage.querySelectorAll('.edgeLabels .edgeLabel'));
      // Match each non-empty label to its edge by ORIGINAL proximity (before we rewrite paths) —
      // Mermaid emits multiple label nodes in an order that doesn't track the path order.
      const pmid = paths.map(p => { const r = p.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; });
      const labelsByPath = {}, textByPath = {};
      labels.forEach(lab => {
        const t = (lab.textContent || '').trim(); if (!t) return;
        const r = lab.getBoundingClientRect(); const lx = r.left + r.width / 2, ly = r.top + r.height / 2;
        let best = 0, bd = Infinity;
        pmid.forEach((m, idx) => { const dd = (m.x - lx) * (m.x - lx) + (m.y - ly) * (m.y - ly); if (dd < bd) { bd = dd; best = idx; } });
        (labelsByPath[best] = labelsByPath[best] || []).push(lab);
        if (!textByPath[best]) textByPath[best] = t;
      });
      const mk = { yes: pbFlowMarker(svg, 'pb-arrow-green', PB_FLOW_EDGE_COLORS.yes),
                   no:  pbFlowMarker(svg, 'pb-arrow-red',   PB_FLOW_EDGE_COLORS.no),
                   def: pbFlowMarker(svg, 'pb-arrow-dark',  PB_FLOW_EDGE_COLORS.def) };
      paths.forEach((p, i) => {
        const cl = p.getAttribute('class') || '';
        const from = (cl.match(/LS-([^\s"]+)/) || [])[1];
        const to   = (cl.match(/LE-([^\s"]+)/) || [])[1];
        const S = geom[from], T = geom[to];
        if (!S || !T) return;
        const r = pbOrthoRoute(S, T);
        const lt = (textByPath[i] || '').toLowerCase();
        const key = lt === 'yes' ? 'yes' : lt === 'no' ? 'no' : 'def';
        // Hide unlabeled back-edges (black lines routing backward) — keep Yes/No decision branches
        if (T.cx - S.cx < 0 && key === 'def') {
          p.style.display = 'none';
          (labelsByPath[i] || []).forEach(lab => { lab.style.display = 'none'; });
          return;
        }
        p.setAttribute('d', r.d);
        p.style.stroke = PB_FLOW_EDGE_COLORS[key]; p.style.strokeWidth = '2';
        p.style.fill = 'none'; p.style.strokeDasharray = 'none';
        p.setAttribute('marker-end', mk[key]);
        (labelsByPath[i] || []).forEach(lab => {
          lab.setAttribute('transform', `translate(${r.lx},${r.ly})`);
          lab.querySelectorAll('rect').forEach(r2 => { r2.style.fill = 'transparent'; r2.setAttribute('fill', 'transparent'); });
          lab.querySelectorAll('text, tspan, foreignObject div, span').forEach(t => {
            t.style.fill = PB_FLOW_EDGE_COLORS[key];
            t.style.color = PB_FLOW_EDGE_COLORS[key];
            t.style.fontWeight = '700';
            t.style.backgroundColor = 'transparent';
          });
        });
      });
      // Back-edges route below the nodes, often past Mermaid's original viewBox (which clips,
      // since the SVG is overflow:hidden) — grow the viewBox to fit the full rerouted geometry.
      try {
        const bb = svg.getBBox();
        const pad = 14;
        svg.setAttribute('viewBox', `${bb.x - pad} ${bb.y - pad} ${bb.width + pad * 2} ${bb.height + pad * 2}`);
      } catch (e) { /* getBBox can throw if detached — ignore */ }
    }

    /* Tiny example flow: START → SCREEN → DECISION → END.
       Replace this with your prototype's actual flow. */
    function buildFlowSvg() {
      var W=1200, H=380, Y=190;
      var xS=80, xScr=350, xD=620, xEndScr=900, xE=1140;
      var RW=140, RH=50, DW=72, DH=46, CR=24;
      var C_SCR='#4A90D9', C_DEC='#F6C000', C_TRM='#1c1f22', C_GRN='#00A651', C_LN='#9ca3af';

      function R(x,y,w,h,fill,lbl) {
        return '<rect x="'+(x-w/2)+'" y="'+(y-h/2)+'" width="'+w+'" height="'+h+'" rx="10" fill="'+fill+'"/>'
          + '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle"'
          + ' font-family="Poppins,sans-serif" font-size="13" font-weight="600" fill="#fff">'+lbl+'</text>';
      }
      function D(x,y,lines) {
        var pts = x+','+(y-DH)+' '+(x+DW)+','+y+' '+x+','+(y+DH)+' '+(x-DW)+','+y;
        var s = '<polygon points="'+pts+'" fill="'+C_DEC+'"/>';
        lines.forEach(function(l,i){
          var ty = y + (i - (lines.length-1)/2) * 14;
          s += '<text x="'+x+'" y="'+ty+'" text-anchor="middle" dominant-baseline="middle"'
            + ' font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="'+C_TRM+'">'+l+'</text>';
        });
        return s;
      }
      function T(x,y,lbl) {
        return '<circle cx="'+x+'" cy="'+y+'" r="'+CR+'" fill="'+C_TRM+'"/>'
          + '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle"'
          + ' font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#fff">'+lbl+'</text>';
      }
      function Ln(x1,y1,x2,y2,clr){
        return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(clr||C_LN)+'" stroke-width="1.5" marker-end="url(#fm-ah)"/>';
      }
      function Bg(x,y,t,bg){
        var tw = t.length*7+14;
        return '<rect x="'+(x-tw/2)+'" y="'+(y-9)+'" width="'+tw+'" height="18" rx="9" fill="'+bg+'"/>'
          + '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle"'
          + ' font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#fff">'+t+'</text>';
      }

      var s = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
      s += '<defs>'
        + '<marker id="fm-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1L9,5L0,9z" fill="'+C_LN+'"/></marker>'
        + '<marker id="fm-gr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1L9,5L0,9z" fill="'+C_GRN+'"/></marker>'
        + '</defs>';
      s += '<rect width="'+W+'" height="'+H+'" fill="#f8f9fb" rx="12"/>';

      // Connections
      s += Ln(xS+CR, Y, xScr-RW/2-3, Y);
      s += Ln(xScr+RW/2+3, Y, xD-DW-3, Y);
      s += '<line x1="'+(xD+DW+3)+'" y1="'+Y+'" x2="'+(xEndScr-RW/2-3)+'" y2="'+Y+'" stroke="'+C_GRN+'" stroke-width="1.5" marker-end="url(#fm-gr)"/>';
      s += Bg((xD+DW+xEndScr-RW/2)/2, Y-14, 'Yes', C_GRN);
      s += Ln(xEndScr+RW/2+3, Y, xE-CR-3, Y);

      // Nodes
      s += T(xS,  Y, 'START');
      s += R(xScr, Y, RW, RH, C_SCR, 'Example Screen');
      s += D(xD,   Y, ['Continue?']);
      s += R(xEndScr, Y, RW, RH, C_SCR, 'Done Screen');
      s += T(xE,   Y, 'END');

      s += '</svg>';
      return s;
    }

    /* =========================================================================
       TAB 4 — DESIGN HANDOFF
       Dual-view per 02-architecture.md §7 Addition B:
         - Component view (default, auto-syncs on /pb:build)
         - Screen view    (manual, /pb:handoff)
                          uses 7:3 grid: 7fr render + 3fr spec panel
       Right panel emits DS tokens + sizing ONLY — never code.
       ========================================================================= */
    /* v0.3.17 — per-organism active property combo, keyed by org id.
       Lazy-seeded from each organism's property defaults by pbActiveProps(). */
    const handoffProps = {};
    function setHandoffProp(orgId, propId, value) {
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === orgId);
      if (!org) return;
      pbActiveProps(org)[propId] = value;
      renderHandoff();
    }
    function setHandoffView(v) {
      PB_DATA.handoff.view = v;
      renderHandoff();
    }
    function setHandoffScreen(id) {
      PB_DATA.handoff.selectedScreenId = id;
      PB_DATA.handoff.selectedElementId = null;
      renderHandoff();
    }
    function setHandoffElement(id) {
      PB_DATA.handoff.selectedElementId = id;
      renderHandoff();
    }

    /* v1.2 — UI Design: page chrome + DS bar + 3-way Global|Local|Screen tabs over a split
       layout (left = component cards / screen frame · right = persistent detail aside). */
    function setHandoffTab(t) {
      state.handoffTab = t;
      if (t === 'screen') { PB_DATA.handoff.view = 'screen'; state.handoffDrawerOpenFor = null; }
      else { PB_DATA.handoff.view = 'component'; state.handoffScope = t; state.screenDrawerOpenFor = null; }
      renderHandoff();
    }

    function renderHandoff() {
      const orgs = PB_DATA.handoff.organisms || [];
      const screens = PB_DATA.handoff.screens || [];
      const hasAny = orgs.length || screens.length;
      const cta = hasAny ? `<button class="sync-button" onclick="openFigmaPushPanel(this)">Push to Figma →</button>` : '';
      const header = pbPageHeader({ title: 'UI Design', infoKey: 'handoff', cta, headerAside: pbRenderDsBar() });

      if (!hasAny) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.handoff,
                title: 'No components yet',
                body: 'Run /pb:build to populate the design system — every reusable component (with property controls, a code panel, and a spec drawer) and every screen handoff. Components here are the same ones the Prototype renders, never duplicated.',
                ctaLabel: 'Generate components', command: '/pb:build', label: 'Build command copied',
              })}
            </div>
          </div>`;
        return;
      }

      const isGlobal = o => o.scope === 'global' || !!o.dsMatch;
      const groups = { global: orgs.filter(isGlobal), local: orgs.filter(o => !isGlobal(o)) };
      if (!state.handoffTab) state.handoffTab = groups.local.length ? 'local' : (groups.global.length ? 'global' : 'screen');
      const tab = state.handoffTab;
      PB_DATA.handoff.view = (tab === 'screen') ? 'screen' : 'component';
      if (tab !== 'screen') state.handoffScope = tab;

      const tabsCtl = [['global', 'Global', groups.global.length], ['local', 'Local', groups.local.length], ['screen', 'Screen', screens.length]]
        .map(([id, label, n]) => `<button class="meta-subtab ${tab === id ? 'active' : ''}" onclick="setHandoffTab('${id}')">${label}<span class="meta-subtab-count">${n}</span></button>`).join('');

      const main = (tab === 'screen') ? pbRenderHandoffScreen() : pbRenderHandoffCards(groups[tab]);
      const aside = (tab === 'screen')
        ? (state.screenDrawerOpenFor ? `<div class="handoff-drawer">${pbRenderScreenDrawer()}</div>` : pbRenderScreenOverviewAside())
        : (state.handoffDrawerOpenFor ? pbRenderHandoffDrawer() : pbHandoffAsideHint('Select a component to see its anatomy, specification, UI logic, and usage.'));

      $('#app').innerHTML = `
        <div class="pb-page">
          ${header}
          <div class="pb-content pb-content--split">
            <div class="pb-main handoff-main-col">
              <div class="meta-subtabs" style="margin-bottom:16px">${tabsCtl}</div>
              ${main}
            </div>
            <aside class="pb-aside">${aside}</aside>
          </div>
        </div>`;
    }

    function pbHandoffAsideHint(msg) { return `<p class="pb-aside-empty">${msg}</p>`; }

    /* Design-system bar under the UI Design title (meta.designSystem; tolerated-absent). */
    function pbRenderDsBar() {
      const ds = (PB_REGISTRY && PB_REGISTRY.meta && PB_REGISTRY.meta.designSystem) || null;
      if (!ds || !ds.name) {
        if (VIEW_ONLY) return '';
        return `<div class="pb-ds-bar pb-ds-bar--empty" onclick="openCopyPopover('/pb:build', this)" title="Link a design system">+ No design system linked — click to add one</div>`;
      }
      const linkIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>';
      const codeIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
      const design = ds.designLink
        ? `<a class="pb-ds-link" href="${pbEscape(ds.designLink)}" target="_blank" rel="noopener">${linkIcon} Design</a>`
        : `<span class="pb-ds-link pb-ds-link--missing">No design link</span>`;
      let code;
      if (ds.codeLibrary && /^https?:/.test(ds.codeLibrary)) {
        code = `<a class="pb-ds-link" href="${pbEscape(ds.codeLibrary)}" target="_blank" rel="noopener">${codeIcon} Code library</a>`;
      } else if (ds.codeLibrary) {
        code = `<span class="pb-ds-link" title="${pbEscape(ds.codeLibrary)}">${codeIcon} <code>${pbEscape(ds.codeLibrary)}</code></span>`;
      } else {
        code = `<span class="pb-ds-link pb-ds-link--missing">No code library</span>`;
      }
      return `<div class="pb-ds-bar"><span class="pb-ds-name">${pbEscape(ds.name)}</span><span class="pb-ds-sep">·</span>${design}<span class="pb-ds-sep">·</span>${code}</div>`;
    }

    /* Resolve the active property combo for an organism (lazy-seeded from defaults). */
    function pbActiveProps(org) {
      if (!handoffProps[org.id]) {
        const seed = {};
        (org.properties || []).forEach(p => { seed[p.id] = p.default; });
        handoffProps[org.id] = seed;
      }
      return handoffProps[org.id];
    }

    /* v0.3.13 — Auto-position handoff hit overlays from rendered elements. */
    function recomputeHandoffBounds() {
      const frame = document.querySelector('.handoff-screen-frame');
      if (!frame) return;
      const overlay = frame.querySelector('.handoff-element-overlay');
      if (!overlay) return;
      const frameRect = frame.getBoundingClientRect();
      frame.querySelectorAll('[data-handoff-el]').forEach(target => {
        const id = target.getAttribute('data-handoff-el');
        const hit = overlay.querySelector(`.handoff-element-hit[onclick*="'${id}'"]`);
        if (!hit) return;
        const r = target.getBoundingClientRect();
        hit.style.top    = (r.top    - frameRect.top)  + 'px';
        hit.style.left   = (r.left   - frameRect.left) + 'px';
        hit.style.width  = r.width  + 'px';
        hit.style.height = r.height + 'px';
        hit.style.right  = 'auto';
        hit.style.bottom = 'auto';
      });
    }
    window.addEventListener('resize', function(){
      if (state && state.metaView === 'handoff' && PB_DATA.handoff.view === 'screen') {
        requestAnimationFrame(recomputeHandoffBounds);
      }
    });

    /* v0.3.0 — Component view as vertical card list. Click card → spec drawer. */
    /* The component card list for the active scope (Global/Local). Selection + Push live
       in the page header / tab control now — this returns just the cards. */
    function pbRenderHandoffCards(shown) {
      const orgs = (PB_DATA.handoff.organisms || []);
      if (!shown || !shown.length) {
        const scope = state.handoffScope || 'local';
        return `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">No ${scope} components.${scope === 'global' ? ' Global components are shared design-system refs reused across prototypes.' : ' Local components are built for this project.'}</p>`;
      }
      const cardHtml = (org) => {
        const i = orgs.indexOf(org);
        const props = pbActiveProps(org);
        const layout = org.codeLayout === 'side-by-side' ? 'side-by-side' : 'stacked';
        const selected = state.handoffDrawerOpenFor === org.id;
        const levelBadge = org.level ? `<span class="handoff-level-badge">${pbEscape(org.level)}</span>` : '';
        return `
          <div class="handoff-card ${selected ? 'is-selected' : ''}" onclick="openHandoffDrawer('${pbEscape(org.id)}')">
            <div class="handoff-card-header">
              <span class="handoff-card-title">${i+1} · ${pbEscape(org.name)}</span>
              ${levelBadge}
              <div class="handoff-card-header-actions" onclick="event.stopPropagation()">${pbRenderHandoffCode(org)}</div>
            </div>
            ${org.meta ? `<p class="handoff-card-meta">${pbEscape(org.meta)}</p>` : ''}
            <div class="handoff-card-controls" onclick="event.stopPropagation()">
              ${(org.properties || []).filter(prop => (prop.options || []).length).map(prop => `
                <label class="prop-field">
                  <span class="prop-label">${pbEscape(prop.label || prop.id)}</span>
                  <select class="prop-select" onchange="setHandoffProp('${pbEscape(org.id)}','${pbEscape(prop.id)}',this.value)">
                    ${(prop.options || []).map(o => `<option value="${pbEscape(o.value)}" ${props[prop.id]===o.value?'selected':''}>${pbEscape(o.label)}</option>`).join('')}
                  </select>
                </label>`).join('')}
            </div>
            <div class="handoff-card-body handoff-card-body--${layout}">
              <div>${pbRenderComponentDemo(org, props)}</div>
            </div>
          </div>`;
      };
      // Sort by level order (atom → molecule → organism), then flat list.
      const LEVEL_ORDER = ['atom', 'molecule', 'organism'];
      const sorted = shown.slice().sort((a, b) => {
        const ia = LEVEL_ORDER.indexOf(a.level), ib = LEVEL_ORDER.indexOf(b.level);
        return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
      });
      return `<div class="handoff-card-list">${sorted.map(cardHtml).join('')}</div>`;
    }

    // Component demo (v1.5): a single live preview of the currently-selected variant. The
    // variant (incl. `state`) is chosen via the card's dropdowns — changing one re-renders
    // this demo through setHandoffProp, so the demo stays interactive.
    function pbRenderComponentDemo(org, props) {
      const body = (typeof window[org.renderFn] === 'function')
        ? window[org.renderFn](props)
        : `<div style="padding:14px;color:var(--text-tertiary);font-style:italic;font-size: var(--font-size-xs)">Renderer <code>${pbEscape(org.renderFn || '(none)')}</code> not defined.</div>`;
      return `<div class="handoff-card-preview" data-component-preview="${pbEscape(org.id)}">${body}</div>`;
    }

    const PB_CLIPBOARD_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    function pbRenderHandoffCode(org) {
      if (!org.code || !org.code.snippet)
        return `<div class="handoff-code handoff-code--empty">No code recorded.</div>`;
      return `<div class="handoff-code">
          <button class="handoff-copy-code-btn" onclick="event.stopPropagation(); openCodeDialog('${pbEscape(org.id)}')">
            ${PB_CLIPBOARD_ICON} Copy code
          </button>
        </div>`;
    }

    /* v1.5 — code review dialog: shows the snippet, auto-copies on open, "Copy again" button. */
    function pbCopyText(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text); return; }
      } catch (e) { /* fall through */ }
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) { /* silent */ }
      document.body.removeChild(ta);
    }
    function openCodeDialog(orgId) {
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === orgId);
      if (!org || !org.code || !org.code.snippet) return;
      closeCodeDialog();
      const back = document.createElement('div');
      back.className = 'pb-dialog-backdrop';
      back.id = 'pb-code-dialog';
      back.innerHTML = `
        <div class="pb-dialog pb-code-dialog" role="dialog" aria-modal="true">
          <div class="pb-dialog-head">
            <h2 class="pb-dialog-title">${pbEscape(org.name)} — code</h2>
            <button class="pb-dialog-close" aria-label="Close" onclick="closeCodeDialog()">×</button>
          </div>
          <div class="pb-code-dialog-bar">
            <span class="handoff-code-lang">${pbEscape(org.code.lang || 'html')}</span>
            <button class="handoff-copy-code-btn" onclick="pbCopyCode(this)">${PB_CLIPBOARD_ICON} Copy again</button>
          </div>
          <pre class="pb-code-dialog-pre"><code>${pbEscape(org.code.snippet)}</code></pre>
          <p class="pb-code-dialog-note flash" id="pb-code-note">✓ Copied to clipboard</p>
        </div>`;
      back.addEventListener('click', e => { if (e.target === back) closeCodeDialog(); });
      document.body.appendChild(back);
      document.addEventListener('keydown', pbCodeDialogEsc);
      pbCopyText(org.code.snippet); // auto-copy on open
      setTimeout(() => { const n = document.getElementById('pb-code-note'); if (n) n.classList.remove('flash'); }, 700);
    }
    function closeCodeDialog() {
      const el = document.getElementById('pb-code-dialog');
      if (el) el.remove();
      document.removeEventListener('keydown', pbCodeDialogEsc);
    }
    function pbCodeDialogEsc(e) { if (e.key === 'Escape') closeCodeDialog(); }
    function pbCopyCode(btn) {
      const pre = document.querySelector('#pb-code-dialog .pb-code-dialog-pre');
      pbCopyText(pre ? pre.textContent : '');
      const note = document.getElementById('pb-code-note');
      if (note) { note.textContent = '✓ Copied to clipboard'; note.classList.add('flash'); setTimeout(() => note.classList.remove('flash'), 700); }
    }

    /* ---- Drawer: push-content, 4 tabs ---- */
    const HANDOFF_TABS = [
      ['anatomy', 'Anatomy'], ['spec', 'Specification'],
      ['uiLogic', 'UI Logic'], ['usage', 'Usage'],
    ];
    function pbRenderHandoffDrawer() {
      const id = state.handoffDrawerOpenFor;
      if (!id) return '';
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === id);
      if (!org) return '';
      const tab = state.handoffDrawerSegment || 'anatomy';
      return `
        <div class="handoff-drawer" role="dialog" aria-label="${pbEscape(org.name)} spec">
          <div class="handoff-drawer-header">
            <div class="handoff-drawer-title-wrap">
              <h2 class="handoff-drawer-title">${pbEscape(org.name)}</h2>
              ${org.meta ? `<p class="handoff-drawer-sub">${pbEscape(org.meta)}</p>` : ''}
            </div>
          </div>
          <div class="handoff-drawer-segments">
            ${HANDOFF_TABS.map(([tid, label]) =>
              `<button class="handoff-drawer-segment ${tab === tid ? 'active' : ''}" onclick="setHandoffDrawerSegment('${tid}')">${label}</button>`
            ).join('')}
          </div>
          <div class="handoff-drawer-content">${pbRenderHandoffDrawerTab(org, tab)}</div>
        </div>`;
    }
    function pbRenderHandoffDrawerTab(org, tab) {
      if (tab === 'spec')    return pbRenderHandoffSpec(org);
      if (tab === 'uiLogic') return pbRenderHandoffUiLogic(org);
      if (tab === 'usage')   return pbRenderHandoffUsage(org);
      return pbRenderHandoffAnatomy(org);
    }

    function pbRenderTokenCell(t) {
      if (!t) return '<span class="token-cell token-cell--none">—</span>';
      let demo = '';
      if (t.kind === 'color')       demo = `<span class="token-demo token-demo--color" style="background:${pbEscape(t.value)}"></span>`;
      else if (t.kind === 'radius') demo = `<span class="token-demo token-demo--radius" style="border-radius:${pbEscape(t.value)}"></span>`;
      else if (t.kind === 'space' || t.kind === 'size') demo = `<span class="token-demo token-demo--space" style="width:${pbEscape(t.value)}"></span>`;
      else if (t.kind === 'type')   demo = `<span class="token-demo token-demo--type">Aa</span>`;
      return `<span class="token-cell">${demo}<code class="token-name">${pbEscape(t.name)}</code><span class="token-val">${pbEscape(t.value)}</span></span>`;
    }

    function pbRenderHandoffAnatomy(org) {
      const a = org.anatomy;
      if (!a) return pbAutoAnatomy(org);
      // Prose form: components often author anatomy as a plain string (or {description}).
      if (typeof a === 'string' || !a.parts || !a.parts.length) {
        const text = typeof a === 'string' ? a : (a.description || '');
        if (!text) return pbAutoAnatomy(org);
        const p = (typeof a === 'object' && a.renderProps) || pbActiveProps(org);
        const prev = typeof window[org.renderFn] === 'function' ? window[org.renderFn](p) : '';
        return `${prev ? `<div class="anatomy-stage" data-anatomy-auto="1"><div class="anatomy-render">${prev}</div></div>` : ''}
          <p class="handoff-spec-prose">${pbEscape(text)}</p>`;
      }
      const preview = typeof window[org.renderFn] === 'function'
        ? window[org.renderFn](a.renderProps || {}) : '';
      return `
        <div class="anatomy-stage" data-anatomy-for="${pbEscape(org.id)}">
          <div class="anatomy-render">${preview}</div>
        </div>
        <table class="anatomy-table">
          <thead><tr><th>#</th><th>Element</th><th>Req.</th><th>Token</th></tr></thead>
          <tbody>
            ${a.parts.map(p => `
              <tr data-anatomy-row="${p.n}">
                <td><span class="anatomy-badge">${p.n}</span></td>
                <td>${pbEscape(p.name)}</td>
                <td><span class="req-pill ${p.required ? 'req-pill--req' : 'req-pill--opt'}">${p.required ? 'Required' : 'Optional'}</span></td>
                <td>${pbRenderTokenCell(p.token)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function pbAutoAnatomy(org) {
      const props = pbActiveProps(org);
      const html = (typeof window[org.renderFn] === 'function') ? window[org.renderFn](props) : '';
      if (!html) return '<p class="handoff-spec-note">No render body to auto-derive anatomy from.</p>';
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      // Build tokenMap: cssClass → [tokens] from <style> tags in the render body
      const tokenMap = {};
      tmp.querySelectorAll('style').forEach(function(s) {
        const text = s.textContent;
        const ruleRe = /\.([a-zA-Z0-9_-]+)[^{]*\{([^}]*)\}/g;
        let m;
        while ((m = ruleRe.exec(text)) !== null) {
          const cls = m[1], body = m[2];
          const tokens = [];
          const varRe = /var\(--([\w-]+)\)/g;
          let v;
          while ((v = varRe.exec(body)) !== null) {
            const t = '--' + v[1];
            if (tokens.indexOf(t) < 0) tokens.push(t);
          }
          if (tokens.length) {
            if (!tokenMap[cls]) tokenMap[cls] = [];
            tokens.forEach(function(t) { if (tokenMap[cls].indexOf(t) < 0) tokenMap[cls].push(t); });
          }
        }
      });
      // Walk DOM tree (max depth 4, skip style/script) — tag each element with data-anatomy-n
      const elements = [];
      const nestedIds = (PB_DATA.handoff.organisms || []).map(function(o) { return o.id; });
      function walk(el, depth) {
        if (depth > 4 || el.nodeType !== 1) return;
        if (el.tagName === 'STYLE' || el.tagName === 'SCRIPT') return;
        const classes = Array.from(el.classList);
        const tokens = [];
        classes.forEach(function(cls) {
          (tokenMap[cls] || []).forEach(function(t) { if (tokens.indexOf(t) < 0) tokens.push(t); });
        });
        const desc = classes.length > 0 ? classes[0] : el.tagName.toLowerCase();
        const isNested = classes.some(function(c) { return nestedIds.indexOf(c) >= 0; });
        const n = elements.length + 1;
        el.setAttribute('data-anatomy-n', n);
        elements.push({ depth: depth, desc: desc, tokens: tokens, isNested: isNested });
        Array.from(el.children).forEach(function(child) { walk(child, depth + 1); });
      }
      Array.from(tmp.children).forEach(function(child) {
        if (child.tagName !== 'STYLE') walk(child, 0);
      });
      if (!elements.length) return `<div class="anatomy-stage"><div class="anatomy-render">${html}</div></div><p class="handoff-spec-note">No elements found.</p>`;
      const prev = `<div class="anatomy-stage" data-anatomy-for="${pbEscape(org.id)}" data-anatomy-auto="1"><div class="anatomy-render">${tmp.innerHTML}</div></div>`;
      const rows = elements.map(function(el, i) {
        const tokenHtml = el.tokens.length
          ? el.tokens.map(function(t) { return `<code style="font-size:10px;background:var(--neutral-10);padding:1px 4px;border-radius:3px;font-family:'SF Mono',monospace">${pbEscape(t)}</code>`; }).join(' ')
          : '<span style="color:var(--text-tertiary)">—</span>';
        const name = el.isNested
          ? `${pbEscape(el.desc)} <em style="color:var(--brand);font-size:var(--font-size-xs)">↗ nested component</em>`
          : pbEscape(el.desc);
        return `<tr><td><span class="anatomy-badge">${i+1}</span></td><td>${name}</td><td>${tokenHtml}</td></tr>`;
      }).join('');
      return `${prev}
        <p class="handoff-spec-note" style="margin-top:10px;color:var(--text-tertiary)">Auto-derived — add <code>anatomy.parts[]</code> to override.</p>
        <table class="anatomy-table" style="margin-top:10px">
          <thead><tr><th>#</th><th>Element</th><th>Tokens</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function pbRenderHandoffSpec(org) {
      const s = org.spec;
      if (!s) return pbAutoSpec(org);
      // Prose form: spec authored as a plain string (or {description}) → render as text + preview.
      if (typeof s === 'string' || !s.stack || !s.stack.length) {
        const text = typeof s === 'string' ? s : (s.description || '');
        if (!text) return pbAutoSpec(org);
        const p = (typeof s === 'object' && s.renderProps) || pbActiveProps(org);
        const prev = typeof window[org.renderFn] === 'function' ? window[org.renderFn](p) : '';
        return `${prev ? `<div class="spec-stage"><div class="spec-render">${prev}</div></div>` : ''}
          <p class="handoff-spec-prose">${pbEscape(text)}</p>`;
      }
      const preview = typeof window[org.renderFn] === 'function'
        ? window[org.renderFn](s.renderProps || {}) : '';
      const legend = `<div class="spec-legend">${(s.legend || []).map(a =>
        `<span class="spec-legend-item"><span class="spec-swatch" style="background:${pbEscape(a.color)}"></span>${pbEscape(a.label)}</span>`).join('')}</div>`;
      return `${legend}
        <div class="spec-stage" data-spec-for="${pbEscape(org.id)}">
          <div class="spec-render">${preview}</div>
        </div>`;
    }

    function pbAutoSpec(org) {
      const props = pbActiveProps(org);
      const html = (typeof window[org.renderFn] === 'function') ? window[org.renderFn](props) : '';
      const preview = html ? `<div class="spec-stage"><div class="spec-render">${html}</div></div>` : '';
      // Find the live preview element in the card to measure computed styles
      const previewEl = document.querySelector('.handoff-card-preview[data-component-preview="' + org.id + '"]');
      const root = previewEl && previewEl.firstElementChild;
      if (!root) return preview + '<p class="handoff-spec-note" style="margin-top:12px">Render the card to measure — click the component card first.</p>';
      const cs = window.getComputedStyle(root);
      const spacingMap = {
        '0px':'--space-0','4px':'--space-1','8px':'--space-2','12px':'--space-3',
        '16px':'--space-4','20px':'--space-5','24px':'--space-6','32px':'--space-8','48px':'--space-12',
      };
      function tok(v) { return spacingMap[v] ? spacingMap[v] : ''; }
      const rows = [
        ['Padding', cs.paddingTop + ' ' + cs.paddingRight + ' ' + cs.paddingBottom + ' ' + cs.paddingLeft, ''],
        ['Padding top', cs.paddingTop, tok(cs.paddingTop)],
        ['Padding right', cs.paddingRight, tok(cs.paddingRight)],
        ['Padding bottom', cs.paddingBottom, tok(cs.paddingBottom)],
        ['Padding left', cs.paddingLeft, tok(cs.paddingLeft)],
        ['Margin top', cs.marginTop, tok(cs.marginTop)],
        ['Margin bottom', cs.marginBottom, tok(cs.marginBottom)],
        ['Gap', cs.gap && cs.gap !== 'normal' ? cs.gap : '', cs.gap && cs.gap !== 'normal' ? tok(cs.gap) : ''],
        ['Border radius', cs.borderRadius, ''],
        ['Width', cs.width, ''],
        ['Height', cs.height, ''],
      ].filter(function(r) { return r[1] && r[1] !== '0px' && r[1] !== 'normal' && r[1] !== 'auto' && r[1] !== 'none' && r[1] !== ''; });
      const pt = parseInt(cs.paddingTop)||0, pr = parseInt(cs.paddingRight)||0,
            pb2 = parseInt(cs.paddingBottom)||0, pl = parseInt(cs.paddingLeft)||0,
            mt = parseInt(cs.marginTop)||0, mb = parseInt(cs.marginBottom)||0;
      const boxDiagram = `<div style="margin:16px 0 12px;padding:12px;background:var(--neutral-5);border:1px solid var(--border);border-radius:8px;display:inline-block;font-family:'SF Mono',Menlo,monospace;font-size:10px;line-height:1.5">
        <div style="font-size:var(--font-size-xxs);font-weight:var(--font-weight-bold);text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);margin-bottom:8px">Box model</div>
        ${mt ? `<div style="background:rgba(255,165,0,0.18);border:1px dashed #b45309;border-radius:4px 4px 0 0;padding:3px 12px;text-align:center;color:#b45309;margin-bottom:-1px">↑ margin-top: ${cs.marginTop}</div>` : ''}
        <div style="display:inline-flex;align-items:stretch;background:rgba(0,128,0,0.10);border:1px solid #16a34a;border-radius:${mt?'0':'4px'} ${mt?'0':'4px'} ${mb?'0':'4px'} ${mb?'0':'4px'}">
          ${pl ? `<span style="padding:10px 6px;color:#166534;background:rgba(0,128,0,0.08);font-size:9px;writing-mode:vertical-lr;text-orientation:mixed;text-align:center">← ${cs.paddingLeft}</span>` : ''}
          <div style="display:flex;flex-direction:column;align-items:stretch">
            ${pt ? `<div style="background:rgba(0,128,0,0.08);padding:3px 16px;text-align:center;color:#166534;font-size:9px;border-bottom:1px dashed #16a34a">padding-top: ${cs.paddingTop}</div>` : ''}
            <div style="background:rgba(100,149,237,0.15);border:1px dashed #2196f3;border-radius:4px;padding:12px 20px;text-align:center;color:#1e3a8a;min-width:80px;margin:4px">content</div>
            ${pb2 ? `<div style="background:rgba(0,128,0,0.08);padding:3px 16px;text-align:center;color:#166534;font-size:9px;border-top:1px dashed #16a34a">padding-bottom: ${cs.paddingBottom}</div>` : ''}
          </div>
          ${pr ? `<span style="padding:10px 6px;color:#166534;background:rgba(0,128,0,0.08);font-size:9px;writing-mode:vertical-rl;text-orientation:mixed;text-align:center">${cs.paddingRight} →</span>` : ''}
        </div>
        ${mb ? `<div style="background:rgba(255,165,0,0.18);border:1px dashed #b45309;border-radius:0 0 4px 4px;padding:3px 12px;text-align:center;color:#b45309;margin-top:-1px">margin-bottom: ${cs.marginBottom} ↓</div>` : ''}
      </div>`;
      const tableRows = rows.map(function(r) {
        return `<tr><td style="color:var(--text-active-secondary);font-size:var(--font-size-xs);padding:7px 10px">${pbEscape(r[0])}</td><td style="padding:7px 10px"><code style="font-size:var(--font-size-xs)">${pbEscape(r[1])}</code></td><td style="padding:7px 10px;color:var(--brand);font-size:var(--font-size-xs);font-family:'SF Mono',monospace">${pbEscape(r[2])}</td></tr>`;
      }).join('');
      return `${preview}
        ${boxDiagram}
        ${tableRows ? `<table class="anatomy-table" style="margin-top:4px">
          <thead><tr><th>Property</th><th>Computed</th><th>Token</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>` : ''}
        <p class="handoff-spec-note" style="margin-top:10px;color:var(--text-tertiary)">Auto-measured — add <code>spec.stack[]</code> to customize.</p>`;
    }

    function pbRenderHandoffUiLogic(org) {
      const list = org.uiLogic || [];
      if (!list.length) return '<p class="handoff-spec-note">UI logic not authored for this component yet.</p>';
      return list.map(r => `
        <div class="uilogic-row">
          <div class="uilogic-target">${pbEscape(r.target)}</div>
          <div class="uilogic-rule">${pbEscape(r.rule)}</div>
        </div>`).join('');
    }

    function pbRenderHandoffUsage(org) {
      const u = org.usage;
      if (!u || !u.topics || !u.topics.length)
        return '<p class="handoff-spec-note">Usage not authored for this component yet.</p>';
      const demo = (u.demoProps && typeof window[org.renderFn] === 'function')
        ? `<div class="usage-demo"><span class="usage-demo-tag">Demo</span><div class="usage-demo-render">${window[org.renderFn](u.demoProps)}</div></div>`
        : '';
      const topics = u.topics.map(t => `
        <div class="usage-topic">
          <div class="usage-topic-name">${pbEscape(t.topic)}</div>
          ${t.do   ? `<div class="usage-line"><span class="usage-mark usage-mark--do">✓</span><span>${pbEscape(t.do)}</span></div>` : ''}
          ${t.dont ? `<div class="usage-line"><span class="usage-mark usage-mark--dont">✗</span><span>${pbEscape(t.dont)}</span></div>` : ''}
        </div>`).join('');
      return `${demo}<div class="usage-topics">${topics}</div>
        ${u.placement ? `<div class="usage-placement"><strong>Placement:</strong> ${pbEscape(u.placement)}</div>` : ''}`;

    /* v0.3.17 — Anatomy: gutter badges + dashed leader lines, measured post-render. */
    function pbPlaceAnatomyBadges() {
      const stage = document.querySelector('.anatomy-stage');
      if (!stage) return;
      stage.querySelectorAll('.anatomy-badge--pin, .anatomy-leader').forEach(b => b.remove());
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === stage.getAttribute('data-anatomy-for'));
      if (!org || !org.anatomy) return;
      const stageRect = stage.getBoundingClientRect();
      const gutterX = 22;   /* badge centre-x, inside the stage's left gutter */
      (org.anatomy.parts || []).forEach(p => {
        const target = stage.querySelector(p.anchor);
        if (!target) return;
        const r = target.getBoundingClientRect();
        const cy = r.top - stageRect.top + r.height / 2;          /* element vertical centre */
        const elLeft = r.left - stageRect.left;
        /* dashed leader line from the gutter badge across to the element edge */
        const line = document.createElement('div');
        line.className = 'anatomy-leader';
        line.dataset.anatomyPin = p.n;
        line.style.top   = cy + 'px';
        line.style.left  = (gutterX + 10) + 'px';
        line.style.width = Math.max(0, elLeft - gutterX - 10) + 'px';
        stage.appendChild(line);
        /* numbered badge parked in the gutter, aligned to the element */
        const badge = document.createElement('span');
        badge.className = 'anatomy-badge anatomy-badge--pin';
        badge.textContent = p.n;
        badge.dataset.anatomyPin = p.n;
        badge.style.top  = (cy - 10) + 'px';
        badge.style.left = (gutterX - 10) + 'px';
        stage.appendChild(badge);
      });
    }
    function pbPlaceAutoAnatomyPins() {
      var stage = document.querySelector('.anatomy-stage[data-anatomy-auto]');
      if (!stage) return;
      stage.querySelectorAll('.anatomy-pin-auto').forEach(function(e) { e.remove(); });
      var prevTable = stage.parentNode && stage.parentNode.querySelector('.anatomy-auto-table');
      if (prevTable) prevTable.remove();
      var container = stage.querySelector('.anatomy-render');
      if (!container) return;
      var stageRect = stage.getBoundingClientRect();
      // Find root component element (first non-style child of render)
      var root = null;
      for (var i = 0; i < container.children.length; i++) {
        var c = container.children[i];
        if (c.tagName !== 'STYLE' && c.tagName !== 'SCRIPT') { root = c; break; }
      }
      if (!root) return;
      // Build className→tokens map from <style> tag inside render
      var tokenMap = {};
      var styleEl = container.querySelector('style');
      if (styleEl) {
        var css = styleEl.textContent;
        var ruleRe = /([^{}]+)\{([^}]+)\}/g;
        var rm;
        while ((rm = ruleRe.exec(css)) !== null) {
          var selector = rm[1].trim();
          var body = rm[2];
          var ruleTokens = [];
          var varRe = /var\((--[^,)]+)/g;
          var vm;
          while ((vm = varRe.exec(body)) !== null) {
            var tn = vm[1].trim();
            if (ruleTokens.indexOf(tn) === -1) ruleTokens.push(tn);
          }
          if (ruleTokens.length) {
            var classes = selector.match(/\.[a-zA-Z0-9_-]+/g) || [];
            classes.forEach(function(cls) {
              var key = cls.slice(1);
              if (!tokenMap[key]) tokenMap[key] = [];
              ruleTokens.forEach(function(t) { if (tokenMap[key].indexOf(t) === -1) tokenMap[key].push(t); });
            });
          }
        }
      }
      // Parse numbered element names from adjacent prose paragraph
      var proseEl = stage.nextElementSibling;
      if (proseEl && !proseEl.classList.contains('handoff-spec-prose')) proseEl = null;
      var proseNames = [];
      if (proseEl) {
        var pRe = /(\d+)[.)]\s+([\s\S]+?)(?=\s*\d+[.)]|$)/g;
        var pm;
        while ((pm = pRe.exec(proseEl.textContent)) !== null) {
          proseNames[parseInt(pm[1]) - 1] = pm[2].trim().split(/\n/)[0].trim();
        }
      }
      // Known organisms for nested component detection
      var orgs = (PB_DATA.handoff && PB_DATA.handoff.organisms) || [];
      function findOrg(el) {
        for (var k = 0; k < orgs.length; k++) {
          if (el.classList.contains(orgs[k].id)) return orgs[k];
        }
        return null;
      }
      function autoDesc(el) {
        var cls = Array.from(el.classList)[0] || '';
        var label = cls.replace(/^[a-z0-9]+-/, '').replace(/-/g, ' ');
        return (label.charAt(0).toUpperCase() + label.slice(1)) || el.tagName.toLowerCase();
      }
      function getTokenChips(el) {
        var tokens = [];
        Array.from(el.classList).forEach(function(cls) {
          if (tokenMap[cls]) tokenMap[cls].forEach(function(t) { if (tokens.indexOf(t) === -1) tokens.push(t); });
        });
        return tokens;
      }
      // Badge direct children of the root (its visual "parts"); fall back to root itself
      var targets = Array.from(root.children).filter(function(el) {
        if (el.tagName === 'STYLE' || el.tagName === 'SCRIPT') return false;
        var r = el.getBoundingClientRect();
        return r.width > 0 || r.height > 0;
      });
      if (!targets.length) targets = [root];
      // Place in-element badges at top-left corner of each target
      targets.forEach(function(el, idx) {
        var r = el.getBoundingClientRect();
        var badge = document.createElement('span');
        badge.className = 'anatomy-badge anatomy-badge--pin anatomy-pin-auto';
        badge.textContent = idx + 1;
        badge.style.top = (r.top - stageRect.top - 9) + 'px';
        badge.style.left = (r.left - stageRect.left - 9) + 'px';
        stage.appendChild(badge);
      });
      // Build breakdown table
      // Container row: tokens on the root component element itself (spacing, border, color, etc.)
      var rootChips = getTokenChips(root);
      var containerRow = rootChips.length
        ? '<tr class="anatomy-container-row"><td><span class="anatomy-token-note">—</span></td>' +
          '<td class="anatomy-el-name">Container</td>' +
          '<td class="anatomy-el-tokens">' + rootChips.map(function(t) { return '<code class="anatomy-token-chip">' + pbEscape(t) + '</code>'; }).join('') + '</td></tr>'
        : '';
      var childRows = targets.map(function(el, idx) {
        var n = idx + 1;
        var nested = findOrg(el);
        var nameTd, tokensTd;
        if (nested) {
          nameTd = '<a class="anatomy-component-link" href="#" onclick="event.preventDefault();openHandoffDrawer(\'' + pbEscape(nested.id) + '\')">' + pbEscape(nested.name || nested.id) + ' ↗</a>';
          tokensTd = '<span class="anatomy-token-note">see component</span>';
        } else {
          nameTd = pbEscape(proseNames[idx] || autoDesc(el));
          var chips = getTokenChips(el);
          tokensTd = chips.length
            ? chips.map(function(t) { return '<code class="anatomy-token-chip">' + pbEscape(t) + '</code>'; }).join('')
            : '<span class="anatomy-token-note">—</span>';
        }
        return '<tr><td><span class="anatomy-badge">' + n + '</span></td>' +
               '<td class="anatomy-el-name">' + nameTd + '</td>' +
               '<td class="anatomy-el-tokens">' + tokensTd + '</td></tr>';
      }).join('');
      var rows = containerRow + childRows;
      if (!rows) return;
      if (proseEl) proseEl.style.display = 'none';
      var wrapper = document.createElement('div');
      wrapper.className = 'anatomy-auto-table';
      wrapper.innerHTML = '<table class="anatomy-table"><thead><tr>' +
        '<th>#</th><th>Element</th><th>Tokens used</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
      stage.parentNode.insertBefore(wrapper, stage.nextSibling);
    }

    /* v0.3.17 — Specification redline: measure the live component and inject
       dimension lines (line + end-cap ticks), the value chip placed directly
       beside the line — no leader lines. Element heights run down the LEFT of
       the component (orange); inter-element gaps run down the RIGHT (blue);
       the declared margin sits in dotted bands flanking the component (pink). */
    function pbPlaceSpecAnnotations() {
      const stage = document.querySelector('.spec-stage');
      if (!stage) return;
      stage.querySelectorAll('.spec-anno').forEach(e => e.remove());
      stage.style.minHeight = '';
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === stage.getAttribute('data-spec-for'));
      if (!org || !org.spec || !org.spec.stack) return;
      const s = org.spec;
      const sr = stage.getBoundingClientRect();
      const els = s.stack.map(it => {
        const t = stage.querySelector(it.anchor);
        return t ? { name: it.name, r: t.getBoundingClientRect() } : null;
      }).filter(Boolean);
      if (!els.length) return;

      const mk = (cls, css, txt) => {
        const d = document.createElement('div');
        d.className = 'spec-anno ' + cls;
        d.style.cssText = css;
        if (txt != null) d.textContent = txt;
        stage.appendChild(d);
        return d;
      };
      /* a measurement line carrying an end-cap tick at each end. axis 'v' | 'h' */
      const dimLine = (kind, axis, x, y, len) => {
        const m = ' spec-mark--' + kind;
        if (axis === 'v') {
          mk('spec-dline' + m, `left:${x - 1}px;top:${y}px;width:2px;height:${len}px`);
          mk('spec-cap' + m,   `left:${x - 5}px;top:${y - 1}px;width:10px;height:2px`);
          mk('spec-cap' + m,   `left:${x - 5}px;top:${y + len - 1}px;width:10px;height:2px`);
        } else {
          mk('spec-dline' + m, `left:${x}px;top:${y - 1}px;width:${len}px;height:2px`);
          mk('spec-cap' + m,   `left:${x - 1}px;top:${y - 5}px;width:2px;height:10px`);
          mk('spec-cap' + m,   `left:${x + len - 1}px;top:${y - 5}px;width:2px;height:10px`);
        }
      };

      let minL = Infinity, maxR = 0, maxW = 0;
      els.forEach(e => { minL = Math.min(minL, e.r.left); maxR = Math.max(maxR, e.r.right); maxW = Math.max(maxW, e.r.width); });
      const compL = minL - sr.left, compR = maxR - sr.left;
      const compTop = els[0].r.top - sr.top, compBot = els[els.length - 1].r.bottom - sr.top;
      const chipH = 18, chipW = 30;

      /* element heights (run down the LEFT) + inter-element gaps (run down the RIGHT) */
      const heights = [], gaps = [];
      els.forEach((e, i) => {
        const top = e.r.top - sr.top, bot = e.r.bottom - sr.top;
        heights.push({ value: Math.round(bot - top), top: top, bot: bot });
        if (i < els.length - 1) {
          const gBot = els[i + 1].r.top - sr.top;
          if (gBot - bot > 0.5) gaps.push({ value: Math.round(gBot - bot), top: bot, bot: gBot });
        }
      });

      /* gap region bands on the component — dotted top + bottom edges */
      gaps.forEach(g => mk('spec-band spec-band--gap',
        `left:${compL}px;top:${g.top}px;width:${compR - compL}px;height:${g.bot - g.top}px`));

      /* LEFT — one orange dimension line per element height, chip beside it */
      const xL = Math.max(compL - 26, chipW + 10);
      heights.forEach(h => {
        mk('spec-witness', `left:${xL}px;top:${h.top}px;width:${compL - xL}px`);
        mk('spec-witness', `left:${xL}px;top:${h.bot}px;width:${compL - xL}px`);
        dimLine('dimension', 'v', xL, h.top, h.bot - h.top);
        mk('spec-chip spec-chip--dimension',
          `left:${xL - 7 - chipW}px;top:${(h.top + h.bot) / 2 - chipH / 2}px;height:${chipH}px`, h.value);
      });

      /* RIGHT — one blue dimension line per gap, chip beside it */
      const xR = Math.min(compR + 26, sr.width - chipW - 14);
      gaps.forEach(g => {
        mk('spec-witness', `left:${compR}px;top:${g.top}px;width:${xR - compR}px`);
        mk('spec-witness', `left:${compR}px;top:${g.bot}px;width:${xR - compR}px`);
        dimLine('gap', 'v', xR, g.top, g.bot - g.top);
        mk('spec-chip spec-chip--gap',
          `left:${xR + 7}px;top:${(g.top + g.bot) / 2 - chipH / 2}px;height:${chipH}px`, g.value);
      });

      /* overall content width — horizontal dimension line above the component */
      const wY = compTop - 15;
      dimLine('dimension', 'h', compL, wY, compR - compL);
      mk('spec-chip spec-chip--dimension',
        `left:${(compL + compR) / 2 - chipW / 2}px;top:${wY - chipH - 3}px;height:${chipH}px`, Math.round(maxW));

      /* declared horizontal margin — dotted-edge bands flanking the component;
         one labelled dimension line below the left band (margin is symmetric) */
      const m = s.marginX || 0;
      let bottomY = compBot;
      if (m > 0) {
        const bH = compBot - compTop;
        mk('spec-band spec-band--margin', `left:${compL - m}px;top:${compTop}px;width:${m}px;height:${bH}px`);
        mk('spec-band spec-band--margin', `left:${compR}px;top:${compTop}px;width:${m}px;height:${bH}px`);
        const mY = compBot + 17;
        dimLine('margin', 'h', compL - m, mY, m);
        mk('spec-chip spec-chip--margin',
          `left:${compL - m / 2 - chipW / 2}px;top:${mY + 6}px;height:${chipH}px`, m);
        bottomY = mY + 6 + chipH;
      }

      /* container padding — green bands between the component's box edge and its contents,
         measured from the wrapping element's computed padding (top + left labelled). */
      const firstEl = stage.querySelector(s.stack[0].anchor);
      const container = firstEl ? firstEl.parentElement : null;
      if (container && stage.contains(container)) {
        const cs = getComputedStyle(container);
        const pad = { t: parseFloat(cs.paddingTop) || 0, r: parseFloat(cs.paddingRight) || 0, b: parseFloat(cs.paddingBottom) || 0, l: parseFloat(cs.paddingLeft) || 0 };
        const cr = container.getBoundingClientRect();
        const cL = cr.left - sr.left, cR = cr.right - sr.left, cT = cr.top - sr.top, cB = cr.bottom - sr.top;
        if (pad.t > 0) {
          mk('spec-band spec-band--pad', `left:${cL}px;top:${cT}px;width:${cR - cL}px;height:${pad.t}px`);
          mk('spec-chip spec-chip--pad', `left:${(cL + cR) / 2 - chipW / 2}px;top:${cT + pad.t / 2 - chipH / 2}px;height:${chipH}px`, Math.round(pad.t));
        }
        if (pad.b > 0) mk('spec-band spec-band--pad', `left:${cL}px;top:${cB - pad.b}px;width:${cR - cL}px;height:${pad.b}px`);
        if (pad.l > 0) {
          mk('spec-band spec-band--pad', `left:${cL}px;top:${cT + pad.t}px;width:${pad.l}px;height:${cB - cT - pad.t - pad.b}px`);
          mk('spec-chip spec-chip--pad', `left:${cL + pad.l / 2 - chipW / 2}px;top:${(cT + cB) / 2 - chipH / 2}px;height:${chipH}px`, Math.round(pad.l));
        }
        if (pad.r > 0) mk('spec-band spec-band--pad', `left:${cR - pad.r}px;top:${cT + pad.t}px;width:${pad.r}px;height:${cB - cT - pad.t - pad.b}px`);
      }

      /* grow the stage so nothing in the bottom margin row is clipped */
      stage.style.minHeight = Math.ceil(bottomY + 16) + 'px';
    }

    /* Badge ↔ table-row hover sync (one delegated pair of listeners). */
    function pbAnatomyHoverToggle(e, on) {
      const hit = e.target.closest('[data-anatomy-row], [data-anatomy-pin]');
      if (!hit) return;
      const n = hit.getAttribute('data-anatomy-row') || hit.getAttribute('data-anatomy-pin');
      ['[data-anatomy-row="' + n + '"]', '[data-anatomy-pin="' + n + '"]'].forEach(sel => {
        const el = document.querySelector(sel);
        if (el) el.classList.toggle('is-highlit', on);
      });
    }

    /* Patch renderHandoff so bounds + anatomy badges + spec redline recompute every draw. */
    (function patchRenderHandoff(){
      const orig = window.renderHandoff;
      const after = function(){ recomputeHandoffBounds(); pbPlaceAnatomyBadges(); pbPlaceAutoAnatomyPins(); pbPlaceSpecAnnotations(); };
      window.renderHandoff = function() {
        /* Preserve the left card-list scroll across re-renders so opening a
           component / switching a dropdown doesn't jump it back to the top.
           The drawer body is a fresh element each render, so it naturally
           loads at its starting point — which is the intended behavior. */
        const prevScroll = (document.querySelector('.handoff-main-col') || {}).scrollTop || 0;
        orig.apply(this, arguments);
        const col = document.querySelector('.handoff-main-col');
        if (col) col.scrollTop = prevScroll;
        requestAnimationFrame(function(){ requestAnimationFrame(after); });
      };
      window.addEventListener('resize', function(){
        if (state && state.metaView === 'handoff') requestAnimationFrame(function(){ requestAnimationFrame(after); });
      });
      document.addEventListener('mouseover', function(e){ pbAnatomyHoverToggle(e, true); });
      document.addEventListener('mouseout',  function(e){ pbAnatomyHoverToggle(e, false); });
    })();

    function pbRenderHandoffScreen() {
      const screens = PB_DATA.handoff.screens || [];
      if (!screens.length) {
        return renderEmptyState({
          icon: EMPTY_STATE_ICONS.handoff,
          title: 'No screen handoffs yet',
          body: 'Generate the 7:3 annotated layout for each screen in the prototype. Left panel = render + click-able regions, right panel = design tokens + sizing (no code).',
          ctaLabel: 'Generate screen handoff',
          command: '/pb:build',
          label: 'Handoff command copied',
        });
      }
      const selectedId = PB_DATA.handoff.selectedScreenId || screens[0].id;
      const selectedScreen = screens.find(s => s.id === selectedId) || screens[0];
      const elements = selectedScreen.elements || [];

      return `
        <div class="handoff-screen-pick">
          <label class="handoff-screen-label">Screen:</label>
          <select class="handoff-screen-select" onchange="setHandoffScreen(this.value)">
            ${screens.map(s => `<option value="${pbEscape(s.id)}" ${s.id === selectedScreen.id ? 'selected' : ''}>${pbEscape(s.name)}</option>`).join('')}
          </select>
        </div>

        <div class="handoff-screen-frame">
          ${typeof window[selectedScreen.renderFn] === 'function'
            ? window[selectedScreen.renderFn]()
            : `<div style="padding:32px;background:#fff8e1;border:1px dashed #c1c9d2;border-radius:12px">
                 <em>Screen renderer <code>${pbEscape(selectedScreen.renderFn || '')}</code> not defined.</em>
               </div>`}
          <div class="handoff-element-overlay">
            ${elements.map(el => `
              <button class="handoff-element-hit ${el.id === state.screenDrawerOpenFor ? 'active' : ''}"

    function pbRenderScreenOverviewAside() {

        <p class="pb-dialog-h">Components</p>

        ${sizing ? `<p class="pb-dialog-h">Layout</p><div class="handoff-spec-section">${sizing}</div>` : ''}
        ${(sel.logicNotes && sel.logicNotes.length) ? `<p class="pb-dialog-h" style="margin-top:16px">Logic notes</p><ul style="margin:8px 0 0;padding-left:18px;font-size: var(--font-size-xs); line-height: var(--line-height-p-xs);color:var(--text-active-secondary)">${sel.logicNotes.map(n => `<li>${pbEscape(n)}</li>`).join('')}</ul>` : ''}
        <p class="pb-aside-empty" style="text-align:left;margin-top:16px;padding:12px 0 0;border-top:1px solid var(--border)">Click an element on the screen to inspect its tokens, sizing, UI logic, and live demo.</p>`;
    }

    function pbRenderScreenDrawer() {
      const id = state.screenDrawerOpenFor;
      const screens = PB_DATA.handoff.screens || [];
      const selScreenId = PB_DATA.handoff.selectedScreenId || (screens[0] && screens[0].id);

      const elements = (screen && screen.elements) || [];
      const el = elements.find(e => e.id === id);

            <button class="handoff-drawer-tab ${tab === tid ? 'active' : ''}"
                    onclick="setScreenDrawerSegment('${tid}')">${tlabel}</button>
          `).join('')}
        </div>
        <div class="handoff-drawer-body">
          ${tab === 'spec'    ? pbRenderScreenSpec(el) : ''}
          ${tab === 'uiLogic' ? pbRenderScreenUiLogic(el, org) : ''}
          ${tab === 'demo'    ? pbRenderScreenDemo(el, org) : ''}
