               style="cursor:pointer" onclick="setProtoScreen('${s.id}')">${dot}<span>${pbEscape(s.name || s.id)}</span></div>
          <ul class="pb-tree-list">${nodes}</ul>
        </div>`;
      }).join('') + '</div>';
    }
    function setProtoScreen(id) { state.protoScreenId = id; renderPrototype(); }
    function setProtoDevice(id) { state.protoDevice = id; renderPrototype(); }
    function protoDeviceIcon(id) {
      const p = {
        desktop: '<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>',
        tablet:  '<rect x="5" y="2" width="14" height="20" rx="2"/><path d="M11 18h2"/>',
        mobile:  '<rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/>',
      }[id] || '';
      return `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
    }
    // A prototype is INTERACTIVE. The shell ships a tiny DECLARATIVE runtime so screens drive
    // navigation + behaviour through data-* attributes — no per-project JS:
    //   [data-nav="<screen-id>"]         -> navigate to a screen
    //   [data-action="toggle-password"]  -> show/hide the password in its .field
    //   [data-action="submit"]           -> validate the form, then on success:
    //       data-go="<screen-id>"            navigate · data-toast="<msg>" toast ·
    //       data-redirect="<screen-id>" data-redirect-ms="<n>"  auto-navigate after a delay
    //   inputs: data-required | data-validate="email" | data-minlength="<n>"
    function pbScreensHas(id){ return ((PB_DATA.handoff && PB_DATA.handoff.screens) || []).some(function(s){ return s.id===id; }); }
    function pbFieldError(field, msg){
      if(!field) return;
      var inp = field.querySelector('.field__input');
      var err = field.querySelector('.field__error');
      if(msg){
        if(inp) inp.style.borderColor = 'var(--danger)';
        if(!err){ err=document.createElement('span'); err.className='field__error'; err.style.cssText='font-size:12px;color:var(--danger)'; field.appendChild(err); }
        err.textContent = msg; err.style.display='';
      } else {
        if(inp) inp.style.borderColor = '';
        if(err) err.style.display='none';
      }
    }
    function pbTogglePassword(el){
      var field = el.closest('.field'); if(!field) return;
      var inp = field.querySelector('.field__input'); if(!inp) return;
      if(inp.type==='password'){ inp.type='text'; el.textContent='Hide'; }
      else { inp.type='password'; el.textContent='Show'; }
    }
    function pbProtoSubmit(btn){
      var scope = btn.closest('form') || btn.closest('.proto-device') || document;
      var ok = true;
      scope.querySelectorAll('.field__input').forEach(function(inp){
        var field = inp.closest('.field');
        var val = (inp.value||'').trim();
        var msg = '';
        if(inp.hasAttribute('data-required') && !val) msg='This field is required.';
        else if(val && (inp.getAttribute('data-validate')==='email' || inp.type==='email') && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)) msg='Enter a valid email address.';
        else if(val && inp.getAttribute('data-minlength') && val.length < +inp.getAttribute('data-minlength')) msg='Use at least '+inp.getAttribute('data-minlength')+' characters.';
        pbFieldError(field, msg);
        if(msg) ok=false;
      });
      if(!ok) return;
      var toast = btn.getAttribute('data-toast'); if(toast) pbToast(toast);
      var go = btn.getAttribute('data-go');
      if(go && pbScreensHas(go)){
        setProtoScreen(go);
        var rd = btn.getAttribute('data-redirect'); var ms = +(btn.getAttribute('data-redirect-ms')||0);
        if(rd && ms && pbScreensHas(rd)) setTimeout(function(){ if(state.protoScreenId===go) setProtoScreen(rd); }, ms);
      }
    }
    function pbToast(msg){
      var wrap = document.getElementById('proto-toast-wrap');
      if(!wrap){ wrap=document.createElement('div'); wrap.id='proto-toast-wrap'; wrap.className='proto-toast-wrap'; document.body.appendChild(wrap); }
      var t = document.createElement('div'); t.className='proto-toast'; t.textContent=msg; wrap.appendChild(t);
      requestAnimationFrame(function(){ t.classList.add('in'); });
      setTimeout(function(){ t.classList.remove('in'); setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 250); }, 3400);
    }
    function wireProtoNav() {
      const frame = document.getElementById('proto-frame');
      if (!frame) return;
      frame.addEventListener('click', function (e) {
        var nav = e.target.closest('[data-nav]');
        if (nav) { var id=nav.getAttribute('data-nav'); if(pbScreensHas(id)){ e.preventDefault(); setProtoScreen(id); } return; }
        var tog = e.target.closest('[data-action="toggle-password"]');
        if (tog) { e.preventDefault(); pbTogglePassword(tog); return; }
        var sub = e.target.closest('[data-action="submit"]');
        if (sub) { e.preventDefault(); pbProtoSubmit(sub); return; }
      });
    }

    /* =========================================================================
       TAB 2 — PROJECT SUMMARY
       4 sub-sections (per 02-architecture.md §7 Addition C):
         2.1 Overview              (Objectives + Principles, auto-syncs)
         2.2 User Insights         (Quantitative + Research Summary + Executive Summary)
         2.3 UI Logic Trade-offs   (decisions captured during /pb:clarify)
         2.4 Others                (reserved per-project)
       Empty sub-sections render with empty-state copy.
       ========================================================================= */
    /* v0.3.0 — Tab 2 sub-tab navigation. Only the active sub-section renders. */
    const SUMMARY_SUBTABS = [
      ['overview',  'Overview'],
      ['insights',  'User Insights'],
      ['tradeoffs', 'UI Logic Trade-offs'],
      ['others',    'Others'],
    ];

    function renderMetaSummary() {
      const o  = (PB_DATA && PB_DATA.overview) || {};
      const ui = (PB_DATA && PB_DATA.userInsights) || {};
      const hasSummary = !!(o.objectives || (o.principles && o.principles.length) ||
        ui.quantitative || ui.researchSummary || ui.executiveSummary ||
        (PB_DATA.uiLogicTradeoffs && PB_DATA.uiLogicTradeoffs.length) || PB_DATA.others);

      const header = pbPageHeader({ title: 'Project Summary', infoKey: 'summary' });

      if (!hasSummary) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content pb-content--full">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.summary,
                title: 'No summary yet',
                body: 'The Project Summary is auto-synced from your spec and clarify steps — objectives, principles, user insights, and UI-logic trade-offs.',
                ctaLabel: 'Write the spec', command: '/pb:specify',
              })}
            </div>
          </div>`;
        return;
      }

      const subTabs = SUMMARY_SUBTABS.map(([id, label]) =>
        `<button class="meta-subtab ${state.summarySubTab === id ? 'active' : ''}"
                 onclick="setSummarySubTab('${id}')">${label}</button>`
      ).join('');
      const body = {
        overview:  pbRenderOverview,
        insights:  pbRenderUserInsights,
        tradeoffs: pbRenderTradeoffs,
        others:    pbRenderOthers,
      }[state.summarySubTab]();

      $('#app').innerHTML = `
        <div class="pb-page">
          ${header}
          <div class="pb-content pb-content--full">
            <div class="meta-subtabs">${subTabs}</div>
            ${body}
          </div>
        </div>
      `;
    }

    function pbRenderOverview() {
      const o = (PB_DATA && PB_DATA.overview) || {};
      const objectiveBody = o.objectives
        ? `<p class="meta-p">${pbEscape(o.objectives)}</p>`
        : `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">
             No objective recorded yet. Run <code>/pb:specify</code> to capture one.
           </p>`;
      const principles = (o.principles && o.principles.length)
        ? o.principles.map(p => `
            <div class="meta-principle">
              <span class="meta-principle-num">${p.num}</span>
              <span class="meta-principle-text"><strong>${pbEscape(p.title)}</strong> — ${pbEscape(p.body)}</span>
            </div>`).join('')
        : `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">
             No principles recorded yet. Run <code>/pb:init</code> to capture them.
           </p>`;
      return `
        <div class="meta-section">
          <div class="meta-h2">2.1 Overview</div>

          <div class="meta-h3">Objectives</div>
          <div class="meta-card">${objectiveBody}</div>

          <div class="meta-h3" style="margin-top:24px">Principles</div>
          ${principles}
        </div>
      `;
    }

    function pbRenderUserInsights() {
      const u = (PB_DATA && PB_DATA.userInsights) || {};
      const sub = (title, body) => body
        ? `<div class="meta-h3">${title}</div><div class="meta-card"><p class="meta-p">${pbEscape(body)}</p></div>`
        : `<div class="meta-h3">${title}</div><div class="meta-card"><p class="meta-p" style="color:var(--text-tertiary);font-style:italic">No ${title.toLowerCase()} recorded yet.</p></div>`;
      return `
        <div class="meta-section">
          <div class="meta-h2">2.2 User Insights</div>
          ${sub('Quantitative Data', u.quantitative)}
          ${sub('Research Summary Report', u.researchSummary)}
          ${sub('Executive Summary', u.executiveSummary)}
        </div>
      `;
    }

    function pbRenderTradeoffs() {
      const t = (PB_DATA && PB_DATA.uiLogicTradeoffs) || [];
      if (!t.length) {
        return `
          <div class="meta-section">
            <div class="meta-h2">2.3 UI Logic Trade-offs</div>
            <p class="meta-p" style="color:var(--text-tertiary);font-style:italic">
              No UI logic trade-offs recorded yet. Run <code>/pb:clarify</code> to capture them.
            </p>
          </div>
        `;
      }
      return `
        <div class="meta-section">
          <div class="meta-h2">2.3 UI Logic Trade-offs</div>
          ${t.map((to, i) => `
            <div class="meta-card" style="margin-bottom:12px">
              <div class="meta-h3">Trade-off ${i+1} — ${pbEscape(to.title || '')}</div>
              ${to.question ? `<p class="meta-p"><strong>Question:</strong> ${pbEscape(to.question)}</p>` : ''}
              ${to.options && to.options.length ? `<p class="meta-p"><strong>Options considered:</strong></p><ul>${
                to.options.map(opt => `<li>${pbEscape(opt)}</li>`).join('')
              }</ul>` : ''}
              ${to.decision ? `<p class="meta-p"><strong>Decision:</strong> ${pbEscape(to.decision)}</p>` : ''}
              ${to.why ? `<p class="meta-p"><strong>Why:</strong> ${pbEscape(to.why)}</p>` : ''}
              ${to.tabsAffected ? `<p class="meta-p" style="color:var(--text-tertiary);font-size:12px">Affects: ${pbEscape(to.tabsAffected)}</p>` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function pbRenderOthers() {
      const o = PB_DATA && PB_DATA.others;
      return `
        <div class="meta-section">
          <div class="meta-h2">2.4 Others</div>
          <div class="meta-card">
            ${o
              ? `<div class="meta-p">${o}</div>`
              : `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">Reserved per-project. Edit <code>PB_DATA.others</code> in the script to populate.</p>`
            }
          </div>
        </div>
      `;
    }

    function pbEscape(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    /* =========================================================================
       TAB 3 — USER FLOW
       Zoomable canvas with a custom SVG diagram. Edit `buildFlowSvg()` below
       to add your prototype's screens, decisions, and transitions.
       ========================================================================= */
    /* QA test-case lenses — categories a scenario / coverage-gap can be tagged with. */
    const QA_CAT_LABEL = { ux: 'UX', ui: 'UI', function: 'Function', business: 'Business', 'system-edge': 'System edge' };

    function renderMetaFlow() {
      const populated = !!(PB_DATA.flow && PB_DATA.flow.populated);
      const cta = populated
        ? `<button class="sync-button" onclick="openCopyPopover('/pb:sync-flow', this)">Sync</button>` : '';
      const header = pbPageHeader({ title: 'UX Design', infoKey: 'flow', cta });

      if (!populated) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.flow,
                title: 'No user flow yet',
                body: 'Build your user flow from the project spec. Claude generates one combined left-to-right Mermaid flowchart that covers every story (including edge cases), with a per-story test checklist that maps each story to a path on the canvas.',
                ctaLabel: 'Generate user flow', command: '/pb:sync-flow', label: 'Sync flow command copied',
              })}
            </div>
          </div>`;
        return;
      }

      $('#app').innerHTML = `
        <div class="pb-page">
          ${header}
          <div class="pb-content pb-content--split">
            ${renderFlowPopulated()}
          </div>
        </div>
      `;
      // v0.3.9 — once /pb:sync-flow rewrites renderFlowPopulated
      // to stack multiple Mermaid flows inside #flow-stage, this init renders them all,
      // strips intrinsic widths, measures the natural content size of the stage, and
      // hands off to initCanvas('flow', W, H) so the user gets pan + zoom over every
      // flow at once. Falls back to the legacy buildFlowSvg() init for pre-v0.3.9 templates.
      if (populated && window.mermaid && document.querySelector('#flow-stage .mermaid')) {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          flowchart: { curve: 'basis', htmlLabels: true, padding: 18, useMaxWidth: false, nodeSpacing: 54, rankSpacing: 70 },
          themeVariables: {
            fontFamily: 'var(--font-body, system-ui, sans-serif)',
            fontSize: '14px',
            primaryColor: '#F3E8FF',
            primaryTextColor: '#1f2937',
            primaryBorderColor: '#C084FC',
            lineColor: '#1f2937',
            tertiaryColor: '#ffffff',
          },
        });
        mermaid.run({ querySelector: '#flow-stage .mermaid' }).then(function () {
          var stage = document.getElementById('flow-stage');
          if (!stage) return;
          stage.classList.add('flow-stage-flow');
          Array.from(stage.querySelectorAll('svg')).forEach(function(svg){
            svg.style.maxWidth = 'none';
            svg.removeAttribute('width');
            svg.removeAttribute('height');
            svg.style.width = '';
            svg.style.height = '';
          });
          // v0.3.12 — apply 24px corner radius to rectangle shapes (Action, Subprocess).
          // Mermaid's classDef rx/ry isn't honored on rectangles in current versions —
          // set the SVG attribute directly post-render. Stadiums (Start/End) keep
          // their fully-rounded ends; polygons (Decision/Input) can't be rounded.
          stage.querySelectorAll('.node.cAction > rect, .node.cSubprocess > rect').forEach(function(rect){
            rect.setAttribute('rx', '24');
            rect.setAttribute('ry', '24');
          });
          // v0.3.14 — Wireflow decorations: click-to-preview + numbered note badges.
          if (typeof decorateWireflowNodes === 'function') decorateWireflowNodes();
          stage.style.width = 'auto';
          stage.style.height = 'auto';
          stage.style.marginLeft = '0';
          stage.style.marginTop = '0';
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              var bbox = stage.getBoundingClientRect();
              var W = Math.max(1024, Math.ceil(bbox.width));
              var H = Math.max(720,  Math.ceil(bbox.height));
              stage.style.width = W + 'px';
              stage.style.height = H + 'px';
              stage.style.marginLeft = -(W/2) + 'px';
              stage.style.marginTop  = -(H/2) + 'px';
              initCanvas('flow', W, H);
            });
          });
        }).catch(function(){ /* silent */ });
      } else if (populated && document.getElementById('flow-canvas')) {
        initCanvas('flow', 1200, 380);
      }
    }

    function renderFlowPopulated() {
      const f = (PB_DATA && PB_DATA.flow) || {};
      const fStories = f.stories || [];
      if (!f.mermaid && !(f.flows && f.flows.length) && f.html) {
        return `<div class="pb-main">${f.html}</div><aside class="pb-aside"><p class="pb-aside-empty">Legacy flow.</p></aside>`;
      }
      // Multi-flow: prefer f.flows[]; fall back to the single f.mermaid.
      const flows = (f.flows && f.flows.length) ? f.flows
                  : (f.mermaid ? [{ name: 'Main flow', mermaid: f.mermaid }] : []);
      const idx = Math.min(state.flowIndex || 0, Math.max(0, flows.length - 1));
      const current = flows[idx];
      const dropdown = flows.length > 1
        ? `<select class="pb-flow-select" onchange="setFlowIndex(this.value)">`
          + flows.map((fl, i) => `<option value="${i}" ${i === idx ? 'selected' : ''}>${pbEscape(fl.name || ('Flow ' + (i + 1)))}</option>`).join('')
          + `</select>`
        : `<span class="pb-flow-name">${pbEscape((current && current.name) || 'User flow')}</span>`;
      const stage = current ? `<div class="mermaid">${current.mermaid}</div>` : buildFlowSvg();

      const dims = pbDefaultDims();
      if (state.flowW == null) state.flowW = dims.w;
      if (state.flowH == null) state.flowH = dims.h;

      const storiesList = fStories.length
        ? '<ol class="flow-doc-stories">' + fStories.map(s =>
            `<li><strong>${pbEscape(s.title||'')}${s.priority?' ('+pbEscape(s.priority)+')':''}</strong>`
            + (s.jtbd ? ` — ${pbEscape(s.jtbd)}` : '')
            + (s.path ? `<div class="flow-doc-path"><em>Path:</em> ${pbEscape(s.path)}</div>` : '') + '</li>').join('') + '</ol>'
        : '<p class="flow-doc-side-sub">No user stories yet.</p>';
      // QA test cases: scenarios may be plain strings or { text, category } across the QA lenses
      // (UX · UI · Function · Business · System edge). f.coverageWarnings flags edges the UI misses.
      const scenarioLi = (sc) => {
        const text = (typeof sc === 'string') ? sc : (sc && sc.text) || '';
        const cat = (sc && typeof sc === 'object') ? sc.category : null;
        const chip = cat ? `<span class="pb-qa-cat pb-qa-cat--${pbEscape(cat)}">${pbEscape(QA_CAT_LABEL[cat] || cat)}</span> ` : '';
        return `<li>☐ ${chip}${pbEscape(text)}</li>`;
      };
      const testsList = fStories.length
        ? '<ol class="flow-doc-stories">' + fStories.map(s =>
            `<li><strong>${pbEscape(s.title||'')}</strong><ul class="flow-doc-checks">`
            + (s.scenarios||[]).map(scenarioLi).join('') + '</ul></li>').join('') + '</ol>'
        : '<p class="flow-doc-side-sub">No test cases yet.</p>';
      const warns = f.coverageWarnings || [];
      const warnBlock = warns.length ? `
        <div class="pb-qa-warn">
          <div class="pb-qa-warn-head">⚠ Coverage gaps (${warns.length})</div>
          <ul class="pb-qa-warn-list">${warns.map(w => {
            const note = (typeof w === 'string') ? w : (w && w.note) || '';
            const cat = (w && typeof w === 'object') ? w.category : null;
            const chip = cat ? `<span class="pb-qa-cat pb-qa-cat--${pbEscape(cat)}">${pbEscape(QA_CAT_LABEL[cat] || cat)}</span> ` : '';
            return `<li>${chip}${pbEscape(note)}</li>`;
          }).join('')}</ul>
        </div>` : '';

      const legendBtn = `
        <button class="flow-doc-legend-btn" type="button" aria-label="Show legend" onclick="openLegendPopover(this)">
          <span class="flow-doc-legend-swatch flow-doc-swatch-start"></span>
          <span class="flow-doc-legend-swatch flow-doc-swatch-decision"></span>
          <span class="flow-doc-legend-swatch flow-doc-swatch-action"></span>
          <span class="flow-doc-legend-swatch flow-doc-swatch-subprocess"></span>
          <span class="flow-doc-legend-label">Legend</span>
          <span class="flow-doc-legend-q" aria-hidden="true">?</span>
        </button>`;

      const main = `
        <div class="pb-main">
          <div class="flow-main-bar">
            <div class="flow-main-bar-left">${dropdown}</div>
            ${legendBtn}
          </div>
          <div class="flow-canvas" id="flow-canvas" style="max-width:${state.flowW}px;height:${state.flowH}px">
            <div class="flow-viewport" id="flow-viewport">
              <div class="flow-stage" id="flow-stage">${stage}</div>
            </div>
            <div class="flow-zoom-controls">
              <button class="flow-zoom-btn" id="flow-zoom-in"  title="Zoom in">+</button>
              <button class="flow-zoom-btn" id="flow-zoom-out" title="Zoom out">−</button>
              <button class="flow-zoom-btn" id="flow-zoom-fit" title="Fit / reset">⊙</button>
            </div>
            <div class="flow-zoom-readout" id="flow-zoom-readout">100%</div>
            <div class="flow-hint">Scroll to zoom · drag to pan</div>
          </div>
        </div>`;

      const aside = `
        <aside class="pb-aside">
          <div class="pb-flow-dims">
            <span class="pb-dialog-h" style="margin:0">Screen size</span>
            <label>W <input type="number" value="${state.flowW}" min="320" max="2400" oninput="setFlowDim('w', this.value)"></label>
            <span class="pb-flow-dims-x">×</span>
            <label>H <input type="number" value="${state.flowH}" min="360" max="1000" oninput="setFlowDim('h', this.value)"></label>
          </div>
          <div class="flow-side-tabs">
            <button class="flow-side-tab active" data-tab="stories" onclick="setFlowSideTab('stories')">User stories</button>
            <button class="flow-side-tab"        data-tab="tests"   onclick="setFlowSideTab('tests')">Test cases</button>
          </div>
          <div class="flow-side-panel" data-tab="stories">
            <div class="flow-doc-side-head">
              <h2 class="flow-doc-side-title">User stories</h2>
              <p class="flow-doc-side-sub">Generated from the PRD + prototype — each maps to a path on the canvas.</p>
            </div>
            ${storiesList}
          </div>
          <div class="flow-side-panel" data-tab="tests" hidden>
            <div class="flow-doc-side-head">
              <h2 class="flow-doc-side-title">Test cases</h2>
              <p class="flow-doc-side-sub">QA scenarios per story across UX · UI · Function · Business · System-edge — the prototype's test checklist.</p>
            </div>
            ${warnBlock}
            ${testsList}
          </div>
        </aside>`;

      return main + aside;
    }

    /* Tiny example flow: START → SCREEN → DECISION → END.
       Replace this with your prototype's actual flow. */
    function buildFlowSvg() {
      var W=1200, H=380, Y=190;
      var xS=80, xScr=350, xD=620, xEndScr=900, xE=1140;
      var RW=140, RH=50, DW=72, DH=46, CR=24;
      var C_SCR='#4A90D9', C_DEC='#F6C000', C_TRM='#1c1f22', C_GRN='#00A651', C_LN='#9ca3af';

      function R(x,y,w,h,fill,lbl) {
        return '<rect x="'+(x-w/2)+'" y="'+(y-h/2)+'" width="'+w+'" height="'+h+'" rx="10" fill="'+fill+'"/>'
          + '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle"'
          + ' font-family="Poppins,sans-serif" font-size="13" font-weight="600" fill="#fff">'+lbl+'</text>';
      }
      function D(x,y,lines) {
        var pts = x+','+(y-DH)+' '+(x+DW)+','+y+' '+x+','+(y+DH)+' '+(x-DW)+','+y;
        var s = '<polygon points="'+pts+'" fill="'+C_DEC+'"/>';
        lines.forEach(function(l,i){
          var ty = y + (i - (lines.length-1)/2) * 14;
          s += '<text x="'+x+'" y="'+ty+'" text-anchor="middle" dominant-baseline="middle"'
            + ' font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="'+C_TRM+'">'+l+'</text>';
        });
        return s;
      }
      function T(x,y,lbl) {
        return '<circle cx="'+x+'" cy="'+y+'" r="'+CR+'" fill="'+C_TRM+'"/>'
          + '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle"'
          + ' font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#fff">'+lbl+'</text>';
      }
      function Ln(x1,y1,x2,y2,clr){
        return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(clr||C_LN)+'" stroke-width="1.5" marker-end="url(#fm-ah)"/>';
      }
      function Bg(x,y,t,bg){
        var tw = t.length*7+14;
        return '<rect x="'+(x-tw/2)+'" y="'+(y-9)+'" width="'+tw+'" height="18" rx="9" fill="'+bg+'"/>'
          + '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle"'
          + ' font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#fff">'+t+'</text>';
      }

      var s = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
      s += '<defs>'
        + '<marker id="fm-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1L9,5L0,9z" fill="'+C_LN+'"/></marker>'
        + '<marker id="fm-gr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,1L9,5L0,9z" fill="'+C_GRN+'"/></marker>'
        + '</defs>';
      s += '<rect width="'+W+'" height="'+H+'" fill="#f8f9fb" rx="12"/>';

      // Connections
      s += Ln(xS+CR, Y, xScr-RW/2-3, Y);
      s += Ln(xScr+RW/2+3, Y, xD-DW-3, Y);
      s += '<line x1="'+(xD+DW+3)+'" y1="'+Y+'" x2="'+(xEndScr-RW/2-3)+'" y2="'+Y+'" stroke="'+C_GRN+'" stroke-width="1.5" marker-end="url(#fm-gr)"/>';
      s += Bg((xD+DW+xEndScr-RW/2)/2, Y-14, 'Yes', C_GRN);
      s += Ln(xEndScr+RW/2+3, Y, xE-CR-3, Y);

      // Nodes
      s += T(xS,  Y, 'START');
      s += R(xScr, Y, RW, RH, C_SCR, 'Example Screen');
      s += D(xD,   Y, ['Continue?']);
      s += R(xEndScr, Y, RW, RH, C_SCR, 'Done Screen');
      s += T(xE,   Y, 'END');

      s += '</svg>';
      return s;
    }

    /* =========================================================================
       TAB 4 — DESIGN HANDOFF
       Dual-view per 02-architecture.md §7 Addition B:
         - Component view (default, auto-syncs on /pb:build)
         - Screen view    (manual, /pb:handoff)
                          uses 7:3 grid: 7fr render + 3fr spec panel
       Right panel emits DS tokens + sizing ONLY — never code.
       ========================================================================= */
    /* v0.3.17 — per-organism active property combo, keyed by org id.
       Lazy-seeded from each organism's property defaults by pbActiveProps(). */
    const handoffProps = {};
    function setHandoffProp(orgId, propId, value) {
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === orgId);
      if (!org) return;
      pbActiveProps(org)[propId] = value;
      renderHandoff();
    }
    function setHandoffView(v) {
      PB_DATA.handoff.view = v;
      renderHandoff();
    }
    function setHandoffScreen(id) {
      PB_DATA.handoff.selectedScreenId = id;
      PB_DATA.handoff.selectedElementId = null;
      renderHandoff();
    }
    function setHandoffElement(id) {
      PB_DATA.handoff.selectedElementId = id;
      renderHandoff();
    }

    /* v1.2 — UI Design: page chrome + DS bar + 3-way Global|Local|Screen tabs over a split
       layout (left = component cards / screen frame · right = persistent detail aside). */
    function setHandoffTab(t) {
      state.handoffTab = t;
      if (t === 'screen') { PB_DATA.handoff.view = 'screen'; state.handoffDrawerOpenFor = null; }
      else { PB_DATA.handoff.view = 'component'; state.handoffScope = t; state.screenDrawerOpenFor = null; }
      renderHandoff();
    }

    function renderHandoff() {
      const orgs = PB_DATA.handoff.organisms || [];
      const screens = PB_DATA.handoff.screens || [];
      const hasAny = orgs.length || screens.length;
      const cta = hasAny ? `<button class="sync-button" onclick="openFigmaPushPanel(this)">Push to Figma →</button>` : '';
      const header = pbPageHeader({ title: 'UI Design', infoKey: 'handoff', cta });
      const dsBar = pbRenderDsBar();

      if (!hasAny) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            ${dsBar}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.handoff,
                title: 'No components yet',
                body: 'Run /pb:build to populate the design system — every reusable component (with property controls, a code panel, and a spec drawer) and every screen handoff. Components here are the same ones the Prototype renders, never duplicated.',
                ctaLabel: 'Generate components', command: '/pb:build', label: 'Build command copied',
              })}
            </div>
          </div>`;
        return;
      }

      const isGlobal = o => o.scope === 'global' || !!o.dsMatch;
      const groups = { global: orgs.filter(isGlobal), local: orgs.filter(o => !isGlobal(o)) };
      if (!state.handoffTab) state.handoffTab = groups.local.length ? 'local' : (groups.global.length ? 'global' : 'screen');
      const tab = state.handoffTab;
      PB_DATA.handoff.view = (tab === 'screen') ? 'screen' : 'component';
      if (tab !== 'screen') state.handoffScope = tab;

      const tabsCtl = [['global', 'Global', groups.global.length], ['local', 'Local', groups.local.length], ['screen', 'Screen', screens.length]]
        .map(([id, label, n]) => `<button class="meta-subtab ${tab === id ? 'active' : ''}" onclick="setHandoffTab('${id}')">${label}<span class="meta-subtab-count">${n}</span></button>`).join('');

      const main = (tab === 'screen') ? pbRenderHandoffScreen() : pbRenderHandoffCards(groups[tab]);
      const aside = (tab === 'screen')
        ? (state.screenDrawerOpenFor ? `<div class="handoff-drawer">${pbRenderScreenDrawer()}</div>` : pbHandoffAsideHint('Select an element on the screen to inspect its tokens, sizing, UI logic, and live demo.'))
        : (state.handoffDrawerOpenFor ? pbRenderHandoffDrawer() : pbHandoffAsideHint('Select a component to see its anatomy, specification, UI logic, and usage.'));

      $('#app').innerHTML = `
        <div class="pb-page">
          ${header}
          ${dsBar}
          <div class="pb-content pb-content--split">
            <div class="pb-main handoff-main-col">
              <div class="meta-subtabs" style="margin-bottom:16px">${tabsCtl}</div>
              ${main}
            </div>
            <aside class="pb-aside">${aside}</aside>
          </div>
        </div>`;
    }

    function pbHandoffAsideHint(msg) { return `<p class="pb-aside-empty">${msg}</p>`; }

    /* Design-system bar under the UI Design title (meta.designSystem; tolerated-absent). */
    function pbRenderDsBar() {
      const ds = (PB_REGISTRY && PB_REGISTRY.meta && PB_REGISTRY.meta.designSystem) || null;
      if (!ds || !ds.name) {
        if (VIEW_ONLY) return '';
        return `<div class="pb-ds-bar pb-ds-bar--empty" onclick="openCopyPopover('/pb:build', this)" title="Link a design system">+ No design system linked — click to add one</div>`;
      }
      const linkIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>';
      const codeIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
      const design = ds.designLink
        ? `<a class="pb-ds-link" href="${pbEscape(ds.designLink)}" target="_blank" rel="noopener">${linkIcon} Design</a>`
        : `<span class="pb-ds-link pb-ds-link--missing">No design link</span>`;
      let code;
      if (ds.codeLibrary && /^https?:/.test(ds.codeLibrary)) {
        code = `<a class="pb-ds-link" href="${pbEscape(ds.codeLibrary)}" target="_blank" rel="noopener">${codeIcon} Code library</a>`;
      } else if (ds.codeLibrary) {
        code = `<span class="pb-ds-link" title="${pbEscape(ds.codeLibrary)}">${codeIcon} <code>${pbEscape(ds.codeLibrary)}</code></span>`;
      } else {
        code = `<span class="pb-ds-link pb-ds-link--missing">No code library</span>`;
      }
      return `<div class="pb-ds-bar"><span class="pb-ds-name">${pbEscape(ds.name)}</span><span class="pb-ds-sep">·</span>${design}<span class="pb-ds-sep">·</span>${code}</div>`;
    }

    /* Resolve the active property combo for an organism (lazy-seeded from defaults). */
    function pbActiveProps(org) {
      if (!handoffProps[org.id]) {
        const seed = {};
        (org.properties || []).forEach(p => { seed[p.id] = p.default; });
        handoffProps[org.id] = seed;
      }
      return handoffProps[org.id];
    }

    /* v0.3.13 — Auto-position handoff hit overlays from rendered elements. */
    function recomputeHandoffBounds() {
      const frame = document.querySelector('.handoff-screen-frame');
      if (!frame) return;
      const overlay = frame.querySelector('.handoff-element-overlay');
      if (!overlay) return;
      const frameRect = frame.getBoundingClientRect();
      frame.querySelectorAll('[data-handoff-el]').forEach(target => {
        const id = target.getAttribute('data-handoff-el');
        const hit = overlay.querySelector(`.handoff-element-hit[onclick*="'${id}'"]`);
        if (!hit) return;
        const r = target.getBoundingClientRect();
        hit.style.top    = (r.top    - frameRect.top)  + 'px';
        hit.style.left   = (r.left   - frameRect.left) + 'px';
        hit.style.width  = r.width  + 'px';
        hit.style.height = r.height + 'px';
        hit.style.right  = 'auto';
        hit.style.bottom = 'auto';
      });
    }
    window.addEventListener('resize', function(){
      if (state && state.metaView === 'handoff' && PB_DATA.handoff.view === 'screen') {
        requestAnimationFrame(recomputeHandoffBounds);
      }
    });

    /* =========================================================================
       v0.3.14 — Wireflow extensions for Tab 3.
       /pb:sync-flow populates these registries with
       the screen renderers and flow notes for the current spec. The
       decorate helper makes screen-name nodes clickable (preview popover)
       and renders amber-circle note numbers on annotated nodes.
       ========================================================================= */
    /* Sync-flow OVERWRITES this with one entry per screen-mapped Mermaid node, e.g.:
       { S: { fn: 'renderSignInScreen', label: 'Sign in Page', status: 'DONE', preview: 'form-2' } }
       Statuses: NEW · IN PROGRESS · DONE · ATTENTION · ASAP · REVIEW · PAUSE
       Preview kinds: form-1 · form-2 · form-3 · otp · success · block */
    const WIREFLOW_SCREENS = {};
    /* Sync-flow OVERWRITES this with { <noteNumber>: '<mermaidNodeId>' } — note numbers
       must match the numbered list rendered in .flow-doc-notes inside the sidebar. */
    const WIREFLOW_NOTES   = {};

    /* v0.3.15 — Mini wireframe sketch HTML, embedded inside each Mermaid card label. */
    function wfMiniPreview(type) {
      switch (type) {
        case 'form-1': return "<div class='wf-mini'><div class='wf-input'></div><div class='wf-cta'></div></div>";
        case 'form-2': return "<div class='wf-mini'><div class='wf-input'></div><div class='wf-input'></div><div class='wf-cta'></div></div>";
        case 'form-3': return "<div class='wf-mini'><div class='wf-input'></div><div class='wf-input'></div><div class='wf-input'></div><div class='wf-cta'></div></div>";
        case 'otp':    return "<div class='wf-mini'><div class='wf-otp-row'><span></span><span></span><span></span><span></span><span></span><span></span></div><div class='wf-cta'></div></div>";
        case 'success':return "<div class='wf-mini wf-mini-state wf-state-success'><div class='wf-state-mark'>&#10003;</div></div>";
        case 'block':  return "<div class='wf-mini wf-mini-state wf-state-block'><div class='wf-state-mark'>!</div></div>";
        default:       return "<div class='wf-mini'></div>";
      }
    }
    function wfCardHtml(entry) {
      const status = entry.status || 'NEW';
      const statusCls = 'wf-badge-' + status.toLowerCase().replace(/\s+/g, '-');
      /* Inline width+height so Mermaid measures the foreignObject correctly. */
      return "<div class='wf-card' style='width:190px;height:148px'>" +
        "<div class='wf-card-head'>" +
          "<span class='wf-card-title'>" + entry.label + "</span>" +
          "<span class='wf-badge " + statusCls + "'>" + status + "</span>" +
        "</div>" +
        "<div class='wf-card-body'>" + wfMiniPreview(entry.preview) + "</div>" +
      "</div>";
    }

    function openScreenPreviewPopover(nodeId, anchorEl) {
      const entry = WIREFLOW_SCREENS[nodeId];
      if (!entry || typeof window[entry.fn] !== 'function') return;
      document.querySelectorAll('.copy-popover, .copy-popover-backdrop').forEach(el => el.remove());
      window.removeEventListener('keydown', copyPopoverKeyHandler);
      window.removeEventListener('resize', repositionCopyPopover);

      const backdrop = document.createElement('div');
      backdrop.className = 'copy-popover-backdrop';
      backdrop.addEventListener('click', closeCopyPopover);

      const pop = document.createElement('div');
      pop.className = 'copy-popover';
      pop.setAttribute('role', 'dialog');
      pop.setAttribute('aria-label', 'Screen preview: ' + entry.label);
      pop.style.width = '420px';
      pop.style.maxHeight = '78vh';
      pop.style.overflowY = 'auto';
      pop.innerHTML =
        '<button class="copy-popover-close" type="button" aria-label="Close" onclick="closeCopyPopover()">' + COPY_POPOVER_ICONS.close + '</button>' +
        '<div class="copy-popover-cmd-label" style="margin-bottom:14px"><span>' + entry.label + '</span></div>' +
        '<div class="wireflow-preview-frame">' + window[entry.fn]() + '</div>' +
        '<div class="wireflow-preview-footer">Full spec (tokens · sizing · states) lives in <strong>Tab 4 → Design Handoff → Screen</strong>.</div>';

      document.body.appendChild(backdrop);
      document.body.appendChild(pop);
      positionCopyPopover(pop, anchorEl);
      setTimeout(() => { pop.classList.add('is-visible'); positionCopyPopover(pop, anchorEl); }, 10);
      window.addEventListener('keydown', copyPopoverKeyHandler);
      window.addEventListener('resize', repositionCopyPopover);
    }

    function decorateWireflowNodes() {
      const stage = document.getElementById('flow-stage');
      if (!stage) return;
      const notesByNode = {};
      Object.entries(WIREFLOW_NOTES).forEach(([num, nodeId]) => {
        (notesByNode[nodeId] = notesByNode[nodeId] || []).push(num);
      });
      stage.querySelectorAll('.node').forEach(n => {
        const m = (n.id || '').match(/^flowchart-([A-Za-z]+)/);
        if (!m) return;
        const nodeId = m[1];
        if (WIREFLOW_SCREENS[nodeId]) {
          n.style.cursor = 'pointer';
          n.setAttribute('data-wireflow-screen', nodeId);
          if (!n._wireflowClickWired) {
            n.addEventListener('click', function (e) {
              e.stopPropagation();
              openScreenPreviewPopover(nodeId, n);
            });
            n._wireflowClickWired = true;
          }
        }
        if (notesByNode[nodeId] && !n.querySelector('.wireflow-note-badge')) {
          const rect = n.querySelector('rect, polygon, ellipse');
          if (!rect) return;
          const bb = rect.getBBox();
          notesByNode[nodeId].forEach((num, idx) => {
            const cx = bb.x + bb.width - 6 + (idx * 18);
            const cy = bb.y - 6;
            const g  = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'wireflow-note-badge');
            g.innerHTML =
              '<circle cx="' + cx + '" cy="' + cy + '" r="10" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"></circle>' +
              '<text x="' + cx + '" y="' + (cy + 1) + '" text-anchor="middle" dominant-baseline="middle" ' +
              'font-family="Inter, system-ui" font-size="11" font-weight="700" fill="#78350f">' + num + '</text>';
            n.appendChild(g);
          });
        }
      });
    }

    /* v0.3.0 — Component view as vertical card list. Click card → spec drawer. */
    /* The component card list for the active scope (Global/Local). Selection + Push live
       in the page header / tab control now — this returns just the cards. */
    function pbRenderHandoffCards(shown) {
      const orgs = (PB_DATA.handoff.organisms || []);
      if (!shown || !shown.length) {
        const scope = state.handoffScope || 'local';
        return `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">No ${scope} components.${scope === 'global' ? ' Global components are shared design-system refs reused across prototypes.' : ' Local components are built for this project.'}</p>`;
      }
      const cardHtml = (org) => {
        const i = orgs.indexOf(org);
        const props = pbActiveProps(org);
        const layout = org.codeLayout === 'side-by-side' ? 'side-by-side' : 'stacked';
        const selected = state.handoffDrawerOpenFor === org.id;
        return `
          <div class="handoff-card ${selected ? 'is-selected' : ''}" onclick="openHandoffDrawer('${pbEscape(org.id)}')">
            <div class="handoff-card-header">
              <span class="handoff-card-title">${i+1} · ${pbEscape(org.name)}</span>
              <span class="handoff-card-id">${pbEscape(org.scope || 'local')}${org.level ? ' · ' + pbEscape(org.level) : ''} · ${pbEscape(org.id)}</span>
            </div>
            ${org.meta ? `<p class="handoff-card-meta">${pbEscape(org.meta)}</p>` : ''}
            <div class="handoff-card-controls" onclick="event.stopPropagation()">
              ${(org.properties || []).filter(prop => prop.id !== 'state').map(prop => `
                <label class="prop-field">
                  <span class="prop-label">${pbEscape(prop.label || prop.id)}</span>
                  <select class="prop-select" onchange="setHandoffProp('${pbEscape(org.id)}','${pbEscape(prop.id)}',this.value)">
                    ${(prop.options || []).map(o => `<option value="${pbEscape(o.value)}" ${props[prop.id]===o.value?'selected':''}>${pbEscape(o.label)}</option>`).join('')}
                  </select>
                </label>`).join('')}
            </div>
            <div class="handoff-card-body handoff-card-body--${layout}">
              ${pbRenderComponentDemo(org, props)}
              ${pbRenderHandoffCode(org)}
            </div>
            <div class="handoff-card-hint">→ Click the card for the full spec (Anatomy · Specification · UI Logic · Usage)</div>
          </div>`;
      };
      // Group by atomic level when any component declares one; otherwise a flat list.
      const LEVELS = ['atom', 'molecule', 'organism'];
      if (!shown.some(o => o.level)) {
        return `<div class="handoff-card-list">${shown.map(cardHtml).join('')}</div>`;
      }
      const buckets = {};
      shown.forEach(o => { const k = LEVELS.indexOf(o.level) >= 0 ? o.level : 'other'; (buckets[k] = buckets[k] || []).push(o); });
      const labels = { atom: 'Atoms', molecule: 'Molecules', organism: 'Organisms', other: 'Other' };
      return LEVELS.concat(['other']).filter(k => buckets[k] && buckets[k].length).map(k => `
        <div class="pb-level-group">
          <div class="pb-level-head">${labels[k]}<span class="pb-level-count">${buckets[k].length}</span></div>
          <div class="handoff-card-list">${buckets[k].map(cardHtml).join('')}</div>
        </div>`).join('');
    }

    // Component demo: if a component declares a `state` property, show EVERY state, labeled
    // (interactive components MUST ship their states as variants). Otherwise a single preview.
    function pbRenderComponentDemo(org, props) {
      const render = (p) => (typeof window[org.renderFn] === 'function')
        ? window[org.renderFn](p)
        : `<div style="padding:14px;color:var(--text-tertiary);font-style:italic;font-size:12px">Renderer <code>${pbEscape(org.renderFn || '(none)')}</code> not defined.</div>`;
      const stateProp = (org.properties || []).find(p => p.id === 'state');
      if (!stateProp) {
        return `<div class="handoff-card-preview" data-component-preview="${pbEscape(org.id)}">${render(props)}</div>`;
      }
      return `<div class="handoff-card-preview handoff-variants" data-component-preview="${pbEscape(org.id)}">`
        + stateProp.options.map(o =>
            `<div class="handoff-variant"><span class="handoff-variant-label">${pbEscape(o.label)}</span>`
            + `<div class="handoff-variant-demo">${render(Object.assign({}, props, { state: o.value }))}</div></div>`).join('')
        + `</div>`;
    }

    function pbRenderHandoffCode(org) {
      if (!org.code || !org.code.snippet)
        return `<div class="handoff-code handoff-code--empty">No code recorded.</div>`;
      return `
        <div class="handoff-code">
          <div class="handoff-code-bar"><span class="handoff-code-lang">${pbEscape(org.code.lang || 'html')}</span></div>
          <pre class="handoff-code-pre"><code>${pbEscape(org.code.snippet)}</code></pre>
        </div>`;
    }

    /* ---- Drawer: push-content, 4 tabs ---- */
    const HANDOFF_TABS = [
      ['anatomy', 'Anatomy'], ['spec', 'Specification'],
      ['uiLogic', 'UI Logic'], ['usage', 'Usage'],
    ];
    function pbRenderHandoffDrawer() {
      const id = state.handoffDrawerOpenFor;
      if (!id) return '';
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === id);
      if (!org) return '';
      const tab = state.handoffDrawerSegment || 'anatomy';
      return `
        <div class="handoff-drawer" role="dialog" aria-label="${pbEscape(org.name)} spec">
          <div class="handoff-drawer-header">
            <div class="handoff-drawer-title-wrap">
              <h2 class="handoff-drawer-title">${pbEscape(org.name)}</h2>
              ${org.meta ? `<p class="handoff-drawer-sub">${pbEscape(org.meta)}</p>` : ''}
            </div>
            <button class="handoff-drawer-close" onclick="closeHandoffDrawer()" aria-label="Close drawer">×</button>
          </div>
          <div class="handoff-drawer-segments">
            ${HANDOFF_TABS.map(([tid, label]) =>
              `<button class="handoff-drawer-segment ${tab === tid ? 'active' : ''}" onclick="setHandoffDrawerSegment('${tid}')">${label}</button>`
            ).join('')}
          </div>
          <div class="handoff-drawer-content">${pbRenderHandoffDrawerTab(org, tab)}</div>
        </div>`;
    }
    function pbRenderHandoffDrawerTab(org, tab) {
      if (tab === 'spec')    return pbRenderHandoffSpec(org);
      if (tab === 'uiLogic') return pbRenderHandoffUiLogic(org);
      if (tab === 'usage')   return pbRenderHandoffUsage(org);
      return pbRenderHandoffAnatomy(org);
    }

    function pbRenderTokenCell(t) {
      if (!t) return '<span class="token-cell token-cell--none">—</span>';
      let demo = '';
      if (t.kind === 'color')       demo = `<span class="token-demo token-demo--color" style="background:${pbEscape(t.value)}"></span>`;
      else if (t.kind === 'radius') demo = `<span class="token-demo token-demo--radius" style="border-radius:${pbEscape(t.value)}"></span>`;
      else if (t.kind === 'space' || t.kind === 'size') demo = `<span class="token-demo token-demo--space" style="width:${pbEscape(t.value)}"></span>`;
      else if (t.kind === 'type')   demo = `<span class="token-demo token-demo--type">Aa</span>`;
      return `<span class="token-cell">${demo}<code class="token-name">${pbEscape(t.name)}</code><span class="token-val">${pbEscape(t.value)}</span></span>`;
    }

    function pbRenderHandoffAnatomy(org) {
      const a = org.anatomy;
      if (!a || !a.parts || !a.parts.length)
        return '<p class="handoff-spec-note">Anatomy not authored for this component yet.</p>';
      const preview = typeof window[org.renderFn] === 'function'
        ? window[org.renderFn](a.renderProps || {}) : '';
      return `
        <div class="anatomy-stage" data-anatomy-for="${pbEscape(org.id)}">
          <div class="anatomy-render">${preview}</div>
        </div>
        <table class="anatomy-table">
          <thead><tr><th>#</th><th>Element</th><th>Req.</th><th>Token</th></tr></thead>
          <tbody>
            ${a.parts.map(p => `
              <tr data-anatomy-row="${p.n}">
                <td><span class="anatomy-badge">${p.n}</span></td>
                <td>${pbEscape(p.name)}</td>
                <td><span class="req-pill ${p.required ? 'req-pill--req' : 'req-pill--opt'}">${p.required ? 'Required' : 'Optional'}</span></td>
                <td>${pbRenderTokenCell(p.token)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function pbRenderHandoffSpec(org) {
      const s = org.spec;
      if (!s || !s.stack || !s.stack.length)
        return '<p class="handoff-spec-note">Specification not authored for this component yet.</p>';
      const preview = typeof window[org.renderFn] === 'function'
        ? window[org.renderFn](s.renderProps || {}) : '';
      const legend = `<div class="spec-legend">${(s.legend || []).map(a =>
        `<span class="spec-legend-item"><span class="spec-swatch" style="background:${pbEscape(a.color)}"></span>${pbEscape(a.label)}</span>`).join('')}</div>`;
      /* The redline annotations (bands · lines · chips) are injected post-render
         by pbPlaceSpecAnnotations(), which measures the live component. */
      return `${legend}
        <div class="spec-stage" data-spec-for="${pbEscape(org.id)}">
          <div class="spec-render">${preview}</div>
        </div>`;
    }

    function pbRenderHandoffUiLogic(org) {
      const list = org.uiLogic || [];
      if (!list.length) return '<p class="handoff-spec-note">UI logic not authored for this component yet.</p>';
      return list.map(r => `
        <div class="uilogic-row">
          <div class="uilogic-target">${pbEscape(r.target)}</div>
          <div class="uilogic-rule">${pbEscape(r.rule)}</div>
        </div>`).join('');
    }

    function pbRenderHandoffUsage(org) {
      const u = org.usage;
      if (!u || !u.topics || !u.topics.length)
        return '<p class="handoff-spec-note">Usage not authored for this component yet.</p>';
      const demo = (u.demoProps && typeof window[org.renderFn] === 'function')
        ? `<div class="usage-demo"><span class="usage-demo-tag">Demo</span><div class="usage-demo-render">${window[org.renderFn](u.demoProps)}</div></div>`
        : '';
      const topics = u.topics.map(t => `
        <div class="usage-topic">
          <div class="usage-topic-name">${pbEscape(t.topic)}</div>
          ${t.do   ? `<div class="usage-line"><span class="usage-mark usage-mark--do">✓</span><span>${pbEscape(t.do)}</span></div>` : ''}
          ${t.dont ? `<div class="usage-line"><span class="usage-mark usage-mark--dont">✗</span><span>${pbEscape(t.dont)}</span></div>` : ''}
        </div>`).join('');
      return `${demo}<div class="usage-topics">${topics}</div>
        ${u.placement ? `<div class="usage-placement"><strong>Placement:</strong> ${pbEscape(u.placement)}</div>` : ''}`;
    }

    /* v0.3.17 — Anatomy: gutter badges + dashed leader lines, measured post-render. */
    function pbPlaceAnatomyBadges() {
      const stage = document.querySelector('.anatomy-stage');
      if (!stage) return;
      stage.querySelectorAll('.anatomy-badge--pin, .anatomy-leader').forEach(b => b.remove());
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === stage.getAttribute('data-anatomy-for'));
      if (!org || !org.anatomy) return;
      const stageRect = stage.getBoundingClientRect();
      const gutterX = 22;   /* badge centre-x, inside the stage's left gutter */
      (org.anatomy.parts || []).forEach(p => {
        const target = stage.querySelector(p.anchor);
        if (!target) return;
        const r = target.getBoundingClientRect();
        const cy = r.top - stageRect.top + r.height / 2;          /* element vertical centre */
        const elLeft = r.left - stageRect.left;
        /* dashed leader line from the gutter badge across to the element edge */
        const line = document.createElement('div');
        line.className = 'anatomy-leader';
        line.dataset.anatomyPin = p.n;
        line.style.top   = cy + 'px';
        line.style.left  = (gutterX + 10) + 'px';
        line.style.width = Math.max(0, elLeft - gutterX - 10) + 'px';
        stage.appendChild(line);
        /* numbered badge parked in the gutter, aligned to the element */
        const badge = document.createElement('span');
        badge.className = 'anatomy-badge anatomy-badge--pin';
        badge.textContent = p.n;
        badge.dataset.anatomyPin = p.n;
        badge.style.top  = (cy - 10) + 'px';
        badge.style.left = (gutterX - 10) + 'px';
        stage.appendChild(badge);
      });
    }
    /* v0.3.17 — Specification redline: measure the live component and inject
       dimension lines (line + end-cap ticks), the value chip placed directly
       beside the line — no leader lines. Element heights run down the LEFT of
       the component (orange); inter-element gaps run down the RIGHT (blue);
       the declared margin sits in dotted bands flanking the component (pink). */
    function pbPlaceSpecAnnotations() {
      const stage = document.querySelector('.spec-stage');
      if (!stage) return;
      stage.querySelectorAll('.spec-anno').forEach(e => e.remove());
      stage.style.minHeight = '';
      const org = (PB_DATA.handoff.organisms || []).find(x => x.id === stage.getAttribute('data-spec-for'));
      if (!org || !org.spec || !org.spec.stack) return;
      const s = org.spec;
      const sr = stage.getBoundingClientRect();
      const els = s.stack.map(it => {
        const t = stage.querySelector(it.anchor);
        return t ? { name: it.name, r: t.getBoundingClientRect() } : null;
      }).filter(Boolean);
      if (!els.length) return;

      const mk = (cls, css, txt) => {
        const d = document.createElement('div');
        d.className = 'spec-anno ' + cls;
        d.style.cssText = css;
        if (txt != null) d.textContent = txt;
        stage.appendChild(d);
        return d;
      };
      /* a measurement line carrying an end-cap tick at each end. axis 'v' | 'h' */
      const dimLine = (kind, axis, x, y, len) => {
        const m = ' spec-mark--' + kind;
        if (axis === 'v') {
          mk('spec-dline' + m, `left:${x - 1}px;top:${y}px;width:2px;height:${len}px`);
          mk('spec-cap' + m,   `left:${x - 5}px;top:${y - 1}px;width:10px;height:2px`);
          mk('spec-cap' + m,   `left:${x - 5}px;top:${y + len - 1}px;width:10px;height:2px`);
        } else {
          mk('spec-dline' + m, `left:${x}px;top:${y - 1}px;width:${len}px;height:2px`);
          mk('spec-cap' + m,   `left:${x - 1}px;top:${y - 5}px;width:2px;height:10px`);
          mk('spec-cap' + m,   `left:${x + len - 1}px;top:${y - 5}px;width:2px;height:10px`);
        }
      };

      let minL = Infinity, maxR = 0, maxW = 0;
      els.forEach(e => { minL = Math.min(minL, e.r.left); maxR = Math.max(maxR, e.r.right); maxW = Math.max(maxW, e.r.width); });
      const compL = minL - sr.left, compR = maxR - sr.left;
      const compTop = els[0].r.top - sr.top, compBot = els[els.length - 1].r.bottom - sr.top;
      const chipH = 18, chipW = 30;

      /* element heights (run down the LEFT) + inter-element gaps (run down the RIGHT) */
      const heights = [], gaps = [];
      els.forEach((e, i) => {
        const top = e.r.top - sr.top, bot = e.r.bottom - sr.top;
        heights.push({ value: Math.round(bot - top), top: top, bot: bot });
        if (i < els.length - 1) {
          const gBot = els[i + 1].r.top - sr.top;
          if (gBot - bot > 0.5) gaps.push({ value: Math.round(gBot - bot), top: bot, bot: gBot });
        }
      });

      /* gap region bands on the component — dotted top + bottom edges */
      gaps.forEach(g => mk('spec-band spec-band--gap',
        `left:${compL}px;top:${g.top}px;width:${compR - compL}px;height:${g.bot - g.top}px`));

      /* LEFT — one orange dimension line per element height, chip beside it */
      const xL = Math.max(compL - 26, chipW + 10);
      heights.forEach(h => {
        mk('spec-witness', `left:${xL}px;top:${h.top}px;width:${compL - xL}px`);
        mk('spec-witness', `left:${xL}px;top:${h.bot}px;width:${compL - xL}px`);
        dimLine('dimension', 'v', xL, h.top, h.bot - h.top);
        mk('spec-chip spec-chip--dimension',
          `left:${xL - 7 - chipW}px;top:${(h.top + h.bot) / 2 - chipH / 2}px;height:${chipH}px`, h.value);
      });

      /* RIGHT — one blue dimension line per gap, chip beside it */
      const xR = Math.min(compR + 26, sr.width - chipW - 14);
      gaps.forEach(g => {
        mk('spec-witness', `left:${compR}px;top:${g.top}px;width:${xR - compR}px`);
        mk('spec-witness', `left:${compR}px;top:${g.bot}px;width:${xR - compR}px`);
        dimLine('gap', 'v', xR, g.top, g.bot - g.top);
        mk('spec-chip spec-chip--gap',
          `left:${xR + 7}px;top:${(g.top + g.bot) / 2 - chipH / 2}px;height:${chipH}px`, g.value);
      });

      /* overall content width — horizontal dimension line above the component */
      const wY = compTop - 15;
      dimLine('dimension', 'h', compL, wY, compR - compL);
      mk('spec-chip spec-chip--dimension',
        `left:${(compL + compR) / 2 - chipW / 2}px;top:${wY - chipH - 3}px;height:${chipH}px`, Math.round(maxW));

      /* declared horizontal margin — dotted-edge bands flanking the component;
         one labelled dimension line below the left band (margin is symmetric) */
      const m = s.marginX || 0;
      let bottomY = compBot;
      if (m > 0) {
        const bH = compBot - compTop;
        mk('spec-band spec-band--margin', `left:${compL - m}px;top:${compTop}px;width:${m}px;height:${bH}px`);
        mk('spec-band spec-band--margin', `left:${compR}px;top:${compTop}px;width:${m}px;height:${bH}px`);
        const mY = compBot + 17;
        dimLine('margin', 'h', compL - m, mY, m);
        mk('spec-chip spec-chip--margin',
          `left:${compL - m / 2 - chipW / 2}px;top:${mY + 6}px;height:${chipH}px`, m);
        bottomY = mY + 6 + chipH;
      }

      /* grow the stage so nothing in the bottom margin row is clipped */
      stage.style.minHeight = Math.ceil(bottomY + 16) + 'px';
    }

    /* Badge ↔ table-row hover sync (one delegated pair of listeners). */
    function pbAnatomyHoverToggle(e, on) {
      const hit = e.target.closest('[data-anatomy-row], [data-anatomy-pin]');
      if (!hit) return;
      const n = hit.getAttribute('data-anatomy-row') || hit.getAttribute('data-anatomy-pin');
      ['[data-anatomy-row="' + n + '"]', '[data-anatomy-pin="' + n + '"]'].forEach(sel => {
        const el = document.querySelector(sel);
        if (el) el.classList.toggle('is-highlit', on);
      });
    }

    /* Patch renderHandoff so bounds + anatomy badges + spec redline recompute every draw. */
    (function patchRenderHandoff(){
      const orig = window.renderHandoff;
      const after = function(){ recomputeHandoffBounds(); pbPlaceAnatomyBadges(); pbPlaceSpecAnnotations(); };
      window.renderHandoff = function() {
        /* Preserve the left card-list scroll across re-renders so opening a
           component / switching a dropdown doesn't jump it back to the top.
           The drawer body is a fresh element each render, so it naturally
           loads at its starting point — which is the intended behavior. */
        const prevScroll = (document.querySelector('.handoff-main-col') || {}).scrollTop || 0;
        orig.apply(this, arguments);
        const col = document.querySelector('.handoff-main-col');
        if (col) col.scrollTop = prevScroll;
        requestAnimationFrame(after);
      };
      window.addEventListener('resize', function(){
        if (state && state.metaView === 'handoff') requestAnimationFrame(after);
      });
      document.addEventListener('mouseover', function(e){ pbAnatomyHoverToggle(e, true); });
      document.addEventListener('mouseout',  function(e){ pbAnatomyHoverToggle(e, false); });
    })();

                      onclick="openScreenDrawer('${pbEscape(el.id)}')"
                      style="${pbEscape(el.bounds || '')}"
                      title="${pbEscape(el.label || el.id)}"></button>
            `).join('')}
          </div>
        </div>
        ${selectedScreen.logicNotes && selectedScreen.logicNotes.length ? `
          <div class="handoff-logic-notes" style="margin-top:12px">
            <div class="meta-h3" style="font-size:13px;margin-bottom:8px">Logic notes</div>

    /* =========================================================================
       TAB 5 — ERD (Entity Relationship Diagram)
       Mermaid `erDiagram` rendered inside the same zoomable canvas.
       Edit the Mermaid source below to model your domain.
       ========================================================================= */
    function renderMetaERD() {
      const populated = !!(PB_DATA.erd && PB_DATA.erd.populated);
      const cta = populated
        ? `<button class="sync-button" onclick="openCopyPopover('/pb:sync-erd', this)">Sync</button>` : '';
      const header = pbPageHeader({ title: 'Data', infoKey: 'erd', cta });

      if (!populated) {
        $('#app').innerHTML = `
          <div class="pb-page">
            ${header}
            <div class="pb-content">
              ${renderEmptyState({
                icon: EMPTY_STATE_ICONS.erd,
                title: 'No data model yet',
                body: 'Build the entity-relationship diagram from your spec. Claude generates a Mermaid `erDiagram` with PK/FK/cardinality guardrails — for a future production implementation.',
                ctaLabel: 'Generate ERD', command: '/pb:sync-erd', label: 'Sync ERD command copied',
              })}
            </div>
          </div>`;
        return;
      }

      const e = (PB_DATA && PB_DATA.erd) || {};
      const rows = e.table || [];
      const byEntity = {};
      rows.forEach(r => { (byEntity[r.entity] = byEntity[r.entity] || []).push(r); });
      const entities = Object.keys(byEntity);
      if (state.erdEntity && entities.indexOf(state.erdEntity) === -1) state.erdEntity = null;
      if (!state.erdView) state.erdView = 'diagram';

      $('#app').innerHTML = `
        <div class="pb-page">
          ${header}
          <div class="pb-content pb-content--split">
            <div class="pb-main">${pbErdMain(e, byEntity)}</div>
            <aside class="pb-aside">${pbErdAside(byEntity, entities)}</aside>
          </div>
        </div>`;

      if (state.erdView !== 'table' && e.mermaid && window.mermaid) {
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
        mermaid.run({ querySelector: '#erd-diagram' }).then(function () {
          var stage = document.getElementById('erd-stage');
          if (!stage) return;
          var svg = stage.querySelector('svg');
          if (!svg) return;
          svg.style.maxWidth = 'none';
          svg.style.width = ''; svg.style.height = '';
          var bbox = svg.getBoundingClientRect();
          var W = Math.ceil(bbox.width)  || 800;
          var H = Math.ceil(bbox.height) || 600;
          stage.style.width = W + 'px';
          stage.style.height = H + 'px';
          stage.style.marginLeft = -(W/2) + 'px';
          stage.style.marginTop  = -(H/2) + 'px';
          initCanvas('erd', W, H);
        }).catch(function(){ /* silent */ });
      }
    }

    function pbErdMockSection(entity, fields) {
      const sets = ((PB_DATA.erd && PB_DATA.erd.mock) || []).filter(m => m.entity === entity);
      if (!sets.length) {
        return `<div class="pb-aside-section">

        </div>`;
      }
      const mi = Math.min(state.erdMockIndex || 0, sets.length - 1);
      const cur = sets[mi];
      const cols = fields.map(f => f.field);
      const selector = sets.map((m, i) =>
        `<button class="pb-mock-chip ${i === mi ? 'is-active' : ''}" onclick="setErdMock(${i})">${pbEscape(m.label || ('Set ' + (i + 1)))}<span class="pb-mock-n">${(m.rows || []).length}</span></button>`).join('');
      const rows = (cur.rows || []);
      const table = rows.length
        ? `<table class="erd-entity-table pb-mock-table">
             <thead><tr>${cols.map(c => `<th>${pbEscape(c)}</th>`).join('')}</tr></thead>
             <tbody>${rows.map(r => `<tr>${cols.map(c => `<td>${pbEscape(r[c] != null ? String(r[c]) : '—')}</td>`).join('')}</tr>`).join('')}</tbody>
           </table>`
        : `<p class="pb-aside-empty" style="padding:14px 8px">This set is empty — useful for testing the no-data state.</p>`;
      return `<div class="pb-aside-section">
        <p class="pb-dialog-h">Mock data <span class="pb-mock-total">${sets.length} set${sets.length !== 1 ? 's' : ''}</span></p>
        <div class="pb-mock-chips">${selector}</div>
        <div class="pb-mock-preview">${table}</div>
      </div>`;
    }

    /* ERD legend cardinality symbols (Crow's-foot notation) */
    function erdRelSvg(kind) {
      var line = '<line x1="14" y1="7" x2="46" y2="7" stroke="#374151" stroke-width="1.5"/>';
      function bars(x, dx) {
        return '<line x1="'+x+'" y1="2" x2="'+x+'" y2="12" stroke="#374151" stroke-width="1.5"/>'
             + '<line x1="'+(x+dx)+'" y1="2" x2="'+(x+dx)+'" y2="12" stroke="#374151" stroke-width="1.5"/>';
      }
      function foot(x, dir) {
        var dx = 6 * dir;
        return '<line x1="'+x+'" y1="7" x2="'+(x+dx)+'" y2="2"  stroke="#374151" stroke-width="1.5"/>'
             + '<line x1="'+x+'" y1="7" x2="'+(x+dx)+'" y2="12" stroke="#374151" stroke-width="1.5"/>'
             + '<line x1="'+x+'" y1="7" x2="'+(x+dx)+'" y2="7"  stroke="#374151" stroke-width="1.5"/>';
      }
      function circle(x) {
        return '<circle cx="'+x+'" cy="7" r="2.5" fill="white" stroke="#374151" stroke-width="1.5"/>';
      }
      var lEnd = '', rEnd = '';
      if (kind === 'one-one')      { lEnd = bars(8, 4);                       rEnd = bars(48, 4); }
      else if (kind === 'one-many'){ lEnd = bars(8, 4);                       rEnd = circle(50) + foot(46, +1); }
      else                          { lEnd = foot(14, -1) + circle(10);        rEnd = circle(50) + foot(46, +1); }
      return '<svg viewBox="0 0 60 14" xmlns="http://www.w3.org/2000/svg">'
        + line + lEnd + rEnd + '</svg>';
    }

    /* =========================================================================
       SHARED CANVAS — generalised pan/zoom for the User Flow + ERD tabs
       ========================================================================= */
    function initCanvas(prefix, contentW, contentH) {
      var viewport = document.getElementById(prefix + '-viewport');
      var stage    = document.getElementById(prefix + '-stage');
      var readout  = document.getElementById(prefix + '-zoom-readout');
      if (!viewport || !stage) return;

      var minS = 0.4, maxS = 3;
      var scale = 1, tx = 0, ty = 0;
      var dragging = false, lastX = 0, lastY = 0;

      function apply() {
        stage.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
        if (readout) readout.textContent = Math.round(scale * 100) + '%';
      }
      function fitToViewport() {
        var vw = viewport.clientWidth, vh = viewport.clientHeight;
        var pad = 32;
        var s = Math.min((vw - pad * 2) / contentW, (vh - pad * 2) / contentH);
        if (s < minS) minS = Math.max(0.1, s * 0.9);
        scale = Math.max(minS, Math.min(maxS, s));
        tx = 0; ty = 0;
        stage.style.transition = 'transform 0.25s ease-out';
        apply();
      }
      function zoomBy(delta, cx, cy) {
        var prev = scale;
        var next = Math.max(minS, Math.min(maxS, scale * (1 + delta)));
        if (next === prev) return;
        if (cx !== undefined && cy !== undefined) {
          var rect = viewport.getBoundingClientRect();
          var px = cx - rect.left - rect.width / 2;
          var py = cy - rect.top  - rect.height / 2;
          tx = px - (px - tx) * (next / prev);
          ty = py - (py - ty) * (next / prev);
        }
        scale = next;
        stage.style.transition = 'none';
        apply();
      }

      viewport.addEventListener('wheel', function (e) {
        e.preventDefault();
        zoomBy(-e.deltaY * 0.0015, e.clientX, e.clientY);
      }, { passive: false });
      viewport.addEventListener('mousedown', function (e) {
        dragging = true;
        lastX = e.clientX; lastY = e.clientY;
        viewport.style.cursor = 'grabbing';
        stage.style.transition = 'none';
        e.preventDefault();
      });
      window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        tx += e.clientX - lastX;
        ty += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        apply();
      });
      window.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        viewport.style.cursor = '';
      });

      document.getElementById(prefix + '-zoom-in').onclick  = function () { zoomBy(0.18); };
      document.getElementById(prefix + '-zoom-out').onclick = function () { zoomBy(-0.18); };
      document.getElementById(prefix + '-zoom-fit').onclick = function () { fitToViewport(); };

      requestAnimationFrame(function () { requestAnimationFrame(fitToViewport); });
    }

    /* Boot */
    applyRegistryTokens(PB_REGISTRY);
    if (VIEW_ONLY) {
      document.body.classList.add('view-only');
      const _c = (PB_REGISTRY.config && PB_REGISTRY.config.cover) || null;
      if (_c) {
        const _cov = document.createElement('div');
        _cov.className = 'pb-cover';
        _cov.innerHTML = `<strong>${_c.title || ''}</strong><span>${_c.summary || ''}</span>`
          + (_c.by || _c.date ? `<em>${[_c.by, _c.date].filter(Boolean).join(' · ')}</em>` : '');
        document.body.insertBefore(_cov, document.body.firstChild);
      }
    }
    render();
  </script>
</body>
</html>
