    // Scale the device frame to fit BOTH the stage width and the remaining viewport height, so
    // the whole frame is visible without scrolling (tall phones/tablets included). Clicks still map
    // correctly through the CSS transform. Collapses the wrapper height to the scaled height.
    function fitProtoFrame() {
      // v1.5 — browser/app views render at TRUE size (no scale): fonts are real, width is responsive
      // (width:<device>px; max-width:100%) and the frame fills the column height (content scrolls
      // inside). tablet/mobile are DEVICE frames — scale them DOWN to fit so the whole device is
      // visible, but never scale up past 1:1.
      const frame = document.getElementById('proto-frame-wrap');
      const stage = document.getElementById('proto-stage');
      if (!frame) return;
      frame.style.transform = 'none';
      const device = state.protoDevice;
      if ((device !== 'tablet' && device !== 'mobile') || !stage) return;
      const availW = stage.clientWidth, availH = stage.clientHeight;
      const fw = frame.offsetWidth, fh = frame.offsetHeight;
      let s = 1;
      if (fw > 0) s = Math.min(s, availW / fw);
      if (fh > 0 && availH > 80) s = Math.min(s, availH / fh);
      frame.style.transform = s < 1 ? `scale(${s})` : 'none';
    }
    window.addEventListener('resize', function () {
      if (state && state.metaView === 'prototype') requestAnimationFrame(fitProtoFrame);
    });

    /* Prototype aside: screen → component-level tree (does not recurse into component internals). */
    function pbRenderStructureTree(screens) {
      const comps = (PB_DATA.handoff && PB_DATA.handoff.organisms) || [];
      const nameOf = id => { const c = comps.find(c => c.id === id); return c ? c.name : null; };
      const dot = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M8 21h8"/></svg>';
      return '<div class="pb-tree">' + screens.map(s => {
        const els = s.elements || [];
        const nodes = els.length ? els.map(el => {
          const cn = el.orgId ? nameOf(el.orgId) : null;
          const org = el.orgId
            ? `<span class="pb-tree-node-org ${cn ? '' : 'is-missing'}">${pbEscape(cn || el.orgId)}</span>` : '';
          return `<li class="pb-tree-node"><span class="pb-tree-node-label">${pbEscape(el.label || el.id || 'element')}</span>${org}</li>`;
        }).join('') : '<li class="pb-tree-node"><span class="pb-tree-node-label" style="color:var(--text-tertiary)">No mapped components</span></li>';
        return `<div class="pb-tree-screen">
          <div class="pb-tree-screen-name ${s.id === state.protoScreenId ? 'is-active' : ''}" title="Preview this screen"
               style="cursor:pointer" onclick="setProtoScreen('${s.id}')">${dot}<span>${pbEscape(s.name || s.id)}</span></div>
          <ul class="pb-tree-list">${nodes}</ul>
        </div>`;
      }).join('') + '</div>';
    }
    function setProtoScreen(id, fromBack) {
      if (!fromBack && state.protoScreenId && state.protoScreenId !== id) {
        state.protoHistory = state.protoHistory || [];
        state.protoHistory.push(state.protoScreenId);
      }
      state.protoScreenId = id; renderPrototype();
    }
    function setProtoDevice(id) { state.protoDevice = id; renderPrototype(); }
    function setProtoShell(v) { state.protoShell = (v === 'app' ? 'app' : 'browser'); renderPrototype(); }

    /* =========================================================================
       ROLE-BASED SANDBOX (v1.5)
       meta.roles / meta.defaultRole gate which screens & elements each role sees.
       A role with isAdmin:true bypasses ALL gating. Absent meta.roles ⇒ a single
       implicit role: the switcher is hidden and nothing is gated (backward compatible).
       ========================================================================= */
    function pbRolesList() { const m = (PB_REGISTRY && PB_REGISTRY.meta) || {}; return (m.roles && m.roles.length) ? m.roles : []; }
    function pbRoleById(id) { return pbRolesList().find(r => r.id === id) || null; }
    function pbRoleIsAdmin(id) { const r = pbRoleById(id); return !!(r && r.isAdmin); }
    function pbResolveDefaultRole() {
      const roles = pbRolesList();
      if (!roles.length) return null;
      const m = (PB_REGISTRY && PB_REGISTRY.meta) || {};
      if (m.defaultRole && roles.some(r => r.id === m.defaultRole)) return m.defaultRole;
      const firstNonAdmin = roles.find(r => !r.isAdmin);
      return firstNonAdmin ? firstNonAdmin.id : roles[0].id;
    }
    // A role may see a screen when: there is no roles model, OR the role is admin, OR the
    // screen declares no `roles` (visible to all), OR the role id is in screen.roles.
    function pbScreenAllowsRole(screen, roleId) {
      if (!pbRolesList().length) return true;
      if (pbRoleIsAdmin(roleId)) return true;
      const allowed = screen && screen.roles;
      if (!allowed || !allowed.length) return true;
      return roleId != null && allowed.indexOf(roleId) !== -1;
    }
    // Refuse data-nav navigation to a screen the active role may not see.
    function pbNavAllowed(id) {
      if (!pbRolesList().length) return true;
      const screens = (PB_DATA.handoff && PB_DATA.handoff.screens) || [];
      return pbScreenAllowsRole(screens.find(s => s.id === id), state.activeRole);
    }
    window.setProtoRole = function (id) { state.activeRole = id; renderPrototype(); };
    // Reset the sandbox: back to the first screen, clear history + field inputs, dismiss toasts.
    window.pbResetSandbox = function () {
      const screens = (PB_DATA.handoff && PB_DATA.handoff.screens) || [];
      state.protoScreenId = screens.length ? screens[0].id : null;
      state.protoHistory = [];
      document.querySelectorAll('#proto-frame .field__input').forEach(function (i) { i.value = ''; });
      const tw = document.getElementById('proto-toast-wrap');
      if (tw) tw.innerHTML = '';
      renderPrototype();
    };
    // Element-level gating: hide #proto-frame elements whose data-roles excludes the active
    // role. isAdmin bypasses. No roles model ⇒ everything stays visible.
    function pbApplyRoleGating() {
      const frame = document.getElementById('proto-frame');
      if (!frame) return;
      const gated = frame.querySelectorAll('[data-roles]');
      const hasRoles = pbRolesList().length > 0;
      const admin = pbRoleIsAdmin(state.activeRole);
      gated.forEach(function (el) {
        if (!hasRoles || admin) { el.style.display = ''; return; }
        const allowed = (el.getAttribute('data-roles') || '').split(/\s+/).filter(Boolean);
        const ok = !allowed.length || (state.activeRole != null && allowed.indexOf(state.activeRole) !== -1);
        el.style.display = ok ? '' : 'none';

    }
    function pbSyncStructBtn(open) {

    }
    function toggleProtoStructPanel() {

    }
    function pbProtoMainClick(e) {
      const p = document.getElementById('proto-struct-panel');
      if (p && p.classList.contains('is-open') && !p.contains(e.target)) {
        p.classList.remove('is-open');
        pbSyncStructBtn(false);
      }
    }
    function protoBack() {
      const h = state.protoHistory || [];
      if (!h.length) return;
      setProtoScreen(h.pop(), true);
    }
    function protoReload() { renderPrototype(); }
    function protoNewTab() { state.protoTabs = state.protoTabs || []; state.protoTabs.push('New tab'); renderPrototype(); }
    function protoCloseTab(i) { (state.protoTabs || []).splice(i, 1); renderPrototype(); }
    function protoDeviceIcon(id) {
      const p = {
        monitor: '<rect x="2" y="3" width="20" height="13" rx="1.5"/><path d="M2 20h20M9 16l-1 4M15 16l1 4"/>',
        laptop:  '<rect x="4" y="4" width="16" height="11" rx="1.5"/><path d="M2 19h20l-1.4-3H3.4L2 19z"/>',
        tablet:  '<rect x="5" y="2" width="14" height="20" rx="2"/><path d="M11 18h2"/>',

      }[id] || '';

    // A prototype is INTERACTIVE. The shell ships a tiny DECLARATIVE runtime so screens drive

    function pbScreensHas(id){ return ((PB_DATA.handoff && PB_DATA.handoff.screens) || []).some(function(s){ return s.id===id; }); }
    function pbFieldError(field, msg){
      if(!field) return;
      var inp = field.querySelector('.field__input');
      var err = field.querySelector('.field__error');
      if(msg){
        if(inp) inp.style.borderColor = 'var(--danger)';
        if(!err){ err=document.createElement('span'); err.className='field__error'; err.style.cssText='font-size: var(--font-size-xs);color:var(--danger)'; field.appendChild(err); }

    function pbProtoSubmit(btn){

      var ok = true;
      scope.querySelectorAll('.field__input').forEach(function(inp){
        var field = inp.closest('.field');
        var val = (inp.value||'').trim();
        var msg = '';
        if(inp.hasAttribute('data-required') && !val) msg='This field is required.';
        else if(val && (inp.getAttribute('data-validate')==='email' || inp.type==='email') && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)) msg='Enter a valid email address.';
        else if(val && inp.getAttribute('data-minlength') && val.length < +inp.getAttribute('data-minlength')) msg='Use at least '+inp.getAttribute('data-minlength')+' characters.';
        pbFieldError(field, msg);

      });
      if(!ok) return;
      var toast = btn.getAttribute('data-toast'); if(toast) pbToast(toast);
      var go = btn.getAttribute('data-go');
      if(go && pbScreensHas(go) && pbNavAllowed(go)){
        setProtoScreen(go);
        var rd = btn.getAttribute('data-redirect'); var ms = +(btn.getAttribute('data-redirect-ms')||0);
        if(rd && ms && pbScreensHas(rd) && pbNavAllowed(rd)) setTimeout(function(){ if(state.protoScreenId===go) setProtoScreen(rd); }, ms);
      }
    }
    function pbToast(msg){
      var wrap = document.getElementById('proto-toast-wrap');
      if(!wrap){ wrap=document.createElement('div'); wrap.id='proto-toast-wrap'; wrap.className='proto-toast-wrap'; document.body.appendChild(wrap); }
      var t = document.createElement('div'); t.className='proto-toast'; t.textContent=msg; wrap.appendChild(t);
      requestAnimationFrame(function(){ t.classList.add('in'); });
      setTimeout(function(){ t.classList.remove('in'); setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 250); }, 3400);
    }
    // v1.5 — Inspect: hold ⌥/Alt and hover the preview to see an element's reference; ⌥-click copies
    // it (a structured id path) to paste to the AI. No mode toggle — the Alt state is read off events.
    var pbInspectLast = null, pbInspectKeysWired = false;
    function pbInspectEls() {
      var box = document.getElementById('pb-inspect-box');
      var label = document.getElementById('pb-inspect-label');
      if (!box) { box = document.createElement('div'); box.id = 'pb-inspect-box'; box.className = 'pb-inspect-box'; document.body.appendChild(box); }
      if (!label) { label = document.createElement('div'); label.id = 'pb-inspect-label'; label.className = 'pb-inspect-label'; document.body.appendChild(label); }
      return { box: box, label: label };
    }
    function pbInspectName(el) {
      var screenId = state.protoScreenId || '';
      var frame = document.getElementById('proto-frame');
      var screens = (PB_DATA.handoff && PB_DATA.handoff.screens) || [];
      var comps = (PB_DATA.handoff && PB_DATA.handoff.organisms) || [];
      var nameOf = function (id) { var c = comps.find(function (c) { return c.id === id; }); return c ? c.name : null; };
      // 1) tagged element (data-handoff-el) -> registry element label + component
      var tagged = el.closest ? el.closest('[data-handoff-el]') : null;
      if (tagged && frame && frame.contains(tagged)) {
        var elId = tagged.getAttribute('data-handoff-el');
        var scr = screens.find(function (s) { return s.id === screenId; });
        var elm = scr && (scr.elements || []).find(function (x) { return x.id === elId; });
        var org = elm && elm.orgId;
        var path = 'screen:' + screenId + ' › element:' + elId + (org ? ' › component:' + org : '');
        var hint = (elm && elm.label) ? elm.label : elId;
        if (org && nameOf(org)) hint += ' · ' + nameOf(org);
        return { path: path, hint: hint };
      }
      // 2) anatomy-part match by className anchor (real DOM class -> a component part name)
      try {
        for (var i = 0; i < comps.length; i++) {
          var parts = ((comps[i].anatomy || {}).parts) || [];
          for (var j = 0; j < parts.length; j++) {
            var anchor = parts[j].anchor;
            if (anchor && el.matches && el.matches(anchor)) {
              return { path: 'screen:' + screenId + ' › component:' + comps[i].id + ' › part:' + (parts[j].name || anchor),
                       hint: (parts[j].name || anchor) + ' · ' + (comps[i].name || comps[i].id) };
            }
          }
        }
      } catch (e) { /* selector edge cases — fall through */ }
      // 3) DOM fallback — never precise, but always copyable
      var tag = (el.tagName || 'node').toLowerCase();
      var cls = (el.classList && el.classList.length) ? '.' + el.classList[0] : (el.id ? '#' + el.id : '');
      var txt = (el.textContent || '').trim().replace(/\s+/g, ' ').slice(0, 32);
      return { path: 'screen:' + screenId + ' › ' + tag + cls, hint: txt ? '"' + txt + '"' : tag };
    }
    function pbInspectShow(el) {
      var frame = document.getElementById('proto-frame');
      if (!el || !frame || el === frame || !frame.contains(el)) { pbInspectHide(); return; }
      var info = pbInspectName(el);
      var r = el.getBoundingClientRect();
      var e = pbInspectEls();
      e.box.style.display = 'block';
      e.box.style.top = r.top + 'px'; e.box.style.left = r.left + 'px';
      e.box.style.width = r.width + 'px'; e.box.style.height = r.height + 'px';
      e.label.innerHTML = '';
      var p = document.createElement('span'); p.className = 'pb-inspect-path'; p.textContent = info.path; e.label.appendChild(p);
      if (info.hint) { var h = document.createElement('span'); h.className = 'pb-inspect-hint'; h.textContent = info.hint; e.label.appendChild(h); }
      e.label.style.display = 'flex';
      var ly = r.top - 30; if (ly < 4) ly = r.bottom + 6;
      e.label.style.top = ly + 'px'; e.label.style.left = Math.max(4, r.left) + 'px';
    }
    function pbInspectHide() {
      var box = document.getElementById('pb-inspect-box'); if (box) box.style.display = 'none';
      var label = document.getElementById('pb-inspect-label'); if (label) label.style.display = 'none';
    }
    function pbInspectCopy(el) {
      var info = pbInspectName(el);
      copyCommandToClipboard(info.path);
      pbToast('Copied  ' + info.path);
    }
    function pbInspectWireKeys() {
      if (pbInspectKeysWired) return; pbInspectKeysWired = true;
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Alt' && state.metaView === 'prototype' && pbInspectLast) pbInspectShow(pbInspectLast);
      });
      document.addEventListener('keyup', function (e) { if (e.key === 'Alt') pbInspectHide(); });
      window.addEventListener('scroll', pbInspectHide, true);
    }
    function wireProtoNav() {
      const frame = document.getElementById('proto-frame');
      if (!frame) return;
      pbInspectWireKeys();
      frame.addEventListener('click', function (e) {
        if (e.altKey) { e.preventDefault(); e.stopPropagation(); pbInspectCopy(e.target); return; }  // ⌥-click = copy reference
        var nav = e.target.closest('[data-nav]');
        if (nav) { var id=nav.getAttribute('data-nav'); if(pbScreensHas(id)){ e.preventDefault(); if(pbNavAllowed(id)) setProtoScreen(id); } return; }
        var tog = e.target.closest('[data-action="toggle-password"]');
        if (tog) { e.preventDefault(); pbTogglePassword(tog); return; }
        var sub = e.target.closest('[data-action="submit"]');
        if (sub) { e.preventDefault(); pbProtoSubmit(sub); return; }
      });
      frame.addEventListener('mousemove', function (e) {
        pbInspectLast = e.target;
        if (e.altKey) pbInspectShow(e.target); else pbInspectHide();
      });
      frame.addEventListener('mouseleave', function () { pbInspectLast = null; pbInspectHide(); });
    }

    /* =========================================================================
       TAB 2 — PROJECT SUMMARY
       4 sub-sections (per 02-architecture.md §7 Addition C):
         2.1 Overview              (Objectives + Principles, auto-syncs)
         2.2 User Insights         (Quantitative + Research Summary + Executive Summary)

         2.4 Others                (reserved per-project)

    /* v0.3.0 — Tab 2 sub-tab navigation. Only the active sub-section renders. */
    const SUMMARY_SUBTABS = [
      ['overview',  'Overview'],
      ['insights',  'User Insights'],
      ['tradeoffs', 'UI Logic Trade-offs'],
      ['others',    'Others'],
    ];

    function renderMetaSummary() {
      const o  = (PB_DATA && PB_DATA.overview) || {};
      const ui = (PB_DATA && PB_DATA.userInsights) || {};
      const hasSummary = !!(o.objectives || (o.principles && o.principles.length) ||

      const subTabs = SUMMARY_SUBTABS.map(([id, label]) =>

      // the right that reflects the left column and navigates on click.
      $('#app').innerHTML = `
        <div class="pb-page pb-page--viewport">
          ${header}

              <div class="summary-scroll" id="summary-scroll">${body}</div>
            </div>
            <aside class="pb-aside summary-toc">
              <p class="pb-dialog-h">On this page</p>
              <nav class="summary-toc-nav" id="summary-toc-nav"></nav>

      `;
      requestAnimationFrame(pbBuildSummaryToc);
    }

    /* Build the Project Summary table of contents from the left column's headings, wire
       click-to-scroll + scroll-spy highlighting. Re-runs on every sub-tab render. */
    function pbBuildSummaryToc() {
      const scroll = document.getElementById('summary-scroll');
      const nav = document.getElementById('summary-toc-nav');
      if (!scroll || !nav) return;
      const heads = Array.from(scroll.querySelectorAll('.meta-h2, .meta-h3'));
      if (!heads.length) { nav.innerHTML = '<p class="pb-aside-empty" style="padding:6px 0">No sections.</p>'; return; }
      heads.forEach((h, i) => { if (!h.id) h.id = 'summary-sec-' + i; });
      // Group headings into a tree: each h2 is a parent node, the h3s under it are children —
      // rendered with the same .pb-tree component as the Prototype structure panel.
      const groups = []; let cur = null;
      heads.forEach(h => {
        if (h.classList.contains('meta-h2')) { cur = { head: h, children: [] }; groups.push(cur); }
        else { if (!cur) { cur = { head: null, children: [] }; groups.push(cur); } cur.children.push(h); }
      });
      const tocNode = (h, isChild) => isChild
        ? `<li class="pb-tree-node"><span class="pb-tree-node-label summary-toc-item" data-toc="${h.id}" onclick="pbSummaryTocClick(event,'${h.id}')">${pbEscape(h.textContent)}</span></li>`
        : `<div class="pb-tree-screen-name summary-toc-item" data-toc="${h.id}" onclick="pbSummaryTocClick(event,'${h.id}')"><span>${pbEscape(h.textContent)}</span></div>`;
      nav.innerHTML = '<div class="pb-tree summary-toc-tree">' + groups.map(g => {
        const parent = g.head ? tocNode(g.head, false) : '';
        const kids = g.children.length ? `<ul class="pb-tree-list">${g.children.map(c => tocNode(c, true)).join('')}</ul>` : '';
        return `<div class="pb-tree-screen">${parent}${kids}</div>`;
      }).join('') + '</div>';
      scroll.onscroll = pbSummaryTocSpy;
      pbSummaryTocSpy();
    }
    function pbSummaryTocClick(e, id) {
      e.preventDefault();
      const scroll = document.getElementById('summary-scroll');
      const el = document.getElementById(id);
      if (!scroll || !el) return;
      const top = scroll.scrollTop + (el.getBoundingClientRect().top - scroll.getBoundingClientRect().top) - 8;
      scroll.scrollTo({ top: top, behavior: 'smooth' });
    }
    function pbSummaryTocSpy() {
      const scroll = document.getElementById('summary-scroll');
      const nav = document.getElementById('summary-toc-nav');
      if (!scroll || !nav) return;
      const heads = Array.from(scroll.querySelectorAll('.meta-h2, .meta-h3'));
      const stop = scroll.getBoundingClientRect().top;
      let active = heads[0];
      heads.forEach(h => { if (h.getBoundingClientRect().top - stop <= 16) active = h; });
      nav.querySelectorAll('.summary-toc-item').forEach(a =>
        a.classList.toggle('is-toc-active', !!active && a.getAttribute('data-toc') === active.id));
    }

    function pbRenderOverview() {

        ? `<p class="meta-p">${pbEscape(o.objectives)}</p>`

        ? o.principles.map(p => `
            <div class="meta-principle">

              <span class="meta-principle-text"><strong>${pbEscape(p.title)}</strong> — ${pbEscape(p.body)}</span>
            </div>`).join('')
        : `<p class="meta-p" style="color:var(--text-tertiary);font-style:italic">
             No principles recorded yet. Run <code>/pb:init</code> to capture them.
           </p>`;
      return `
        <div class="meta-section">
          <div class="meta-h2">2.1 Overview</div>

    function pbRenderUserInsights() {

    function pbRenderTradeoffs() {
      const t = (PB_DATA && PB_DATA.uiLogicTradeoffs) || [];
      if (!t.length) {
        return `
          <div class="meta-section">
            <div class="meta-h2">2.3 UI Logic Trade-offs</div>

              ${(function(){
                const opts = Array.isArray(to.options) ? to.options
                  : (typeof to.options === 'string' ? to.options.split('|').map(s => s.trim()).filter(Boolean) : []);
                return opts.length ? `<p class="meta-p"><strong>Options considered:</strong></p><ul>${
                  opts.map(opt => `<li>${pbEscape(opt)}</li>`).join('')
                }</ul>` : '';
              })()}

              ${to.tabsAffected ? `<p class="meta-p" style="color:var(--text-tertiary);font-size:var(--font-size-xs)">Affects: ${pbEscape(to.tabsAffected)}</p>` : ''}
