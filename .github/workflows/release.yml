name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required to create a GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for auto-generated notes

      - name: Verify tag matches plugin.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ -f .claude-plugin/plugin.json ]; then
            pj=$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")
            echo "tag=$tag plugin.json=$pj"
            test "$tag" = "$pj" || { echo "::error::tag v$tag != plugin.json $pj — bump plugin.json before tagging"; exit 1; }
          else
            echo "::warning::no .claude-plugin/plugin.json found; skipping version coherence check"
          fi

      - name: Create GitHub Release (gh CLI, no third-party action)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
